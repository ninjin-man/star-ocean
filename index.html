<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Female Body CPS MVP</title>
<style>
:root{--bg:#0b1020;--panel:#151d31;--line:#33415f;--text:#f7f8ff;--muted:#aeb9d2;--accent:#187da8;--ok:#82e6a7;--warn:#ffd27a;--bad:#ff9696}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
main{max-width:880px;margin:auto;padding:12px 12px calc(28px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;z-index:5;background:rgba(11,16,32,.95);padding:calc(8px + env(safe-area-inset-top)) 0 10px}
h1{font-size:21px;margin:0}h2{font-size:17px;margin:0 0 10px}.sub,.hint{font-size:12px;line-height:1.55;color:var(--muted)}
.card{background:var(--panel);border:1px solid #293653;border-radius:16px;padding:13px;margin-top:12px}
.row{display:flex;gap:8px;flex-wrap:wrap}button,label.file{min-height:48px;border:1px solid var(--line);border-radius:12px;background:#1e2943;color:var(--text);font-weight:750;padding:10px 12px;flex:1}button.primary{background:var(--accent)}label.file{display:flex;align-items:center;justify-content:center}label.file input{display:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.box{min-height:280px;display:grid;place-items:center;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:repeating-conic-gradient(#1b2438 0 25%,#101729 0 50%) 50%/20px 20px}
canvas{max-width:100%;image-rendering:pixelated}#inputView,#maskView,#outputView{width:min(86vw,460px);height:auto}#outputView{background:transparent}
.metrics{display:grid;grid-template-columns:1fr auto;gap:7px;font-size:13px}.metrics b{text-align:right}.ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}
.meter{height:9px;background:#0c1323;border-radius:999px;overflow:hidden;margin-top:8px}.meter i{display:block;height:100%;background:#58c7f3;width:0}
pre{white-space:pre-wrap;word-break:break-word;font-size:11px;background:#0d1424;border-radius:12px;padding:10px;color:#dbe5ff;max-height:260px;overflow:auto}
@media(max-width:680px){.grid{grid-template-columns:1fr}.box{min-height:240px}}
</style>
</head>
<body><main>
<header><h1>女性素体 CPS MVP <span style="font-size:12px;background:#244d68;border-radius:999px;padding:5px 9px">128×128</span></h1><div class="sub">入力画像のシルエットから数値を抽出し、固定ライブラリ素体へ安全範囲で反映します。ツール内AI・幾何学人体生成は使用しません。</div></header>
<section class="card"><h2>1. 画像入力</h2><div class="row"><label class="file">画像を選択<input id="file" type="file" accept="image/*"></label><button id="analyze" class="primary">解析して生成</button></div><div id="status" class="hint" style="margin-top:10px">画像を選択してください。</div></section>
<section class="card"><h2>2. 入力と人物マスク</h2><div class="grid"><div><div class="box"><canvas id="inputView" width="512" height="512"></canvas></div><p class="hint">入力画像</p></div><div><div class="box"><canvas id="maskView" width="512" height="512"></canvas></div><p class="hint">白＝抽出人物。市松模様・透明背景は自動判定します。</p></div></div><div id="maskMetrics" class="metrics"></div></section>
<section class="card"><h2>3. CPS抽出結果</h2><div id="cpsMetrics" class="metrics"><span>未解析</span><b>—</b></div><pre id="jsonView">{}</pre></section>
<section class="card"><h2>4. 女性標準素体への反映</h2><div class="box"><canvas id="outputView" width="128" height="128"></canvas></div><p class="hint">完成済み女性素体のピクセルを行断面単位で再配置します。円・楕円・円柱から人体を生成しません。</p><div id="quality" class="metrics"><span>未検査</span><b>—</b></div><div class="meter"><i id="meter"></i></div></section>
<section class="card"><h2>5. 保存</h2><div class="row"><button id="savePng">128 PNGを保存</button><button id="saveJson">CPS JSONを保存</button></div></section>
</main>
<script>
'use strict';
const $=id=>document.getElementById(id);
const inputView=$('inputView'),maskView=$('maskView'),outputView=$('outputView');
const libraryImage=new Image();
let original=null,currentCPS=null,outputReady=false;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function setStatus(t,cls=''){$('status').className='hint '+cls;$('status').textContent=t}
function downloadBlob(blob,name){const a=document.createElement('a');a.download=name;a.href=URL.createObjectURL(blob);a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1500)}
$('file').addEventListener('change',e=>{const f=e.target.files&&e.target.files[0];if(!f)return;const url=URL.createObjectURL(f),im=new Image();setStatus('画像を読み込み中…');im.onload=()=>{original=im;drawInput();setStatus(`読み込み完了：${im.naturalWidth}×${im.naturalHeight}`,'ok');URL.revokeObjectURL(url);run()};im.onerror=()=>setStatus('画像を開けません。PNG/JPEG/WEBPを使用してください。','bad');im.src=url;e.target.value=''});
$('analyze').onclick=run;
function fitCanvasImage(im,canvas,max=640){const scale=Math.min(1,max/Math.max(im.naturalWidth||im.width,im.naturalHeight||im.height));canvas.width=Math.max(1,Math.round((im.naturalWidth||im.width)*scale));canvas.height=Math.max(1,Math.round((im.naturalHeight||im.height)*scale));const c=canvas.getContext('2d');c.clearRect(0,0,canvas.width,canvas.height);c.drawImage(im,0,0,canvas.width,canvas.height)}
function drawInput(){fitCanvasImage(original,inputView,640)}
function getMaskFromInput(){
 const w=inputView.width,h=inputView.height,c=inputView.getContext('2d'),im=c.getImageData(0,0,w,h),d=im.data;
 let hasAlpha=false;for(let i=3;i<d.length;i+=4)if(d[i]<245){hasAlpha=true;break}
 let fg=new Uint8Array(w*h);
 if(hasAlpha){for(let p=0;p<w*h;p++)fg[p]=d[p*4+3]>28?1:0}
 else{
  const bg=new Uint8Array(w*h),q=new Int32Array(w*h*2);let qh=0,qt=0;
  const push=p=>{if(p>=0&&p<w*h&&!bg[p])q[qt++]=p};
  for(let x=0;x<w;x++){push(x);push((h-1)*w+x)}for(let y=0;y<h;y++){push(y*w);push(y*w+w-1)}
  const isBackground=p=>{const i=p*4,r=d[i],g=d[i+1],b=d[i+2],mx=Math.max(r,g,b),mn=Math.min(r,g,b),lum=(r+g+b)/3,ch=mx-mn;return (lum>218&&ch<20)||(lum>238&&ch<34)};
  while(qh<qt){const p=q[qh++];if(bg[p]||!isBackground(p))continue;bg[p]=1;const x=p%w,y=(p/w)|0;if(x)push(p-1);if(x<w-1)push(p+1);if(y)push(p-w);if(y<h-1)push(p+w)}
  for(let p=0;p<w*h;p++)fg[p]=bg[p]?0:1;
 }
 // remove tiny components, keep largest meaningful component
 const seen=new Uint8Array(w*h),comps=[];
 for(let p=0;p<w*h;p++){if(!fg[p]||seen[p])continue;const list=[],q=[p];seen[p]=1;for(let qi=0;qi<q.length;qi++){const v=q[qi],x=v%w,y=(v/w)|0;list.push(v);for(const u of [v-1,v+1,v-w,v+w]){if(u<0||u>=w*h||seen[u]||!fg[u])continue;const ux=u%w,uy=(u/w)|0;if(Math.abs(ux-x)+Math.abs(uy-y)!==1)continue;seen[u]=1;q.push(u)}}comps.push(list)}
 comps.sort((a,b)=>b.length-a.length);const keep=new Uint8Array(w*h);if(comps[0])for(const p of comps[0])keep[p]=1;
 // one close pass to repair one-pixel holes
 const out=keep.slice();for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){const p=y*w+x;if(keep[p])continue;const n=keep[p-1]+keep[p+1]+keep[p-w]+keep[p+w];if(n>=3)out[p]=1}
 return{w,h,mask:out,image:im};
}
function bboxOf(mask,w,h){let x0=w,y0=h,x1=-1,y1=-1,n=0;for(let y=0;y<h;y++)for(let x=0;x<w;x++)if(mask[y*w+x]){x0=Math.min(x0,x);x1=Math.max(x1,x);y0=Math.min(y0,y);y1=Math.max(y1,y);n++}return x1<0?null:{x0,y0,x1,y1,w:x1-x0+1,h:y1-y0+1,n}}
function drawMask(a,b){maskView.width=a.w;maskView.height=a.h;const c=maskView.getContext('2d'),im=c.createImageData(a.w,a.h);for(let p=0;p<a.w*a.h;p++){const v=a.mask[p]?255:0,i=p*4;im.data[i]=im.data[i+1]=im.data[i+2]=v;im.data[i+3]=255}c.putImageData(im,0,0);const cov=b?b.n/(a.w*a.h):0;$('maskMetrics').innerHTML=`<span>人物保持率</span><b>${Math.round(cov*100)}%</b><span>外接範囲</span><b>${b?b.w+'×'+b.h:'なし'}</b><span>判定</span><b class="${b&&cov>.03&&cov<.7?'ok':'warn'}">${b?'抽出完了':'抽出失敗'}</b>`}
function widthsByRow(mask,w,b){const rows=[];for(let y=b.y0;y<=b.y1;y++){let l=w,r=-1;for(let x=b.x0;x<=b.x1;x++)if(mask[y*w+x]){l=Math.min(l,x);r=Math.max(r,x)}rows.push(r>=l?{l,r,width:r-l+1,c:(l+r)/2}:{l:0,r:-1,width:0,c:(b.x0+b.x1)/2})}return rows}
function median(a){if(!a.length)return 0;const s=[...a].sort((x,y)=>x-y);return s[(s.length/2)|0]}
function analyzeSilhouette(mask,w,h){const b=bboxOf(mask,w,h);if(!b)throw new Error('人物を抽出できません');const rows=widthsByRow(mask,w,b),H=b.h;
 const range=(a,z)=>rows.slice(Math.floor(H*a),Math.max(Math.floor(H*a)+1,Math.floor(H*z))).filter(r=>r.width>0).map(r=>r.width);
 const top=range(0,.28),headMax=Math.max(...top,1);let neckIndex=Math.round(H*.25);
 for(let i=Math.round(H*.12);i<Math.round(H*.38);i++)if(rows[i].width>0&&rows[i].width<headMax*.62){neckIndex=i;break}
 const shoulderBand=range(clamp(neckIndex/H,.18,.36),clamp(neckIndex/H+.16,.30,.52));
 const waistBand=range(.35,.55),hipBand=range(.48,.68);
 const shoulder=Math.max(...shoulderBand,1),waist=Math.max(1,Math.min(...waistBand.filter(v=>v>0))),hip=Math.max(...hipBand,1);
 let crotch=Math.round(H*.62);for(let i=Math.round(H*.48);i<Math.round(H*.76);i++){const r=rows[i];if(r.width>0){let segments=0,on=false;const y=b.y0+i;for(let x=b.x0;x<=b.x1;x++){const v=mask[y*w+x];if(v&&!on){segments++;on=true}if(!v)on=false}if(segments>=2){crotch=i;break}}}
 return{bbox:b,rows,headWidth:headMax,headHeight:neckIndex,shoulderWidth:shoulder,waistWidth:waist,hipWidth:hip,legLength:H-crotch,crotch,bodyHeight:H};
}
function imageToMask(img){const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');x.drawImage(img,0,0,128,128);const im=x.getImageData(0,0,128,128),m=new Uint8Array(16384);for(let p=0;p<16384;p++)m[p]=im.data[p*4+3]>20?1:0;return{canvas:c,image:im,mask:m,w:128,h:128}}
function makeCPS(src,base){const ratio=(a,b,lo,hi)=>clamp(a/Math.max(1,b),lo,hi);return{schema:'SpriteStudio.CPS.MVP.v0.1',bodyLibrary:'Female_Standard_01',outputSize:128,source:{width:inputView.width,height:inputView.height},parameters:{headWidth:ratio(src.headWidth/src.bodyHeight,base.headWidth/base.bodyHeight,.88,1.12),shoulderWidth:ratio(src.shoulderWidth/src.bodyHeight,base.shoulderWidth/base.bodyHeight,.88,1.12),waistWidth:ratio(src.waistWidth/src.bodyHeight,base.waistWidth/base.bodyHeight,.88,1.10),hipWidth:ratio(src.hipWidth/src.bodyHeight,base.hipWidth/base.bodyHeight,.90,1.12),headLength:ratio(src.headHeight/src.bodyHeight,base.headHeight/base.bodyHeight,.92,1.08),legLength:ratio(src.legLength/src.bodyHeight,base.legLength/base.bodyHeight,.92,1.10)},safety:{clamped:true,geometryGeneration:false,rowSectionMorph:true}}}
function renderMorphed(lib,cps){const src=lib.image.data,sm=lib.mask,b=lib.metrics.bbox,rows=lib.metrics.rows,H=b.h,p=cps.parameters;const ctx=outputView.getContext('2d'),out=ctx.createImageData(128,128),d=out.data;
 const srcCuts=[0,lib.metrics.headHeight/H,lib.metrics.crotch/H,1];let targetCuts=[0,srcCuts[1]*p.headLength,1-(1-srcCuts[2])*p.legLength,1];targetCuts[1]=clamp(targetCuts[1],.12,.34);targetCuts[2]=clamp(targetCuts[2],targetCuts[1]+.25,.80);
 const mapY=t=>{for(let i=0;i<3;i++)if(t<=targetCuts[i+1]){const q=(t-targetCuts[i])/Math.max(.001,targetCuts[i+1]-targetCuts[i]);return srcCuts[i]+q*(srcCuts[i+1]-srcCuts[i])}return 1};
 const widthScale=t=>{const knots=[0,srcCuts[1],.45,srcCuts[2],1],vals=[p.headWidth,p.shoulderWidth,p.waistWidth,p.hipWidth,1];for(let i=0;i<knots.length-1;i++)if(t<=knots[i+1]){const q=clamp((t-knots[i])/Math.max(.001,knots[i+1]-knots[i]),0,1),s=q*q*(3-2*q);return vals[i]+(vals[i+1]-vals[i])*s}return 1};
 for(let ty=b.y0;ty<=b.y1;ty++){const tn=(ty-b.y0)/Math.max(1,H-1),sn=mapY(tn),ri=clamp(Math.round(sn*(H-1)),0,H-1),sy=b.y0+ri,row=rows[ri];if(!row||row.width<1)continue;const cx=row.c,scale=widthScale(tn);let dl=Math.round(64+(row.l-cx)*scale),dr=Math.round(64+(row.r-cx)*scale);dl=clamp(dl,0,127);dr=clamp(dr,0,127);for(let tx=dl;tx<=dr;tx++){const sx=Math.round(cx+(tx-64)/Math.max(.01,scale));if(sx<0||sx>127||!sm[sy*128+sx])continue;const si=(sy*128+sx)*4,di=(ty*128+tx)*4;d[di]=src[si];d[di+1]=src[si+1];d[di+2]=src[si+2];d[di+3]=src[si+3]}}
 ctx.clearRect(0,0,128,128);ctx.putImageData(out,0,0);outputReady=true;return qualityCheck(out.data);
}
function qualityCheck(d){const on=p=>d[p*4+3]>0,seen=new Uint8Array(16384),sizes=[];let colors=new Set(),holes=0,isolated=0,y0=128,y1=-1;
 for(let p=0;p<16384;p++)if(on(p)){colors.add((d[p*4]<<16)|(d[p*4+1]<<8)|d[p*4+2]);const y=(p/128)|0;y0=Math.min(y0,y);y1=Math.max(y1,y)}
 for(let p=0;p<16384;p++){if(!on(p)||seen[p])continue;const q=[p];seen[p]=1;let n=0;for(let i=0;i<q.length;i++){const v=q[i],x=v%128,y=(v/128)|0;n++;for(const u of [v-1,v+1,v-128,v+128]){if(u<0||u>=16384||seen[u]||!on(u))continue;const ux=u%128,uy=(u/128)|0;if(Math.abs(ux-x)+Math.abs(uy-y)!==1)continue;seen[u]=1;q.push(u)}}sizes.push(n)}
 for(let y=1;y<127;y++)for(let x=1;x<127;x++){const p=y*128+x,n=[p-1,p+1,p-128,p+128].filter(on).length;if(on(p)&&n===0)isolated++;if(!on(p)&&n===4)holes++}
 let emptyRows=0;if(y1>=y0)for(let y=y0;y<=y1;y++){let n=0;for(let x=0;x<128;x++)n+=on(y*128+x);if(!n)emptyRows++}
 const detached=Math.max(0,sizes.length-1),score=clamp(Math.round(100-detached*18-emptyRows*12-holes*2-isolated*3-Math.max(0,colors.size-32)),0,100),pass=detached===0&&emptyRows===0&&holes<=2&&score>=85;
 $('quality').innerHTML=`<span>総合品質</span><b class="${pass?'ok':score>=70?'warn':'bad'}">${score}/100 ${pass?'合格':'要確認'}</b><span>接続分断</span><b>${detached}</b><span>空白行</span><b>${emptyRows}</b><span>1px穴 / 孤立</span><b>${holes} / ${isolated}</b><span>使用色</span><b>${colors.size}</b>`;$('meter').style.width=score+'%';return{score,pass,detached,emptyRows,holes,isolated,colors:colors.size};
}
function showCPS(cps,src,q){$('cpsMetrics').innerHTML=`<span>頭幅</span><b>${cps.parameters.headWidth.toFixed(3)}</b><span>肩幅</span><b>${cps.parameters.shoulderWidth.toFixed(3)}</b><span>腰幅</span><b>${cps.parameters.waistWidth.toFixed(3)}</b><span>骨盤幅</span><b>${cps.parameters.hipWidth.toFixed(3)}</b><span>頭部長</span><b>${cps.parameters.headLength.toFixed(3)}</b><span>脚長</span><b>${cps.parameters.legLength.toFixed(3)}</b>`;cps.extraction={headWidthPx:src.headWidth,shoulderWidthPx:src.shoulderWidth,waistWidthPx:src.waistWidth,hipWidthPx:src.hipWidth,quality:q};$('jsonView').textContent=JSON.stringify(cps,null,2)}
function run(){if(!original){setStatus('先に画像を選択してください。','warn');return}if(!libraryImage.complete){setStatus('素体ライブラリを準備中です。もう一度押してください。','warn');return}try{setStatus('シルエット解析中…');const a=getMaskFromInput(),b=bboxOf(a.mask,a.w,a.h);drawMask(a,b);const src=analyzeSilhouette(a.mask,a.w,a.h),libRaw=imageToMask(libraryImage),base=analyzeSilhouette(libRaw.mask,128,128);libRaw.metrics=base;currentCPS=makeCPS(src,base);const q=renderMorphed(libRaw,currentCPS);showCPS(currentCPS,src,q);setStatus(`生成完了：品質 ${q.score}/100` ,q.pass?'ok':'warn')}catch(err){console.error(err);setStatus('解析失敗：'+err.message,'bad')}}

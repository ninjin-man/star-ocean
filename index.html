<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Sprite Studio Character Builder MVP</title>
<style>
:root{--bg:#10141c;--panel:#1a202b;--line:#30394a;--text:#f3f5f8;--muted:#9ea9ba;--accent:#79a7ff}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}
header{padding:14px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#10141cf2;backdrop-filter:blur(12px);z-index:5}
header h1{font-size:18px;margin:0 0 3px} header p{font-size:12px;color:var(--muted);margin:0}
main{max-width:880px;margin:auto;padding:14px;display:grid;gap:14px;grid-template-columns:minmax(0,1fr)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px}
.preview{display:grid;place-items:center;min-height:360px;background:linear-gradient(45deg,#171c25 25%,#202633 25%,#202633 50%,#171c25 50%,#171c25 75%,#202633 75%);background-size:24px 24px;border-radius:12px;border:1px solid var(--line)}
canvas{width:min(78vw,460px);height:min(78vw,460px);image-rendering:pixelated;image-rendering:crisp-edges}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px} label{font-size:12px;color:var(--muted);display:grid;gap:6px}
select,input[type=color],button{width:100%;min-height:44px;border-radius:10px;border:1px solid var(--line);background:#121722;color:var(--text);padding:10px;font-size:15px}
button{background:#2f6fec;border-color:#4e84ef;font-weight:700} .secondary{background:#202735} .row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.status{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.6} .badge{display:inline-block;padding:3px 7px;border-radius:999px;background:#253048;color:#bdd0ff;margin-right:5px}
@media(min-width:760px){main{grid-template-columns:1.1fr .9fr} .preview-card{grid-row:span 2}}
</style>
</head>
<body>
<header><h1>Character Builder MVP</h1><p>女性標準素体Mを基準に、顔・髪・衣装を組み立てて128px PNGを書き出します。</p></header>
<main>
<section class="card preview-card">
  <div class="preview"><canvas id="canvas" width="128" height="128"></canvas></div>
  <div class="row"><button id="exportBtn">PNGを書き出す</button><button id="anchorsBtn" class="secondary">アンカー表示</button></div>
  <div class="status"><span class="badge">128×128</span><span class="badge">iPhone対応</span><span class="badge">単一HTML</span><br>現在は「1体を完成させる」MVPです。パーツライブラリは後から追加できます。</div>
</section>
<section class="card">
  <div class="controls">
    <label>顔<select id="face"><option value="standard">標準</option><option value="gentle">やさしい</option><option value="serious">凛々しい</option></select></label>
    <label>耳<select id="ear"><option value="normal">標準耳</option><option value="small">小さめ耳</option><option value="elf">エルフ耳</option></select></label>
    <label>髪<select id="hair"><option value="bob">ボブ</option><option value="long">ロング</option><option value="ponytail">ポニーテール</option></select></label>
    <label>衣装<select id="costume"><option value="uniform">制服</option><option value="adventurer">冒険者</option><option value="dress">ワンピース</option></select></label>
    <label>髪色<input id="hairColor" type="color" value="#6d668c"></label>
    <label>衣装色<input id="clothColor" type="color" value="#3f466d"></label>
    <label>瞳色<input id="eyeColor" type="color" value="#515a78"></label>
    <label>差し色<input id="accentColor" type="color" value="#b989a8"></label>
  </div>
</section>
<section class="card"><strong>組み立て順</strong><div class="status">後ろ髪 → 素体 → 耳 → 衣装 → 前髪 → 顔 → ハイライト。素体の接続位置を固定し、キャラ差分だけをRendererで重ねます。</div></section>
</main>

let showAnchors=false;
const $=id=>document.getElementById(id);
['face','ear','hair','costume','hairColor','clothColor','eyeColor','accentColor'].forEach(id=>$(id).addEventListener('input',draw));
$('anchorsBtn').onclick=()=>{showAnchors=!showAnchors;draw();};
$('exportBtn').onclick=()=>{const a=document.createElement('a');a.download='character_128.png';a.href=c.toDataURL('image/png');a.click();};
function px(x,y,w,h,color){ctx.fillStyle=color;ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h));}
function poly(points,color){ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);ctx.closePath();ctx.fill();}
function shade(hex,amt){let n=parseInt(hex.slice(1),16),r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');}
function drawBackHair(style,col){const dark=shade(col,-36),shadow=shade(col,-18);if(style==='bob'){poly([[44,15],[84,15],[91,31],[88,54],[79,66],[49,66],[40,54],[37,31]],dark);poly([[41,23],[87,23],[88,48],[82,62],[46,62],[40,48]],shadow);}else if(style==='long'){poly([[43,14],[85,14],[92,31],[90,102],[81,116],[73,105],[55,105],[47,116],[38,102],[36,31]],dark);poly([[41,22],[87,22],[87,92],[78,107],[50,107],[41,92]],shadow);}else{poly([[43,14],[85,14],[91,30],[87,61],[76,69],[52,69],[40,61],[37,30]],dark);poly([[83,27],[101,39],[98,75],[88,82],[84,55]],shadow);}}
function drawEars(type){const skin='#f2b393',outline='#74322f';let y=31;if(type==='small'){px(39,y,3,6,outline);px(40,y+1,2,4,skin);px(86,y,3,6,outline);px(86,y+1,2,4,skin);}else if(type==='elf'){poly([[40,31],[27,34],[40,39]],outline);poly([[39,33],[29,34],[39,37]],skin);poly([[88,31],[101,34],[88,39]],outline);poly([[89,33],[99,34],[89,37]],skin);}}
function drawCostume(type,col,accent){const dark=shade(col,-34),light=shade(col,26);if(type==='uniform'){poly([[46,52],[82,52],[91,74],[86,103],[42,103],[37,74]],col);poly([[52,51],[64,63],[76,51],[71,68],[57,68]],light);px(62,63,4,22,accent);poly([[41,70],[31,86],[35,91],[46,76]],dark);poly([[87,70],[97,86],[93,91],[82,76]],dark);px(45,101,38,5,dark);}else if(type==='adventurer'){poly([[46,51],[82,51],[88,70],[84,100],[44,100],[40,70]],col);poly([[46,51],[55,62],[73,62],[82,51],[77,74],[51,74]],light);px(50,73,28,4,accent);px(61,55,6,45,dark);px(43,95,42,7,dark);poly([[40,65],[30,86],[36,90],[48,70]],col);poly([[88,65],[98,86],[92,90],[80,70]],col);}else{poly([[46,52],[82,52],[87,69],[94,108],[34,108],[41,69]],col);poly([[50,52],[64,64],[78,52],[72,67],[56,67]],light);px(61,65,6,12,accent);poly([[41,69],[31,85],[36,90],[47,75]],light);poly([[87,69],[97,85],[92,90],[81,75]],light);}}
function drawFrontHair(style,col){const dark=shade(col,-42),light=shade(col,20);poly([[43,18],[52,10],[76,10],[86,19],[89,32],[85,42],[81,31],[76,42],[70,29],[65,43],[59,29],[53,41],[48,30],[43,39],[39,31]],dark);poly([[45,18],[55,13],[75,13],[84,20],[84,27],[78,22],[73,33],[67,20],[61,34],[55,21],[48,31]],col);px(53,15,20,2,light);if(style==='long'){poly([[41,34],[48,36],[46,78],[39,89],[39,54]],dark);poly([[87,34],[80,36],[82,78],[89,89],[89,54]],dark);} if(style==='bob'){poly([[40,35],[48,37],[47,61],[40,67]],dark);poly([[88,35],[80,37],[81,61],[88,67]],dark);}}
function drawFace(type,eye){const outline='#49292d';let ey=35;if(type==='gentle'){px(49,ey,5,2,outline);px(74,ey,5,2,outline);px(50,ey+2,3,2,eye);px(75,ey+2,3,2,eye);px(61,45,6,1,'#a85c57');}else if(type==='serious'){px(49,ey-2,6,1,outline);px(73,ey-2,6,1,outline);px(50,ey,4,3,eye);px(74,ey,4,3,eye);px(61,45,6,1,outline);}else{px(49,ey,5,3,outline);px(74,ey,5,3,outline);px(50,ey,3,2,eye);px(75,ey,3,2,eye);px(62,45,4,2,'#a85c57');}px(63,41,2,1,'#bd7665');}
function anchors(){ctx.fillStyle='#56d28b';[[64,12],[64,49],[45,54],[83,54],[37,76],[91,76],[50,89],[78,89],[50,111],[78,111]].forEach(([x,y])=>{ctx.fillRect(x-1,y-1,3,3)});}
function draw(){ctx.clearRect(0,0,128,128);drawBackHair($('hair').value,$('hairColor').value);ctx.drawImage(base,0,0);drawEars($('ear').value);drawCostume($('costume').value,$('clothColor').value,$('accentColor').value);drawFrontHair($('hair').value,$('hairColor').value);drawFace($('face').value,$('eyeColor').value);px(50,14,22,1,shade($('hairColor').value,35));if(showAnchors)anchors();}
base.onload=draw;
</script>

<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Non-AI Character Analyzer v0.1</title>
<style>
:root{--bg:#10131a;--panel:#181d27;--ink:#eef2ff;--muted:#9aa4b2;--line:#303848;--accent:#8fd3ff;--ok:#7ee787;--warn:#ffd166}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;font-size:15px}
header{padding:14px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(16,19,26,.94);backdrop-filter:blur(10px);z-index:2}
h1{font-size:18px;margin:0 0 4px}.sub{color:var(--muted);font-size:12px;line-height:1.4}
main{padding:12px;max-width:1100px;margin:auto}.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin:0 0 12px;box-shadow:0 8px 30px rgba(0,0,0,.16)}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.btn{appearance:none;border:1px solid var(--line);background:#222a38;color:var(--ink);border-radius:11px;padding:10px 12px;font-weight:700;min-height:42px}
.btn.primary{background:#12324a;border-color:#245b80;color:#dff3ff}.btn.good{background:#15351f;border-color:#286c3d;color:#d9ffe2}.btn:disabled{opacity:.45} input[type=file]{display:none}
label.btn{display:inline-flex;align-items:center}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}@media(min-width:900px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
.panel{background:#0d1118;border:1px solid var(--line);border-radius:12px;padding:8px}.panel h2{font-size:13px;margin:0 0 7px;color:#d8e6ff}.canvasWrap{background:#fff;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:120px}canvas{max-width:100%;height:auto;image-rendering:auto;display:block}.controls{display:grid;grid-template-columns:1fr;gap:8px}.control{display:grid;grid-template-columns:120px 1fr 44px;gap:8px;align-items:center;color:var(--muted);font-size:13px}.control input{width:100%}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;white-space:pre-wrap;color:#d4dcff;background:#0d1118;border:1px solid var(--line);border-radius:10px;padding:10px;max-height:280px;overflow:auto}.pill{display:inline-block;padding:2px 8px;border-radius:999px;background:#263040;color:#c8d5e8;font-size:12px;margin:2px}.note{color:var(--muted);line-height:1.55}.warn{color:var(--warn)}
</style>
</head>
<body>
<header>
<h1>Non-AI Character Analyzer v0.1</h1>
<div class="sub">AI・外部APIなし。Canvas上の従来型画像処理だけで、シルエット、スケルトン、色クラスタ、Region ID、候補分類を作ります。</div>
</header>
<main>
<section class="card">
  <div class="row">
    <label class="btn primary">画像を選ぶ<input id="file" type="file" accept="image/*"></label>
    <button id="sample" class="btn">サンプル読込</button>
    <button id="run" class="btn good" disabled>解析実行</button>
    <button id="downloadPng" class="btn" disabled>まとめPNG保存</button>
    <button id="downloadJson" class="btn" disabled>JSON保存</button>
    <button id="downloadCsv" class="btn" disabled>CSV保存</button>
  </div>
</section>
<section class="card controls">
  <div class="control"><span>背景差分</span><input id="bgThreshold" type="range" min="8" max="90" value="28"><b id="bgThresholdV">28</b></div>
  <div class="control"><span>最小領域</span><input id="minArea" type="range" min="10" max="900" value="120"><b id="minAreaV">120</b></div>
  <div class="control"><span>色クラスタ</span><input id="kValue" type="range" min="4" max="12" value="8"><b id="kValueV">8</b></div>
</section>
<section class="grid">
  <div class="panel"><h2>0. 元画像</h2><div class="canvasWrap"><canvas id="cOriginal"></canvas></div></div>
  <div class="panel"><h2>1. 前景シルエット</h2><div class="canvasWrap"><canvas id="cMask"></canvas></div></div>
  <div class="panel"><h2>2. スケルトン化</h2><div class="canvasWrap"><canvas id="cSkeleton"></canvas></div></div>
  <div class="panel"><h2>3. 頭・胴・脚 分割</h2><div class="canvasWrap"><canvas id="cBodyZones"></canvas></div></div>
  <div class="panel"><h2>4. 色クラスタ</h2><div class="canvasWrap"><canvas id="cCluster"></canvas></div></div>
  <div class="panel"><h2>5. Region ID</h2><div class="canvasWrap"><canvas id="cRegions"></canvas></div></div>
  <div class="panel"><h2>6. ルール分類候補</h2><div class="canvasWrap"><canvas id="cClassified"></canvas></div></div>
  <div class="panel"><h2>7. まとめ出力</h2><div class="canvasWrap"><canvas id="cSummary"></canvas></div></div>
  <div class="panel"><h2>8. 解析ログ</h2><div id="log" class="mono">画像を選んでください。</div></div>
</section>
<section class="card">
  <div class="note"><span class="warn">注意：</span>これは意味認識AIではありません。分類名は、色・位置・面積・外接矩形・左右位置などのルールによる「候補」です。</div>
</section>
</main>
<script>
const $=id=>document.getElementById(id);
const cvsIds=['cOriginal','cMask','cSkeleton','cBodyZones','cCluster','cRegions','cClassified','cSummary'];
const canvases=Object.fromEntries(cvsIds.map(id=>[id,$(id)]));
let sourceImg=null, originalData=null, result=null;
['bgThreshold','minArea','kValue'].forEach(id=>{$(id).oninput=()=>$(id+'V').textContent=$(id).value});
$('file').onchange=e=>{const f=e.target.files[0]; if(f) loadImage(URL.createObjectURL(f));};
$('sample').onclick=()=>loadImage('sample.png');
$('run').onclick=()=>analyze();
$('downloadPng').onclick=()=>downloadCanvas(canvases.cSummary,'non_ai_character_analysis_summary.png');
$('downloadJson').onclick=()=>downloadText(JSON.stringify(result?.data||{},null,2),'non_ai_character_analysis.json','application/json');
$('downloadCsv').onclick=()=>downloadText(toCSV(result?.data?.regions||[]),'non_ai_character_regions.csv','text/csv');
function loadImage(src){const img=new Image();img.onload=()=>{sourceImg=img; drawOriginal(); $('run').disabled=false; log('画像読込完了。解析実行できます。');};img.src=src;}
function drawOriginal(){const maxH=720, maxW=480;let w=sourceImg.width,h=sourceImg.height,s=Math.min(1,maxW/w,maxH/h);w=Math.round(w*s);h=Math.round(h*s);for(const c of Object.values(canvases)){c.width=w;c.height=h;} const ctx=canvases.cOriginal.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.drawImage(sourceImg,0,0,w,h);originalData=ctx.getImageData(0,0,w,h);}
function analyze(){drawOriginal();const w=originalData.width,h=originalData.height;const bgT=+$('bgThreshold').value,minArea=+$('minArea').value,K=+$('kValue').value;
 const bg=estimateBg(originalData); let mask=makeMask(originalData,bg,bgT); mask=close(open(mask,w,h),w,h); const largest=largestComponent(mask,w,h); mask=largest.mask; const bbox=largest.bbox;
 drawMask(mask,w,h,bbox); const skel=skeletonize(mask,w,h); drawSkeleton(skel,mask,w,h); const zones=computeZones(bbox); drawZones(mask,w,h,zones,bbox);
 const km=kmeansColors(originalData,mask,w,h,K); drawCluster(originalData,mask,km,w,h); const regs=makeRegions(km.labels,mask,w,h,minArea,km.centers,bbox,zones); classifyRegions(regs,bbox,zones,w,h); drawRegions(originalData,regs,w,h); drawClassified(originalData,regs,w,h); makeSummary(w,h);
 result={data:{image:{width:w,height:h},background:bg,bbox,zones,palette:km.centers.map(rgbHex),regions:regs.map(cleanRegion)}};
 $('downloadPng').disabled=$('downloadJson').disabled=$('downloadCsv').disabled=false;
 log(makeLog(result.data));}
function estimateBg(img){const w=img.width,h=img.height,d=img.data,pts=[[2,2],[w-3,2],[2,h-3],[w-3,h-3],[w/2|0,2],[w/2|0,h-3]];let r=0,g=0,b=0;for(const [x,y] of pts){const i=(y*w+x)*4;r+=d[i];g+=d[i+1];b+=d[i+2];}return [r/pts.length|0,g/pts.length|0,b/pts.length|0];}
function dist(a,b){let dr=a[0]-b[0],dg=a[1]-b[1],db=a[2]-b[2];return Math.sqrt(dr*dr+dg*dg+db*db)}
function makeMask(img,bg,t){const w=img.width,h=img.height,d=img.data,m=new Uint8Array(w*h);for(let i=0,p=0;i<d.length;i+=4,p++){const dd=dist([d[i],d[i+1],d[i+2]],bg); if(dd>t && d[i+3]>10) m[p]=1;} return m;}
function morph(mask,w,h,type){const out=new Uint8Array(w*h);for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){let count=0;for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++)count+=mask[(y+dy)*w+x+dx];out[y*w+x]= type==='erode' ? (count>=7?1:0) : (count>=1?1:0);}return out;}
function open(m,w,h){return morph(morph(m,w,h,'erode'),w,h,'dilate')} function close(m,w,h){return morph(morph(m,w,h,'dilate'),w,h,'erode')}
function largestComponent(mask,w,h){const seen=new Uint8Array(w*h), qx=[],qy=[];let best=[];for(let p=0;p<w*h;p++){if(!mask[p]||seen[p])continue;let arr=[],head=0;qx[0]=p%w;qy[0]=p/w|0;seen[p]=1;while(head<qx.length){const x=qx[head],y=qy[head++],idx=y*w+x;arr.push(idx);for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){const nx=x+dx,ny=y+dy,ni=ny*w+nx;if(nx>=0&&ny>=0&&nx<w&&ny<h&&mask[ni]&&!seen[ni]){seen[ni]=1;qx.push(nx);qy.push(ny);}}} if(arr.length>best.length)best=arr;qx.length=qy.length=0;}const out=new Uint8Array(w*h);let minX=w,minY=h,maxX=0,maxY=0;for(const idx of best){out[idx]=1;const x=idx%w,y=idx/w|0;if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;}return {mask:out,bbox:{x:minX,y:minY,w:maxX-minX+1,h:maxY-minY+1,area:best.length}};}
function skeletonize(mask,w,h){let img=new Uint8Array(mask),changed=true,iter=0;const P=(x,y)=>img[y*w+x];while(changed&&iter++<80){changed=false;for(let pass=0;pass<2;pass++){const del=[];for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){if(!P(x,y))continue;const p2=P(x,y-1),p3=P(x+1,y-1),p4=P(x+1,y),p5=P(x+1,y+1),p6=P(x,y+1),p7=P(x-1,y+1),p8=P(x-1,y),p9=P(x-1,y-1);const ns=p2+p3+p4+p5+p6+p7+p8+p9;if(ns<2||ns>6)continue;const seq=[p2,p3,p4,p5,p6,p7,p8,p9,p2];let tr=0;for(let i=0;i<8;i++)if(seq[i]===0&&seq[i+1]===1)tr++;if(tr!==1)continue;if(pass===0){if(p2*p4*p6!==0||p4*p6*p8!==0)continue;}else{if(p2*p4*p8!==0||p2*p6*p8!==0)continue;}del.push(y*w+x);}}for(const i of del){img[i]=0;changed=true;}}return img;}
function computeZones(b){return {head:{x:b.x,y:b.y,w:b.w,h:Math.round(b.h*.24)},torso:{x:b.x,y:b.y+Math.round(b.h*.20),w:b.w,h:Math.round(b.h*.40)},legs:{x:b.x,y:b.y+Math.round(b.h*.55),w:b.w,h:Math.round(b.h*.45)}}}
function kmeansColors(img,mask,w,h,K){const d=img.data,pixels=[],idxs=[];for(let p=0;p<w*h;p+=2){if(mask[p]){const i=p*4;pixels.push([d[i],d[i+1],d[i+2]]);idxs.push(p);}} if(pixels.length<1)return {centers:[],labels:new Int16Array(w*h).fill(-1)};let centers=[];for(let k=0;k<K;k++) centers.push(pixels[Math.floor((pixels.length-1)*k/Math.max(1,K-1))].slice());let assign=new Int16Array(pixels.length);for(let it=0;it<10;it++){let sums=Array.from({length:K},()=>[0,0,0,0]);for(let i=0;i<pixels.length;i++){let bi=0,bd=1e9;for(let k=0;k<K;k++){const dd=dist(pixels[i],centers[k]);if(dd<bd){bd=dd;bi=k}}assign[i]=bi;const s=sums[bi],px=pixels[i];s[0]+=px[0];s[1]+=px[1];s[2]+=px[2];s[3]++;}for(let k=0;k<K;k++){if(sums[k][3])centers[k]=[sums[k][0]/sums[k][3]|0,sums[k][1]/sums[k][3]|0,sums[k][2]/sums[k][3]|0];}}
 const labels=new Int16Array(w*h).fill(-1);for(let i=0;i<idxs.length;i++)labels[idxs[i]]=assign[i];return {centers,labels};}
function makeRegions(labels,mask,w,h,minArea,centers,bbox,zones){const seen=new Uint8Array(w*h),regs=[];let id=1;for(let p=0;p<w*h;p++){const lab=labels[p];if(!mask[p]||lab<0||seen[p])continue;let q=[p],head=0,arr=[],minX=w,minY=h,maxX=0,maxY=0,sx=0,sy=0;seen[p]=1;while(head<q.length){const idx=q[head++],x=idx%w,y=idx/w|0;arr.push(idx);sx+=x;sy+=y;if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){const nx=x+dx,ny=y+dy,ni=ny*w+nx;if(nx>=0&&ny>=0&&nx<w&&ny<h&&!seen[ni]&&labels[ni]===lab){seen[ni]=1;q.push(ni)}}} if(arr.length>=minArea){regs.push({id:id++,label:lab,color:centers[lab],pixels:arr,bbox:{x:minX,y:minY,w:maxX-minX+1,h:maxY-minY+1},area:arr.length,cx:sx/arr.length,cy:sy/arr.length,candidates:[]});}}
 regs.sort((a,b)=>b.area-a.area); regs.forEach((r,i)=>r.id=i+1); return regs.slice(0,80);}
function classifyRegions(regs,b,z,w,h){const mid=b.x+b.w/2;for(const r of regs){const [R,G,B]=r.color;const sat=(Math.max(R,G,B)-Math.min(R,G,B))/Math.max(1,Math.max(R,G,B));const light=(R+G+B)/3;const inHead=r.cy<z.head.y+z.head.h*1.25;const inTorso=r.cy>z.torso.y&&r.cy<z.torso.y+z.torso.h;const inLeg=r.cy>z.legs.y;const side=Math.abs(r.cx-mid)/(b.w/2);const skin=R>G&&G>B&&R>150&&G>90;const green=G>=R&&G>=B&&G>45&&B<120;const paleGreen=G>=R&&G>=B&&light>130;const hair=(sat<.25&&inHead)||(sat<.35&&r.bbox.h>b.h*.18&&r.cy<b.y+b.h*.45);const gold=R>130&&G>95&&B<95&&sat>.25;let cand=[];function add(n,s){cand.push({name:n,score:Math.max(0,Math.min(100,Math.round(s)))})}
 if(hair)add('髪候補',70+(inHead?20:0)+(r.bbox.h>b.h*.25?10:0));
 if(skin&&inHead)add(side>.45?'耳候補':'顔候補',70+(inHead?20:0));
 if(skin&&!inHead)add('肌/腕/手候補',55+(side>.35?20:0));
 if(green&&inTorso)add('胴服候補',80+(r.area>1000?10:0));
 if(green&&inLeg)add('脚服候補',80);
 if(paleGreen&&side>.35)add('袖/布候補',78);
 if(gold)add('装飾候補',75);
 if(r.cy>b.y+b.h*.82)add('靴候補',60+(green?15:0));
 if(!cand.length)add('未分類候補',25);cand.sort((a,b)=>b.score-a.score);r.candidates=cand.slice(0,3);r.primary=r.candidates[0].name;}}
function canvasCtx(c){const ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);return ctx}
function drawMask(mask,w,h,bbox){const c=canvases.cMask,ctx=canvasCtx(c),img=ctx.createImageData(w,h);for(let p=0;p<w*h;p++){const i=p*4,v=mask[p]?0:255;img.data[i]=img.data[i+1]=img.data[i+2]=v;img.data[i+3]=255;}ctx.putImageData(img,0,0);strokeBox(ctx,bbox,'red','silhouette');}
function drawSkeleton(skel,mask,w,h){const c=canvases.cSkeleton,ctx=canvasCtx(c);drawBase(ctx,mask,w,h);ctx.fillStyle='#00e5ff';for(let p=0;p<w*h;p++)if(skel[p])ctx.fillRect(p%w,p/w|0,1,1)}
function drawZones(mask,w,h,z,b){const c=canvases.cBodyZones,ctx=canvasCtx(c);ctx.drawImage(canvases.cOriginal,0,0);strokeBox(ctx,z.head,'#ff4d6d','HEAD');strokeBox(ctx,z.torso,'#ffd166','TORSO');strokeBox(ctx,z.legs,'#4dabf7','LEGS');}
const paletteVis=['#e6194B','#3cb44b','#ffe119','#4363d8','#f58231','#911eb4','#46f0f0','#f032e6','#bcf60c','#fabebe','#008080','#e6beff'];
function drawCluster(img,mask,km,w,h){const c=canvases.cCluster,ctx=canvasCtx(c),out=ctx.createImageData(w,h);for(let p=0;p<w*h;p++){const i=p*4;if(mask[p]&&km.labels[p]>=0){const col=km.centers[km.labels[p]];out.data[i]=col[0];out.data[i+1]=col[1];out.data[i+2]=col[2];out.data[i+3]=255}else{out.data[i]=245;out.data[i+1]=245;out.data[i+2]=245;out.data[i+3]=255}}ctx.putImageData(out,0,0)}
function drawRegions(img,regs,w,h){const c=canvases.cRegions,ctx=canvasCtx(c);ctx.drawImage(canvases.cOriginal,0,0);ctx.lineWidth=2;ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';for(const r of regs.slice(0,30)){ctx.strokeStyle=paletteVis[r.id%paletteVis.length];strokeBox(ctx,r.bbox,ctx.strokeStyle);ctx.fillStyle='rgba(0,0,0,.65)';ctx.beginPath();ctx.arc(r.cx,r.cy,10,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.fillText(String(r.id).padStart(2,'0'),r.cx,r.cy);}}
function drawClassified(img,regs,w,h){const c=canvases.cClassified,ctx=canvasCtx(c);ctx.drawImage(canvases.cOriginal,0,0);ctx.lineWidth=3;ctx.font='bold 12px sans-serif';for(const r of regs.slice(0,40)){const col=colorForClass(r.primary);ctx.strokeStyle=col;strokeBox(ctx,r.bbox,col);ctx.fillStyle=col;ctx.fillRect(r.bbox.x,r.bbox.y-15,Math.min(110,r.primary.length*12),15);ctx.fillStyle='#000';ctx.fillText(r.primary.replace('候補',''),r.bbox.x+3,r.bbox.y-3);}}
function makeSummary(w,h){const sum=canvases.cSummary;sum.width=960;sum.height=1280;const ctx=canvasCtx(sum);ctx.fillStyle='#f6f8fb';ctx.fillRect(0,0,sum.width,sum.height);ctx.fillStyle='#111';ctx.font='bold 24px sans-serif';ctx.fillText('Non-AI Character Analyzer v0.1 / 解析まとめ',24,34);const items=[['元画像',canvases.cOriginal],['シルエット',canvases.cMask],['スケルトン',canvases.cSkeleton],['頭・胴・脚',canvases.cBodyZones],['色クラスタ',canvases.cCluster],['Region ID',canvases.cRegions],['分類候補',canvases.cClassified]];let x=24,y=58,tw=280,th=420;items.forEach((it,i)=>{if(i===3){x=24;y=520;tw=210;th=315}ctx.fillStyle='#fff';ctx.strokeStyle='#cad2df';ctx.lineWidth=1;roundRect(ctx,x,y,tw,th,10,true,true);ctx.fillStyle='#111';ctx.font='bold 16px sans-serif';ctx.fillText(it[0],x+12,y+24);fitDraw(ctx,it[1],x+10,y+38,tw-20,th-48);x+=tw+16;});
 ctx.fillStyle='#fff';ctx.strokeStyle='#cad2df';roundRect(ctx,24,860,912,380,10,true,true);ctx.fillStyle='#111';ctx.font='bold 18px sans-serif';ctx.fillText('Region候補一覧',42,890);ctx.font='13px monospace';let yy=918;const regs=result?.data?.regions || [];for(const r of regs.slice(0,22)){ctx.fillStyle=colorForClass(r.primary);ctx.fillRect(42,yy-10,10,10);ctx.fillStyle='#111';ctx.fillText(`${String(r.id).padStart(2,'0')} ${r.primary}  area=${r.area}  bbox=${r.bbox.w}x${r.bbox.h}  color=${rgbHex(r.color)}`,60,yy);yy+=15;}}
function drawBase(ctx,mask,w,h){ctx.fillStyle='#05070b';ctx.fillRect(0,0,w,h);ctx.strokeStyle='#6fffe9';ctx.lineWidth=1;for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){const p=y*w+x;if(mask[p]&&!mask[p-1]||mask[p]&&!mask[p+1]||mask[p]&&!mask[p-w]||mask[p]&&!mask[p+w])ctx.fillRect(x,y,1,1)}}
function strokeBox(ctx,b,color,label){ctx.save();ctx.strokeStyle=color;ctx.lineWidth=2;ctx.strokeRect(b.x,b.y,b.w,b.h);if(label){ctx.fillStyle=color;ctx.font='bold 13px sans-serif';ctx.fillText(label,b.x+4,b.y+14)}ctx.restore()}
function colorForClass(c){if(c.includes('髪'))return '#ff4db8';if(c.includes('顔')||c.includes('耳')||c.includes('肌'))return '#ff9f80';if(c.includes('胴')||c.includes('脚'))return '#38d27d';if(c.includes('袖'))return '#76e0c1';if(c.includes('装飾'))return '#ffd166';if(c.includes('靴'))return '#ff7f50';return '#9aa4b2'}
function rgbHex(c){return '#'+c.map(v=>Math.round(v).toString(16).padStart(2,'0')).join('').toUpperCase()}
function cleanRegion(r){return {id:r.id,primary:r.primary,candidates:r.candidates,area:r.area,bbox:r.bbox,centroid:{x:Math.round(r.cx),y:Math.round(r.cy)},color:rgbHex(r.color)}}
function makeLog(d){return `画像: ${d.image.width}x${d.image.height}\n前景bbox: x=${d.bbox.x}, y=${d.bbox.y}, w=${d.bbox.w}, h=${d.bbox.h}, area=${d.bbox.area}\n色クラスタ: ${d.palette.join(', ')}\nRegion数: ${d.regions.length}\n\n上位Region:\n`+d.regions.slice(0,18).map(r=>`${String(r.id).padStart(2,'0')} ${r.primary} area=${r.area} bbox=${r.bbox.w}x${r.bbox.h} center=(${r.centroid.x},${r.centroid.y}) ${r.color}`).join('\n')}
function toCSV(regs){return 'id,primary,area,x,y,w,h,cx,cy,color,candidates\n'+regs.map(r=>`${r.id},${r.primary},${r.area},${r.bbox.x},${r.bbox.y},${r.bbox.w},${r.bbox.h},${Math.round(r.cx)},${Math.round(r.cy)},${rgbHex(r.color)},"${r.candidates.map(c=>c.name+':'+c.score).join('|')}"`).join('\n')}
function log(t){$('log').textContent=t} function downloadCanvas(c,name){const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download=name;a.click()} function downloadText(t,n,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([t],{type}));a.download=n;a.click()}
function fitDraw(ctx,c,x,y,w,h){const s=Math.min(w/c.width,h/c.height);const dw=c.width*s,dh=c.height*s;ctx.drawImage(c,x+(w-dw)/2,y+(h-dh)/2,dw,dh)}
function roundRect(ctx,x,y,w,h,r,fill,stroke){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);if(fill)ctx.fill();if(stroke)ctx.stroke()}
</script>

<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sprite Studio MVP</title>
<style>
:root{--bg:#0b1017;--panel:#151d29;--panel2:#0f1620;--line:#2c394c;--text:#f7f9fc;--muted:#aeb9ca;--accent:#4f86f7;--good:#55d391}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}
button,select,input{font:inherit}header{padding:18px 16px 12px;border-bottom:1px solid var(--line)}h1{font-size:22px;margin:0 0 5px}header p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}
main{max-width:760px;margin:auto;padding:14px;display:grid;gap:12px}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px}
.previewGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.pane{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--panel2)}.paneTitle{padding:8px 10px;color:var(--muted);font-size:12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}
.canvasWrap{aspect-ratio:1;display:grid;place-items:center;background:linear-gradient(45deg,#121a25 25%,#1d2836 25%,#1d2836 50%,#121a25 50%,#121a25 75%,#1d2836 75%);background-size:16px 16px}
canvas{width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges}
.controls{display:grid;gap:12px}.row{display:grid;grid-template-columns:1fr 1fr;gap:9px}label{display:grid;gap:5px;font-size:12px;color:var(--muted)}select,input[type=color],button{min-height:46px;border-radius:12px;border:1px solid var(--line);background:#101824;color:var(--text);padding:9px;width:100%}
input[type=color]{padding:4px}button{background:var(--accent);border-color:#77a0ff;font-weight:800}button.secondary{background:#202b3a}button.good{background:#1f7a50;border-color:#4ac889}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}.status{font-size:12px;color:var(--muted);line-height:1.6}.status strong{color:var(--good)}.chips{display:flex;gap:6px;flex-wrap:wrap}.chip{background:#223047;border-radius:999px;padding:4px 8px;font-size:11px;color:#d9e5f5}.note{font-size:12px;line-height:1.65;color:#c9d5e4;background:#101925;border-left:3px solid #72a7ff;padding:10px;border-radius:9px}
@media(max-width:420px){.row,.actions{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<h1>Sprite Studio MVP</h1>
<p>固定素体＋AI作画済みマスター素材から、ゲームキャラクターを自動生成します。</p>
</header>
<main>
<section class="card">
  <div class="previewGrid">
    <div class="pane"><div class="paneTitle"><span>固定素体</span><span>128×128</span></div><div class="canvasWrap"><canvas id="bodyCanvas" width="128" height="128"></canvas></div></div>
    <div class="pane"><div class="paneTitle"><span>生成キャラ</span><span id="seedLabel">Seed 001</span></div><div class="canvasWrap"><canvas id="charCanvas" width="128" height="128"></canvas></div></div>
  </div>
</section>

<section class="card controls">
  <div class="chips"><span class="chip">単一HTML</span><span class="chip">iPhone対応</span><span class="chip">ローカル処理</span><span class="chip">AI作画素材ベース</span></div>

  <div class="row">
    <label>髪色<input id="hairColor" type="color" value="#8f86b5"></label>
    <label>瞳色<input id="eyeColor" type="color" value="#7b5aa6"></label>
  </div>
  <div class="row">
    <label>衣装色<input id="outfitColor" type="color" value="#24243f"></label>
    <label>差し色<input id="accentColor" type="color" value="#c94f51"></label>
  </div>
  <div class="row">
    <label>生成スタイル
      <select id="style">
        <option value="academy">学院魔法使い</option>
        <option value="royal">王宮術師</option>
        <option value="forest">森の魔導士</option>
        <option value="night">夜戦装備</option>
      </select>
    </label>
    <label>素体表示
      <select id="bodyMode">
        <option value="under">下に合成</option>
        <option value="off">非表示</option>
        <option value="only">素体のみ</option>
      </select>
    </label>
  </div>

  <div class="actions">
    <button id="generate">自動生成</button>
    <button id="random" class="secondary">ランダム生成</button>
  </div>
  <div class="actions">
    <button id="save" class="good">PNG保存</button>
    <button id="reset" class="secondary">初期値へ戻す</button>
  </div>

  <div class="status" id="status"><strong>準備完了。</strong>「自動生成」を押すと、マスター素材を素体座標へ合成します。</div>
  <div class="note">MVPでは、品質確認を優先して1体分のAI作画済みマスター素材を使用します。幾何学形状による髪・服の描画は行っていません。色替えは素材の陰影を保持したまま適用します。</div>
</section>
</main>

const $=id=>document.getElementById(id);
const bodyCanvas=$('bodyCanvas'), charCanvas=$('charCanvas');
const bctx=bodyCanvas.getContext('2d'), cctx=charCanvas.getContext('2d');
bctx.imageSmoothingEnabled=false;cctx.imageSmoothingEnabled=false;
const bodyImg=new Image(), masterImg=new Image();
let ready=0, seed=1;

function onReady(){ready++;if(ready===2){drawBody();generate();runTests();}}
bodyImg.onload=onReady; masterImg.onload=onReady;
bodyImg.src=BODY_SRC; masterImg.src=MASTER_SRC;

function hexToRgb(hex){const n=parseInt(hex.slice(1),16);return[(n>>16)&255,(n>>8)&255,n&255]}
function rgbToHsv(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;let h=0;if(d){if(max===r)h=((g-b)/d)%6;else if(max===g)h=(b-r)/d+2;else h=(r-g)/d+4;h*=60;if(h<0)h+=360}return[h,d/max||0,max]}
function hsvToRgb(h,s,v){const c=v*s,x=c*(1-Math.abs((h/60)%2-1)),m=v-c;let r=0,g=0,b=0;if(h<60)[r,g,b]=[c,x,0];else if(h<120)[r,g,b]=[x,c,0];else if(h<180)[r,g,b]=[0,c,x];else if(h<240)[r,g,b]=[0,x,c];else if(h<300)[r,g,b]=[x,0,c];else [r,g,b]=[c,0,x];return[(r+m)*255,(g+m)*255,(b+m)*255]}
function recolorPixel(r,g,b,target,strength=1){const [h,s,v]=rgbToHsv(r,g,b);const [th,ts,tv]=rgbToHsv(...target);const nv=Math.max(0,Math.min(1,v*(0.72+tv*0.55)));const ns=Math.max(0,Math.min(1,s*(1-strength)+Math.max(s,ts*.72)*strength));return hsvToRgb(th,ns,nv)}

function drawBody(){bctx.clearRect(0,0,128,128);bctx.drawImage(bodyImg,0,0,128,128)}

function applyPalette() {
  const work=document.createElement('canvas');work.width=128;work.height=128;
  const wctx=work.getContext('2d',{willReadFrequently:true});wctx.imageSmoothingEnabled=false;
  wctx.drawImage(masterImg,0,0,128,128);
  const im=wctx.getImageData(0,0,128,128), d=im.data;
  const hair=hexToRgb($('hairColor').value), eye=hexToRgb($('eyeColor').value), outfit=hexToRgb($('outfitColor').value), accent=hexToRgb($('accentColor').value);
  for(let i=0;i<d.length;i+=4) {
    if(d[i+3]<20) continue;
    const r=d[i],g=d[i+1],b=d[i+2];
    const [h,s,v]=rgbToHsv(r,g,b);
    let out=null;
    if((h>=220&&h<=310&&s>.08&&v>.28) || (s<.18&&v>.28&&v<.88&&b>=r)) out=recolorPixel(r,g,b,hair,.9);
    else if(v<.36 && (h>190&&h<300 || s<.25)) out=recolorPixel(r,g,b,outfit,.92);
    else if((h<25||h>335)&&s>.32&&v>.22) out=recolorPixel(r,g,b,accent,.95);
    const p=i/4,x=p%128,y=(p/128)|0;
    if(y<47 && x>42 && x<86 && h>220&&h<310&&s>.2&&v<.65) out=recolorPixel(r,g,b,eye,1);
    if(out){d[i]=out[0];d[i+1]=out[1];d[i+2]=out[2]}
  }
  wctx.putImageData(im,0,0);
  return work;
}

function generate() {
  if(ready<2)return;
  cctx.clearRect(0,0,128,128);
  const mode=$('bodyMode').value;
  if(mode==='under'||mode==='only') cctx.drawImage(bodyImg,0,0,128,128);
  if(mode!=='only') cctx.drawImage(applyPalette(),0,0);
  $('seedLabel').textContent='Seed '+String(seed).padStart(3,'0');
  $('status').innerHTML='<strong>生成完了。</strong> 128×128 PNGとして保存できます。';
}

function stylePreset(name) {
  const p={
    academy:['#8f86b5','#7b5aa6','#24243f','#c94f51'],
    royal:['#d9c7a2','#3d74b8','#41305f','#d6a72f'],
    forest:['#6b7c58','#44836b','#263c32','#d1974f'],
    night:['#7186a9','#b4557a','#151b2b','#5e79bf']
  }[name];
  ['hairColor','eyeColor','outfitColor','accentColor'].forEach((id,i)=>$(id).value=p[i]);
}

function randomColor(h1,h2,s=.55,v=.75) {
  const h=h1+Math.random()*(h2-h1), rgb=hsvToRgb(h,s,v).map(Math.round);
  return '#'+rgb.map(n=>n.toString(16).padStart(2,'0')).join('');
}
function randomize() {
  seed++;
  $('hairColor').value=randomColor(0,360,.32,.72);
  $('eyeColor').value=randomColor(180,330,.72,.66);
  $('outfitColor').value=randomColor(190,330,.55,.28);
  $('accentColor').value=randomColor(0,55,.72,.72);
  generate();
}
function reset(){seed=1;$('style').value='academy';$('bodyMode').value='under';stylePreset('academy');generate()}
function save() {
  const a=document.createElement('a');
  a.download='sprite_character_'+String(seed).padStart(3,'0')+'.png';
  a.href=charCanvas.toDataURL('image/png');
  a.click();
}
function runTests() {
  const tests=[];
  tests.push(['画像読込',bodyImg.naturalWidth>0&&masterImg.naturalWidth>0]);
  tests.push(['出力解像度',charCanvas.width===128&&charCanvas.height===128]);
  const data=cctx.getImageData(0,0,128,128).data;let alpha=0;for(let i=3;i<data.length;i+=4)if(data[i])alpha++;
  tests.push(['描画ピクセル',alpha>200]);
  tests.push(['PNG生成',charCanvas.toDataURL('image/png').startsWith('data:image/png')]);
  const failed=tests.filter(t=>!t[1]);
  console.table(tests.map(([name,pass])=>({test:name,result:pass?'PASS':'FAIL'})));
  if(failed.length) $('status').innerHTML='<span style="color:#ff8d8d">デバッグ失敗：</span>'+failed.map(x=>x[0]).join('、');
}

$('generate').addEventListener('click',()=>{seed++;generate()});
$('random').addEventListener('click',randomize);
$('save').addEventListener('click',save);
$('reset').addEventListener('click',reset);
$('style').addEventListener('change',e=>{stylePreset(e.target.value);generate()});
$('bodyMode').addEventListener('change',generate);
['hairColor','eyeColor','outfitColor','accentColor'].forEach(id=>$(id).addEventListener('input',generate));
</script>
</body>

<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>Sprite Studio v5.0</title><style>
:root{--bg:#09111d;--p:#111c2a;--p2:#172638;--line:#30465d;--txt:#eef5fb;--muted:#9cafc1;--blue:#2879c8;--green:#19754c;--gold:#d5ad57}*{box-sizing:border-box}body{margin:0;background:linear-gradient(#071019,#0c1724);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{max-width:1500px;margin:auto;padding:8px}.top{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.title{font-size:20px;font-weight:900;margin-right:auto}.ver{font-size:12px;color:var(--gold)}button,select,input{font:inherit}button{background:#1a2c3e;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:9px;font-weight:700}.primary{background:var(--blue)}.good{background:var(--green)}.layout{display:grid;grid-template-columns:280px minmax(540px,1fr) 330px;gap:8px;margin-top:8px}.panel{background:var(--p);border:1px solid var(--line);border-radius:10px;overflow:hidden}.panel h2{margin:0;padding:10px 12px;font-size:14px;background:var(--p2);border-bottom:1px solid var(--line)}.body{padding:10px}.stack{display:flex;flex-direction:column;gap:8px}.row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}.source{height:260px;background:#050a10;border:1px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden}.source img{max-width:100%;max-height:100%;object-fit:contain}.stageWrap{overflow:auto;background:#06101a;border:1px solid var(--line);border-radius:8px;padding:12px}.stage{position:relative;width:512px;height:512px;touch-action:none;background-color:#111c28;background-image:linear-gradient(45deg,#1d2d3e 25%,transparent 25%),linear-gradient(-45deg,#1d2d3e 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#1d2d3e 75%),linear-gradient(-45deg,transparent 75%,#1d2d3e 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0}.stage canvas{position:absolute;inset:0;width:512px;height:512px;image-rendering:pixelated}.tools{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.tool.active{background:#275f96}.layers{max-height:300px;overflow:auto;display:flex;flex-direction:column;gap:5px}.layer{display:grid;grid-template-columns:32px 1fr 38px;gap:6px;align-items:center;background:#0b1622;border:1px solid #294158;border-radius:7px;padding:5px}.layer.active{border-color:#56aaff}.palette{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}.sw{aspect-ratio:1;padding:0}.sw.active{outline:2px solid #fff}.outputs{display:grid;grid-template-columns:1fr 1fr;gap:7px}.outputs canvas{width:100%;background:#08111d;border:1px solid var(--line);image-rendering:pixelated}.status{white-space:pre-wrap;font:11px ui-monospace,SFMono-Regular,Menlo,monospace;background:#06101a;border:1px solid #263a4d;border-radius:7px;padding:8px;max-height:240px;overflow:auto}.mini{font-size:11px;color:var(--muted)}.hidden{display:none}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}label{font-size:12px;color:#d7e3ee}input[type=range]{width:100%}
@media(max-width:1100px){.layout{grid-template-columns:1fr}}@media(max-width:600px){.app{padding:5px}.stage,.stage canvas{width:384px;height:384px}.source{height:210px}.layout{display:block}.panel{margin-bottom:7px}.top button{flex:1}}
</style></head><body><div class="app"><div class="top"><div class="title">Sprite Studio <span class="ver">v5.0 128 Character Designer</span></div><button id="newBtn">初期化</button><button id="saveBtn">保存</button><label><button id="loadBtn">読込</button><input id="loadInput" class="hidden" type="file" accept="application/json"></label></div><div class="layout">
<div class="stack"><section class="panel"><h2>1. 参考画像</h2><div class="body stack"><label><button id="refBtn" class="primary">画像を読み込む</button><input id="refInput" class="hidden" type="file" accept="image/*"></label><div class="source"><img id="refImg"></div><button id="extractBtn">配色を抽出して適用</button><label>参考画像重ね表示 <input id="overlayRange" type="range" min="0" max="100" value="0"></label><div class="mini">完成画像を縮小せず、128用テンプレートを編集します。</div></div></section>
<section class="panel"><h2>2. デザイン</h2><div class="body stack"><label>印象<select id="styleSel"><option value="cute">かわいい</option><option value="cool">かっこいい</option></select></label><label>頭サイズ<input id="headScale" type="range" min="90" max="120" value="106"></label><label>髪の広がり<input id="hairScale" type="range" min="85" max="125" value="108"></label><label>袖の広がり<input id="sleeveScale" type="range" min="85" max="125" value="112"></label><label>胴の細さ<input id="bodyScale" type="range" min="82" max="110" value="92"></label><button id="applyDesign" class="good">デザインを再生成</button></div></section>
<section class="panel"><h2>3. パレット</h2><div class="body stack"><div id="palette" class="palette"></div><div class="row"><input id="colorInput" type="color"><button id="addColor">色追加</button></div></div></section></div>
<section class="panel"><h2>4. 128×128制作</h2><div class="body stack"><div class="tools"><button class="tool active" data-tool="pen">ペン</button><button class="tool" data-tool="eraser">消しゴム</button><button class="tool" data-tool="fill">塗り</button><button class="tool" data-tool="picker">スポイト</button><button id="undoBtn">戻す</button><button id="redoBtn">進む</button><button id="mirrorBtn">反転</button><button id="gridBtn">グリッド</button></div><div class="stageWrap"><div class="stage"><canvas id="reference" width="128" height="128"></canvas><canvas id="composite" width="128" height="128"></canvas><canvas id="editor" width="128" height="128"></canvas><canvas id="grid" width="128" height="128"></canvas></div></div></div></section>
<div class="stack"><section class="panel"><h2>5. レイヤー</h2><div class="body stack"><div id="layers" class="layers"></div><div class="row"><button id="addLayer">追加</button><button id="deleteLayer">削除</button><button id="upLayer">上へ</button><button id="downLayer">下へ</button></div></div></section><section class="panel"><h2>6. 出力</h2><div class="body stack"><div class="outputs"><canvas id="out128" width="128" height="128"></canvas><canvas id="outPreview" width="256" height="256"></canvas></div><button id="png128" class="primary">128PNG保存</button><button id="jsonExport">制作データJSON</button></div></section><section class="panel"><h2>7. 品質検査</h2><div class="body stack"><button id="qualityBtn" class="good">検査</button><div id="quality" class="status"></div></div></section><section class="panel"><h2>8. 状態</h2><div class="body"><div id="status" class="status"></div></div></section></div>
</div></div><script src="js/app.js"></script></body></html>

<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>Sprite Studio v4</title>
<style>
:root{--bg:#08111b;--panel:#101b28;--panel2:#172638;--line:#31465a;--txt:#eef5fb;--muted:#9cafc1;--blue:#2477c9;--green:#176b43;--gold:#d1a64b;--danger:#9b3945}*{box-sizing:border-box}body{margin:0;background:linear-gradient(#071019,#0b1724);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{padding:8px;max-width:1600px;margin:auto}.top{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.title{font-weight:900;font-size:20px;margin-right:auto}.ver{font-size:12px;color:var(--gold)}button,select,input{font:inherit}button{background:#1b2c3d;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:9px;font-weight:700}.primary{background:var(--blue)}.good{background:var(--green)}.danger{background:var(--danger)}.layout{display:grid;grid-template-columns:280px minmax(520px,1fr) 350px;gap:9px;margin-top:8px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}.panel h2{margin:0;padding:10px 12px;font-size:14px;background:var(--panel2);border-bottom:1px solid var(--line)}.body{padding:10px}.stack{display:flex;flex-direction:column;gap:8px}.row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}.source{height:220px;background:#050a10;border:1px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden}.source img{max-width:100%;max-height:100%;object-fit:contain}.mini{font-size:11px;color:var(--muted)}.canvasArea{display:grid;grid-template-columns:88px 1fr;gap:8px}.tools{display:flex;flex-direction:column;gap:6px}.wrap{background:#06101a;border:1px solid var(--line);border-radius:8px;overflow:auto;padding:14px;min-height:560px}.stage{position:relative;width:512px;height:512px;touch-action:none;background-color:#111c28;background-image:linear-gradient(45deg,#1d2d3e 25%,transparent 25%),linear-gradient(-45deg,#1d2d3e 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#1d2d3e 75%),linear-gradient(-45deg,transparent 75%,#1d2d3e 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0}.stage canvas{position:absolute;inset:0;width:512px;height:512px;image-rendering:pixelated}.palette{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}.swatch{aspect-ratio:1;padding:0}.swatch.active{outline:2px solid white}.timeline{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.frame{background:#0a1520;border:1px solid #2c4358;border-radius:7px;padding:5px;text-align:center}.frame.active{border-color:#53a9ff}.frame canvas{width:100%;image-rendering:pixelated;background:#08111b}.layers{display:flex;flex-direction:column;gap:5px;max-height:230px;overflow:auto}.layer{display:grid;grid-template-columns:34px 1fr 34px;gap:5px;align-items:center;background:#0b1520;border:1px solid #284055;border-radius:7px;padding:5px}.layer.active{border-color:#53a9ff}.outputs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.outputs canvas{width:100%;background:#071019;border:1px solid var(--line);image-rendering:pixelated}.status{white-space:pre-wrap;font:11px ui-monospace,SFMono-Regular,Menlo,monospace;background:#06101a;border:1px solid #24384b;border-radius:7px;padding:8px;max-height:220px;overflow:auto}.hidden{display:none}.badge{font-size:11px;padding:3px 6px;border-radius:999px;background:#1a2d3f;color:#bcd0e2}.tabs{display:flex;gap:4px}.tabs button.active{background:#245f97}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
@media(max-width:1100px){.layout{grid-template-columns:1fr}.wrap{min-height:420px}}@media(max-width:600px){.app{padding:5px}.canvasArea{grid-template-columns:1fr}.tools{display:grid;grid-template-columns:repeat(4,1fr)}.stage,.stage canvas{width:384px;height:384px}.wrap{padding:8px;min-height:400px}.top button{flex:1}.timeline{grid-template-columns:repeat(2,1fr)}}
</style></head><body><div class="app">
<div class="top"><div class="title">Sprite Studio <span class="ver">v4.0 Production Pipeline</span></div><button id="newBtn">新規</button><button id="saveBtn">保存</button><label><button id="loadBtn">読込</button><input id="loadInput" class="hidden" type="file" accept="application/json"></label></div>
<div class="layout">
<div class="stack">
<section class="panel"><h2>1. 参考画像</h2><div class="body stack"><label><button id="refBtn" class="primary">参考画像を読み込む</button><input id="refInput" class="hidden" type="file" accept="image/*"></label><div class="source"><img id="refImg"></div><div class="mini">参考画像は配色・デザイン確認用です。自動縮小を完成品には使いません。</div></div></section>
<section class="panel"><h2>2. マスター素材</h2><div class="body stack"><label><button id="masterBtn" class="good">64×64マスターを読込</button><input id="masterInput" class="hidden" type="file" accept="image/png"></label><label><button id="sheetBtn">スプライトシートを読込</button><input id="sheetInput" class="hidden" type="file" accept="image/png"></label><div class="grid2"><label>列<select id="sheetCols"><option>4</option><option>6</option><option>8</option></select></label><label>行<select id="sheetRows"><option>4</option><option>8</option><option>16</option></select></label></div><button id="sliceBtn">シートを分割</button><span class="badge" id="assetState">内蔵ドラフト</span></div></section>
<section class="panel"><h2>3. パレット</h2><div class="body stack"><div id="palette" class="palette"></div><div class="row"><input id="colorInput" type="color"><button id="addColor">色追加</button><button id="applyPalette">全体色替え</button></div></div></section>
</div>
<section class="panel"><h2>4. 64×64 ピクセル制作</h2><div class="body stack"><div class="tabs"><button class="tab active" data-mode="idle">待機</button><button class="tab" data-mode="walk">歩行</button><button class="tab" data-mode="attack">攻撃</button><button class="tab" data-mode="hit">被弾</button></div><div class="row"><label>方向<select id="direction"><option value="front">正面</option><option value="back">背面</option><option value="left">左</option><option value="right">右</option></select></label><button id="prevFrame">前</button><button id="nextFrame">次</button><button id="duplicateFrame">複製</button><button id="saveFrame" class="good">フレーム保存</button></div><div class="canvasArea"><div class="tools"><button class="tool active" data-tool="pen">ペン</button><button class="tool" data-tool="eraser">消しゴム</button><button class="tool" data-tool="fill">塗り</button><button class="tool" data-tool="picker">スポイト</button><button id="undoBtn">戻す</button><button id="redoBtn">進む</button><button id="mirrorBtn">反転</button><button id="clearBtn">消去</button></div><div class="wrap"><div class="stage"><canvas id="composite" width="64" height="64"></canvas><canvas id="editor" width="64" height="64"></canvas><canvas id="onion" width="64" height="64"></canvas><canvas id="grid" width="64" height="64"></canvas></div></div></div><div id="timeline" class="timeline"></div></div></section>
<div class="stack">
<section class="panel"><h2>5. レイヤー</h2><div class="body stack"><div id="layers" class="layers"></div><div class="row"><button id="addLayer">追加</button><button id="deleteLayer" class="danger">削除</button><button id="upLayer">上へ</button><button id="downLayer">下へ</button></div></div></section>
<section class="panel"><h2>6. 品質ゲート</h2><div class="body stack"><button id="qualityBtn" class="good">品質検査</button><div id="quality" class="status"></div></div></section>
<section class="panel"><h2>7. 出力</h2><div class="body stack"><div class="outputs"><canvas id="out32" width="32" height="32"></canvas><canvas id="out64" width="64" height="64"></canvas><canvas id="out128" width="128" height="128"></canvas></div><div class="row"><button id="png32">32PNG</button><button id="png64" class="primary">64PNG</button><button id="png128">128PNG</button></div><button id="sheetExport" class="good">全アニメシートPNG</button><button id="jsonExport">制作データJSON</button></div></section>
<section class="panel"><h2>8. 状態</h2><div class="body"><div id="status" class="status"></div></div></section>
</div></div></div><script src="js/app.js"></script></body></html>

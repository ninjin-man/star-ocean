<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Sprite Studio Character MVP</title><style>
:root{--bg:#0b1020;--panel:#151d31;--line:#33415f;--text:#f7f8ff;--muted:#aeb9d2;--accent:#187da8;--ok:#82e6a7;--warn:#ffd27a;--bad:#ff9696}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}main{max-width:900px;margin:auto;padding:12px 12px calc(28px + env(safe-area-inset-bottom))}header{position:sticky;top:0;z-index:5;background:rgba(11,16,32,.95);padding:calc(8px + env(safe-area-inset-top)) 0 10px}h1{font-size:21px;margin:0}h2{font-size:17px;margin:0 0 10px}.sub,.hint{font-size:12px;line-height:1.55;color:var(--muted)}.card{background:var(--panel);border:1px solid #293653;border-radius:16px;padding:13px;margin-top:12px}.row{display:flex;gap:8px;flex-wrap:wrap}button,label.file,select{min-height:48px;border:1px solid var(--line);border-radius:12px;background:#1e2943;color:var(--text);font-weight:750;padding:10px 12px;flex:1}button.primary{background:var(--accent)}label.file{display:flex;align-items:center;justify-content:center}label.file input{display:none}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.box{min-height:280px;display:grid;place-items:center;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:repeating-conic-gradient(#1b2438 0 25%,#101729 0 50%) 50%/20px 20px}canvas{max-width:100%;image-rendering:pixelated}#inputView,#maskView,#outputView{width:min(86vw,460px);height:auto}.metrics{display:grid;grid-template-columns:1fr auto;gap:7px;font-size:13px}.metrics b{text-align:right}.ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}.meter{height:9px;background:#0c1323;border-radius:999px;overflow:hidden;margin-top:8px}.meter i{display:block;height:100%;background:#58c7f3;width:0}.field{display:grid;grid-template-columns:120px 1fr 46px;gap:8px;align-items:center;margin:8px 0}.field input{width:100%}.field output{text-align:right}pre{white-space:pre-wrap;word-break:break-word;font-size:11px;background:#0d1424;border-radius:12px;padding:10px;color:#dbe5ff;max-height:240px;overflow:auto}@media(max-width:680px){.grid{grid-template-columns:1fr}.box{min-height:240px}.field{grid-template-columns:100px 1fr 40px}}
</style></head><body><main><header><h1>Sprite Studio Character MVP <span style="font-size:12px;background:#244d68;border-radius:999px;padding:5px 9px">128×128</span></h1><div class="sub">固定女性素体ライブラリへ、入力画像の体型・髪シルエット・色面をルールベースで投影します。ツール内AIは使用しません。</div></header>
<section class="card"><h2>1. 入力</h2><div class="row"><label class="file">画像を選択<input id="file" type="file" accept="image/*"></label><button id="run" class="primary">解析してキャラ生成</button></div><div id="status" class="hint" style="margin-top:10px">画像を選択してください。</div></section>
<section class="card"><h2>2. 調整</h2><div class="field"><label>外見投影</label><input id="appearance" type="range" min="0" max="100" value="88"><output id="appearanceo">88</output></div><div class="field"><label>髪輪郭保持</label><input id="hair" type="range" min="0" max="100" value="84"><output id="hairo">84</output></div><div class="field"><label>輪郭強調</label><input id="outline" type="range" min="0" max="100" value="72"><output id="outlineo">72</output></div><div class="field"><label>色数</label><select id="colors"><option>24</option><option selected>32</option><option>40</option><option>48</option></select><output></output></div></section>
<section class="card"><h2>3. 入力とマスク</h2><div class="grid"><div><div class="box"><canvas id="inputView" width="512" height="512"></canvas></div><p class="hint">入力画像</p></div><div><div class="box"><canvas id="maskView" width="512" height="512"></canvas></div><p class="hint">白＝人物。透明背景・白系市松背景を自動判定します。</p></div></div><div id="maskMetrics" class="metrics"></div></section>
<section class="card"><h2>4. 128pxキャラクター</h2><div class="box"><canvas id="outputView" width="128" height="128"></canvas></div><p class="hint">素体の接続を維持し、入力の色面を頭・胴・脚へ再投影します。髪は入力上部シルエットから追加します。</p><div id="quality" class="metrics"><span>未検査</span><b>—</b></div><div class="meter"><i id="meter"></i></div></section>
<section class="card"><h2>5. CPS</h2><div id="cpsMetrics" class="metrics"><span>未解析</span><b>—</b></div><pre id="jsonView">{}</pre></section>
<section class="card"><h2>6. 保存</h2><div class="row"><button id="savePng">128 PNGを保存</button><button id="saveBig">4倍PNGを保存</button><button id="saveJson">CPS JSONを保存</button></div></section>
</main><script>'use strict';const $=id=>document.getElementById(id),inputView=$('inputView'),maskView=$('maskView'),outputView=$('outputView');let original=null,currentCPS=null,outputReady=false;const lib=new Image();const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));function status(t,c=''){$('status').className='hint '+c;$('status').textContent=t}function dl(blob,n){const a=document.createElement('a');a.download=n;a.href=URL.createObjectURL(blob);a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1200)}for(const id of ['appearance','hair','outline'])$(id).oninput=()=>{$(id+'o').textContent=$(id).value;if(original)run()};$('colors').onchange=()=>{if(original)run()};$('file').onchange=e=>{const f=e.target.files?.[0];if(!f)return;const u=URL.createObjectURL(f),im=new Image();status('読み込み中…');im.onload=()=>{original=im;drawInput();URL.revokeObjectURL(u);status(`読み込み完了：${im.naturalWidth}×${im.naturalHeight}`,'ok');run()};im.onerror=()=>status('画像を開けません。PNG/JPEG/WEBPを使用してください。','bad');im.src=u;e.target.value=''};$('run').onclick=run;
function drawInput(){const s=Math.min(1,720/Math.max(original.width,original.height));inputView.width=Math.round(original.width*s);inputView.height=Math.round(original.height*s);const c=inputView.getContext('2d');c.clearRect(0,0,inputView.width,inputView.height);c.drawImage(original,0,0,inputView.width,inputView.height)}
function maskInput(){const w=inputView.width,h=inputView.height,im=inputView.getContext('2d').getImageData(0,0,w,h),d=im.data,m=new Uint8Array(w*h);let alpha=false;for(let i=3;i<d.length;i+=4)if(d[i]<245){alpha=true;break}if(alpha){for(let p=0;p<w*h;p++)m[p]=d[p*4+3]>24?1:0}else{const bg=new Uint8Array(w*h),q=[],push=p=>{if(p>=0&&p<w*h&&!bg[p])q.push(p)};for(let x=0;x<w;x++){push(x);push((h-1)*w+x)}for(let y=0;y<h;y++){push(y*w);push(y*w+w-1)}const isbg=p=>{const i=p*4,r=d[i],g=d[i+1],b=d[i+2],mx=Math.max(r,g,b),mn=Math.min(r,g,b),lum=(r+g+b)/3;return lum>214&&mx-mn<28};for(let qi=0;qi<q.length;qi++){const p=q[qi];if(bg[p]||!isbg(p))continue;bg[p]=1;const x=p%w,y=(p/w)|0;if(x)push(p-1);if(x<w-1)push(p+1);if(y)push(p-w);if(y<h-1)push(p+w)}for(let p=0;p<w*h;p++)m[p]=bg[p]?0:1}const comps=[],seen=new Uint8Array(w*h);for(let p=0;p<w*h;p++){if(!m[p]||seen[p])continue;const a=[p];seen[p]=1;for(let i=0;i<a.length;i++){const v=a[i],x=v%w,y=(v/w)|0;for(const u of [v-1,v+1,v-w,v+w]){if(u<0||u>=w*h||seen[u]||!m[u])continue;const ux=u%w,uy=(u/w)|0;if(Math.abs(ux-x)+Math.abs(uy-y)!==1)continue;seen[u]=1;a.push(u)}}comps.push(a)}comps.sort((a,b)=>b.length-a.length);const keep=new Uint8Array(w*h);for(const p of comps[0]||[])keep[p]=1;return{w,h,im,m:keep}}
function bbox(a){let x0=a.w,y0=a.h,x1=-1,y1=-1,n=0;for(let y=0;y<a.h;y++)for(let x=0;x<a.w;x++)if(a.m[y*a.w+x]){x0=Math.min(x0,x);x1=Math.max(x1,x);y0=Math.min(y0,y);y1=Math.max(y1,y);n++}if(x1<0)throw Error('人物を抽出できません');return{x0,y0,x1,y1,w:x1-x0+1,h:y1-y0+1,n}}
function rows(a,b){const out=[];for(let y=b.y0;y<=b.y1;y++){let l=a.w,r=-1;for(let x=b.x0;x<=b.x1;x++)if(a.m[y*a.w+x]){l=Math.min(l,x);r=Math.max(r,x)}out.push(r>=l?[l,r]:null)}return out}
function drawMask(a,b){maskView.width=a.w;maskView.height=a.h;const c=maskView.getContext('2d'),im=c.createImageData(a.w,a.h);for(let p=0;p<a.w*a.h;p++){const v=a.m[p]?255:0,i=p*4;im.data[i]=im.data[i+1]=im.data[i+2]=v;im.data[i+3]=255}c.putImageData(im,0,0);$('maskMetrics').innerHTML=`<span>人物範囲</span><b>${b.w}×${b.h}px</b><span>保持率</span><b>${Math.round(b.n/(a.w*a.h)*100)}%</b>`}
function analyze(a,b,rs){const widthAt=t=>{const i=clamp(Math.round(t*(rs.length-1)),0,rs.length-1),r=rs[i];return r?r[1]-r[0]+1:1};const head=Math.max(...rs.slice(0,Math.max(1,Math.round(rs.length*.22))).filter(Boolean).map(r=>r[1]-r[0]+1));return{headWidth:head,shoulderWidth:widthAt(.28),waistWidth:widthAt(.47),hipWidth:widthAt(.58),headLength:b.h*.20,legLength:b.h*.47,height:b.h}}
function libData(){const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');x.drawImage(lib,0,0);const im=x.getImageData(0,0,128,128),m=new Uint8Array(16384);for(let p=0;p<16384;p++)m[p]=im.data[p*4+3]>20?1:0;const a={w:128,h:128,im,m},b=bbox(a),rs=rows(a,b);return{a,b,rs,met:analyze(a,b,rs)}}
function cps(src,base){return{version:'0.2.0',bodyLibrary:'Female_Standard_01',renderer:'RuleBasedAppearanceProjection',parameters:{headWidth:clamp(src.headWidth/base.headWidth,.82,1.18),shoulderWidth:clamp(src.shoulderWidth/base.shoulderWidth,.84,1.18),waistWidth:clamp(src.waistWidth/base.waistWidth,.82,1.16),hipWidth:clamp(src.hipWidth/base.hipWidth,.84,1.18),headLength:clamp(src.headLength/base.headLength,.88,1.12),legLength:clamp(src.legLength/base.legLength,.88,1.12)},appearance:{strength:+$('appearance').value/100,hairSilhouette:+$('hair').value/100,outline:+$('outline').value/100,colors:+$('colors').value},aiUsedInTool:false}}
function srcPoint(a,b,rs,yn,xn){const yi=clamp(Math.round(yn*(rs.length-1)),0,rs.length-1);let r=rs[yi];if(!r){for(let k=1;k<rs.length;k++){r=rs[clamp(yi-k,0,rs.length-1)]||rs[clamp(yi+k,0,rs.length-1)];if(r)break}}const x=Math.round(r[0]+xn*(r[1]-r[0])),y=b.y0+yi;return{x,y,i:(y*a.w+x)*4}}
function qColor(v,levels){const s=255/(levels-1);return Math.round(v/s)*s}
function render(a,b,rs,L,C){const lc=document.createElement('canvas');lc.width=lc.height=128;lc.getContext('2d').drawImage(lib,0,0);const lim=lc.getContext('2d').getImageData(0,0,128,128),ld=lim.data,om=outputView.getContext('2d').createImageData(128,128),d=om.data;const lb=L.b,lrs=L.rs,app=C.appearance.strength,levels=C.appearance.colors<=24?5:C.appearance.colors<=32?6:7;for(let y=0;y<128;y++){const lyn=(y-lb.y0)/Math.max(1,lb.h-1);if(lyn<0||lyn>1)continue;const li=clamp(Math.round(lyn*(lrs.length-1)),0,lrs.length-1),lr=lrs[li];if(!lr)continue;let syNorm=lyn;if(lyn<.24)syNorm=lyn/C.parameters.headLength;else if(lyn>.54)syNorm=.54+(lyn-.54)/C.parameters.legLength;syNorm=clamp(syNorm,0,1);let scale=lyn<.24?C.parameters.headWidth:lyn<.38?C.parameters.shoulderWidth:lyn<.54?C.parameters.waistWidth:lyn<.66?C.parameters.hipWidth:1;const cx=(lr[0]+lr[1])/2,half=(lr[1]-lr[0]+1)*scale/2,l=Math.round(cx-half),r=Math.round(cx+half);for(let x=clamp(l,0,127);x<=clamp(r,0,127);x++){const xn=(x-l)/Math.max(1,r-l),sp=srcPoint(a,b,rs,syNorm,xn),si=sp.i,oi=(y*128+x)*4,baseX=clamp(Math.round(lr[0]+xn*(lr[1]-lr[0])),0,127),bi=(y*128+baseX)*4;if(ld[bi+3]<20)continue;d[oi]=qColor(ld[bi]*(1-app)+a.im.data[si]*app,levels);d[oi+1]=qColor(ld[bi+1]*(1-app)+a.im.data[si+1]*app,levels);d[oi+2]=qColor(ld[bi+2]*(1-app)+a.im.data[si+2]*app,levels);d[oi+3]=255}}// upper silhouette hair/ears extension
const hp=C.appearance.hairSilhouette;if(hp>0){const maxY=Math.round(rs.length*.27);for(let iy=0;iy<maxY;iy++){const r=rs[iy];if(!r)continue;const yn=iy/Math.max(1,maxY-1),oy=Math.round(3+yn*34),targetW=(r[1]-r[0]+1)/b.w*44*C.parameters.headWidth,oc=64,ol=Math.round(oc-targetW/2),or=Math.round(oc+targetW/2);for(let x=clamp(ol,0,127);x<=clamp(or,0,127);x++){const xn=(x-ol)/Math.max(1,or-ol),sx=Math.round(r[0]+xn*(r[1]-r[0])),si=((b.y0+iy)*a.w+sx)*4,oi=(oy*128+x)*4;if(!a.m[(b.y0+iy)*a.w+sx])continue;if(d[oi+3]||(((x*17+oy*31)&255)/255)>hp)continue;d[oi]=qColor(a.im.data[si],levels);d[oi+1]=qColor(a.im.data[si+1],levels);d[oi+2]=qColor(a.im.data[si+2],levels);d[oi+3]=255}}}// deterministic cleanup and outline
let s=new Uint8ClampedArray(d);for(let y=1;y<127;y++)for(let x=1;x<127;x++){const i=(y*128+x)*4;if(!s[i+3])continue;const ns=[i-4,i+4,i-512,i+512].filter(j=>s[j+3]);if(ns.length===0)d[i+3]=0} s=new Uint8ClampedArray(d);const ol=C.appearance.outline;for(let y=0;y<128;y++)for(let x=0;x<128;x++){const i=(y*128+x)*4;if(!s[i+3])continue;let edge=0;for(const [xx,yy] of [[x-1,y],[x+1,y],[x,y-1],[x,y+1]])if(xx<0||xx>127||yy<0||yy>127||!s[(yy*128+xx)*4+3])edge++;if(edge){const f=1-ol*(edge>1?.48:.34);d[i]=Math.round(s[i]*f);d[i+1]=Math.round(s[i+1]*f);d[i+2]=Math.round(s[i+2]*f)}}outputView.getContext('2d').putImageData(om,0,0);outputReady=true;return quality(om.data)}
function quality(d){const on=p=>d[p*4+3]>0,seen=new Uint8Array(16384),sizes=[],colors=new Set();let holes=0,isolated=0;for(let p=0;p<16384;p++)if(on(p)){colors.add((d[p*4]<<16)|(d[p*4+1]<<8)|d[p*4+2]);if(!seen[p]){const q=[p];seen[p]=1;for(let i=0;i<q.length;i++){const v=q[i],x=v%128,y=(v/128)|0;for(const u of [v-1,v+1,v-128,v+128]){if(u<0||u>=16384||seen[u]||!on(u))continue;const ux=u%128,uy=(u/128)|0;if(Math.abs(ux-x)+Math.abs(uy-y)!==1)continue;seen[u]=1;q.push(u)}}sizes.push(q.length)}}for(let y=1;y<127;y++)for(let x=1;x<127;x++){const p=y*128+x,n=[p-1,p+1,p-128,p+128].filter(on).length;if(on(p)&&n===0)isolated++;if(!on(p)&&n===4)holes++}sizes.sort((a,b)=>b-a);const detached=sizes.slice(1).filter(n=>n>2).length,score=clamp(Math.round(100-detached*10-holes*1.5-isolated*3-Math.max(0,colors.size-48)*.7),0,100),pass=score>=82&&detached<=2&&holes<=4;$('quality').innerHTML=`<span>総合品質</span><b class="${pass?'ok':score>=68?'warn':'bad'}">${score}/100 ${pass?'合格':'要確認'}</b><span>大きな分断</span><b>${detached}</b><span>1px穴 / 孤立</span><b>${holes} / ${isolated}</b><span>使用色</span><b>${colors.size}</b>`;$('meter').style.width=score+'%';return{score,pass,detached,holes,isolated,colors:colors.size}}

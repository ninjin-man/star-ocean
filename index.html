<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sprite Library Search MVP</title>
<style>
:root{--bg:#0d1016;--panel:#171c25;--line:#354052;--text:#f7f8fb;--muted:#aeb8c8;--accent:#2d8bb7;--ok:#78dfa2}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
main{max-width:920px;margin:auto;padding:12px 12px calc(30px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;background:#0d1016ee;z-index:5;padding:calc(8px + env(safe-area-inset-top)) 0 10px}
h1{font-size:20px;margin:0}.sub,.note{color:var(--muted);font-size:12px;line-height:1.55}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px;margin-top:12px}
.row{display:flex;gap:8px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button,label.file,select{min-height:48px;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:#202838;color:var(--text);font-weight:700}
button{flex:1}.primary{background:var(--accent)}label.file{display:flex;align-items:center;justify-content:center;flex:1}label.file input{display:none}
.stage{min-height:300px;display:grid;place-items:center;border:1px solid var(--line);border-radius:14px;background:repeating-conic-gradient(#242b36 0 25%,#191f29 0 50%) 50%/20px 20px;overflow:hidden}
canvas{max-width:100%;image-rendering:pixelated}.metrics{display:grid;grid-template-columns:1fr auto;gap:7px;font-size:12px;margin-top:10px}
.library{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.asset{border:1px solid var(--line);border-radius:12px;padding:7px;background:#111721;text-align:center}
.asset img{width:100%;aspect-ratio:1;object-fit:contain;image-rendering:pixelated;background:repeating-conic-gradient(#252c37 0 25%,#191f29 0 50%) 50%/16px 16px}
.asset b{font-size:11px}.asset.active{outline:3px solid #ffd166}.rank{display:grid;grid-template-columns:1fr auto;gap:6px;font-size:12px}
.badge{font-size:10px;border-radius:999px;padding:3px 7px;background:#25354a}.ok{color:var(--ok)}
@media(max-width:700px){.grid{grid-template-columns:1fr}.library{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body><main>
<header><h1>Sprite Library Search <span class="badge">MVP v0.1</span></h1>
<div class="sub">入力画像は解析専用。最終出力にはライブラリPNGだけを使用します。</div></header>

<section class="card"><h2>1. 入力画像</h2>
<div class="row"><label class="file">画像を選択<input id="file" type="file" accept="image/*"></label><button id="analyze" class="primary">再解析</button></div>
<div class="grid" style="margin-top:10px">
<div><div class="stage"><canvas id="source" width="320" height="320"></canvas></div><p class="note">入力画像。出力には重ねません。</p></div>
<div><div class="stage"><canvas id="mask" width="128" height="128"></canvas></div><p class="note">簡易人物マスク／解析範囲。</p></div>
</div>
<div id="features" class="metrics"><span>状態</span><b>画像を選択してください</b></div>
</section>

<section class="card"><h2>2. 検索結果</h2>
<div class="row"><select id="category"></select><button id="nextCandidate">次候補</button></div>
<div id="ranking" class="rank" style="margin-top:10px"></div>
<p class="note">色、配置、シルエット比率を決定論的に採点します。同じ入力では常に同じ結果です。</p>
</section>

<section class="card"><h2>3. ライブラリ再構築</h2>
<div class="grid">
<div><div class="stage"><canvas id="result" width="128" height="128"></canvas></div><p class="note">ライブラリ素材のみで合成。</p></div>
<div><div id="selected" class="metrics"></div></div>
</div>
<div class="row" style="margin-top:10px"><button id="savePng">128 PNG保存</button><button id="saveJson">選択JSON保存</button></div>
</section>

<section class="card"><h2>4. ライブラリ</h2><div id="library" class="library"></div></section>

<section class="card"><h2>5. 品質検査</h2><div id="quality" class="metrics"></div>
<p class="note">128×128、透明背景、空画像、色数、アルファ境界、決定論的検索を検査します。</p></section>
</main>

  }
  function widthAt(t){
    const y=Math.max(y0,Math.min(y1,Math.round(y0+H*t)));let l=w,r=-1;
    for(let x=x0;x<=x1;x++)if(fg[y*w+x]){l=Math.min(l,x);r=Math.max(r,x)}
    return r>=l?(r-l+1)/W:0;
  }
  const hairColor=regionColor(0,.28),clothColor=regionColor(.28,.62);
  const headWidth=Math.max(widthAt(.08),widthAt(.14),widthAt(.20));
  const shoulderWidth=Math.max(widthAt(.27),widthAt(.32));
  const hipWidth=Math.max(widthAt(.52),widthAt(.58));
  const darkHair=(hairColor[0]+hairColor[1]+hairColor[2])/3<105;
  const clothLum=(clothColor[0]+clothColor[1]+clothColor[2])/3;
  features={hairColor,clothColor,headWidth,shoulderWidth,hipWidth,darkHair,clothLum,aspect:W/H};
  drawMask(fg,w,h,x0,y0,x1,y1);
  searchAll();
  $('features').innerHTML=`<span>頭幅</span><b>${headWidth.toFixed(2)}</b><span>肩幅</span><b>${shoulderWidth.toFixed(2)}</b><span>骨盤幅</span><b>${hipWidth.toFixed(2)}</b><span>髪色</span><b>${hairColor.map(v=>Math.round(v)).join(', ')}</b><span>服色</span><b>${clothColor.map(v=>Math.round(v)).join(', ')}</b>`;
}
function drawMask(fg,w,h,x0,y0,x1,y1){
  const c=mask.getContext('2d'),o=c.createImageData(128,128),d=o.data;
  for(let y=0;y<128;y++)for(let x=0;x<128;x++){
    const sx=Math.round(x0+x/127*(x1-x0)),sy=Math.round(y0+y/127*(y1-y0)),on=fg[sy*w+sx],i=(y*128+x)*4;
    d[i]=on?238:26;d[i+1]=on?243:30;d[i+2]=on?250:38;d[i+3]=255;
  }c.putImageData(o,0,0);
}
function colorDist(a,b){return Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2)/441.67}
function scoreAsset(id){
  const m=MANIFEST.assets[id],cat=m.category;let score=100;
  if(!features)return 50-m.variant;
  if(cat.includes('Hair')){score-=colorDist(features.hairColor,m.avgColor)*58;score-=Math.abs(features.headWidth-m.widthRatio)*18}
  if(cat==='face'){score-=Math.abs(features.headWidth-m.widthRatio)*35;score-=m.variant*1.5}
  if(cat==='clothes'){score-=colorDist(features.clothColor,m.avgColor)*52;score-=Math.abs(features.hipWidth-m.widthRatio)*14}
  if(cat==='ear'){score-=Math.abs(features.headWidth-(m.tags?.length||.5))*8}
  if(cat==='equipment'){score-=m.variant*3}
  return Math.max(0,Math.round(score));
}
function searchAll(){
  for(const [cat,ids] of Object.entries(MANIFEST.categories)){
    rankings[cat]=ids.map(id=>({id,score:scoreAsset(id)})).sort((a,b)=>b.score-a.score||a.id.localeCompare(b.id));
    if(cat!=='body')selected[cat]=rankings[cat][0]?.id||null;
  }
  renderRanking();renderLibrary();compose();qualityCheck();
}
function renderRanking(){
  const cat=$('category').value||'frontHair',r=rankings[cat]||MANIFEST.categories[cat].map(id=>({id,score:scoreAsset(id)}));
  $('ranking').innerHTML=r.slice(0,5).map((x,i)=>`<span>${i+1}位 ${x.id}</span><b>${x.score}点</b>`).join('');
}
$('nextCandidate').onclick=()=>{
  const cat=$('category').value,r=rankings[cat]||[];if(!r.length)return;
  const i=r.findIndex(x=>x.id===selected[cat]);selected[cat]=r[(i+1)%r.length].id;renderLibrary();compose();qualityCheck();
};
function renderLibrary(){
  const cat=$('category').value||'frontHair';
  $('library').innerHTML=MANIFEST.categories[cat].map(id=>`<button class="asset ${selected[cat]===id?'active':''}" data-id="${id}"><img src="${ASSETS[id]}"><b>${id}</b></button>`).join('');
  document.querySelectorAll('.asset').forEach(el=>el.onclick=()=>{selected[cat]=el.dataset.id;renderLibrary();compose();qualityCheck()});
}
function drawLayer(ctx,id,opts={}){
  if(!id||!images[id])return;
  ctx.save();ctx.imageSmoothingEnabled=false;
  const x=opts.x||0,y=opts.y||0,s=opts.scale||1;
  ctx.translate(64,64);ctx.scale(s,s);ctx.translate(-64,-64);ctx.drawImage(images[id],x,y);ctx.restore();
}
function compose(){
  const c=result.getContext('2d');c.clearRect(0,0,128,128);c.imageSmoothingEnabled=false;
  // Back-to-front. No source image is used here.
  // The approved reference parts were normalized to a common 128px canvas.
  // Keep the MVP composition conservative: costume/body, back hair, face, front hair, optional equipment.
  drawLayer(c,selected.backHair,{y:-15,scale:.55});
  drawLayer(c,selected.clothes||selected.body);
  drawLayer(c,selected.frontHair,{y:-16,scale:.58});
  drawLayer(c,selected.face,{y:-17,scale:.44});
  drawLayer(c,selected.equipment,{x:35,y:0,scale:.65});
  $('selected').innerHTML=Object.entries(selected).map(([k,v])=>`<span>${k}</span><b>${v||'なし'}</b>`).join('');
}
function qualityCheck(){
  const d=result.getContext('2d').getImageData(0,0,128,128).data,colors=new Set();let alpha=0,holes=0,isolated=0;
  const on=p=>p>=0&&p<16384&&d[p*4+3]>20;
  for(let y=1;y<127;y++)for(let x=1;x<127;x++){const p=y*128+x,i=p*4,n=[p-1,p+1,p-128,p+128].filter(on).length;if(on(p)){alpha++;colors.add((d[i]<<16)|(d[i+1]<<8)|d[i+2]);if(!n)isolated++}else if(n===4)holes++}
  const score=Math.max(0,100-isolated*5-holes*2-Math.max(0,colors.size-96)*.2);
  $('quality').innerHTML=`<span>出力寸法</span><b class="ok">128×128</b><span>入力画像の混入</span><b class="ok">0%</b><span>不透明ドット</span><b>${alpha}</b><span>孤立ドット</span><b>${isolated}</b><span>1px穴</span><b>${holes}</b><span>使用色</span><b>${colors.size}</b><span>簡易品質点</span><b>${Math.round(score)}/100</b>`;
}
$('file').onchange=e=>{const f=e.target.files?.[0];if(!f)return;inputName=f.name.replace(/\.[^.]+$/,'');const url=URL.createObjectURL(f),im=new Image();im.onload=()=>{original=im;URL.revokeObjectURL(url);analyzeImage()};im.src=url;e.target.value=''};
$('analyze').onclick=analyzeImage;
function downloadBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
$('savePng').onclick=()=>result.toBlob(b=>downloadBlob(b,inputName+'_library_128.png'),'image/png');
$('saveJson').onclick=()=>downloadBlob(new Blob([JSON.stringify({version:'0.1',selected,features},null,2)],{type:'application/json'}),inputName+'_selection.json');
loadAssets();
</script></body></html>

<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sprite Studio Pixel Reconstruction</title>
<style>
:root{--bg:#0d1118;--panel:#171d27;--panel2:#111722;--line:#2c3647;--text:#f4f7fb;--muted:#9ba8ba;--accent:#72a4ff;--ok:#57d28a;--warn:#ffbd66}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}button,input,select{font:inherit}
header{position:sticky;top:0;z-index:10;padding:13px 14px;background:#0d1118ee;backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}h1{font-size:18px;margin:0 0 3px}header p{margin:0;color:var(--muted);font-size:12px;line-height:1.45}
main{max-width:1100px;margin:auto;padding:12px;display:grid;gap:12px}.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px}.previewCard{display:grid;gap:10px}
.previewGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.pane{background:var(--panel2);border:1px solid var(--line);border-radius:12px;overflow:hidden}.paneTitle{padding:8px 10px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--line);display:flex;justify-content:space-between}.canvasWrap{display:grid;place-items:center;aspect-ratio:1/1;background:linear-gradient(45deg,#151b24 25%,#202836 25%,#202836 50%,#151b24 50%,#151b24 75%,#202836 75%);background-size:20px 20px;touch-action:none;overflow:hidden}canvas{width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges}
.controls{display:grid;gap:12px}.group{display:grid;gap:8px}.group h2{font-size:14px;margin:0}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}label{display:grid;gap:5px;color:var(--muted);font-size:12px}.value{color:var(--text);float:right}
input[type=range]{width:100%}select,input[type=file],button{width:100%;min-height:44px;border-radius:10px;border:1px solid var(--line);background:#0f1520;color:var(--text);padding:9px}button{background:#2f6fec;border-color:#4f85ef;font-weight:700}.secondary{background:#202836}.danger{background:#54303a;border-color:#74414f}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.status{font-size:12px;line-height:1.6;color:var(--muted)}.badge{display:inline-block;padding:3px 7px;border-radius:999px;background:#233049;color:#c9d8ff;margin:2px 4px 2px 0}.ok{color:var(--ok)}.warn{color:var(--warn)}
.segment{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.segment button{min-height:38px;padding:6px;font-size:12px;background:#202836}.segment button.active{background:#315fbd;border-color:#6d9df9}.note{padding:9px;border-left:3px solid var(--accent);background:#111925;border-radius:8px;font-size:12px;line-height:1.6;color:#c8d1de}
@media(min-width:820px){main{grid-template-columns:1.2fr .8fr}.previewCard{position:sticky;top:78px;align-self:start}.previewGrid{grid-template-columns:1fr 1fr}.controlsCard{grid-column:2}}
</style>
</head>
<body>
<header><h1>Pixel Reconstruction</h1><p>高品質画像を「縮小」ではなく、128×128用の輪郭・色面・ディテールへ再構築します。</p></header>
<main>
<section class="card previewCard">
  <div class="previewGrid">
    <div class="pane"><div class="paneTitle"><span>入力</span><span id="srcInfo">未読込</span></div><div class="canvasWrap"><canvas id="srcCanvas" width="512" height="512"></canvas></div></div>
    <div class="pane"><div class="paneTitle"><span id="viewLabel">完成</span><span>128×128</span></div><div class="canvasWrap"><canvas id="outCanvas" width="128" height="128"></canvas></div></div>
  </div>
  <div class="segment" id="viewTabs"><button data-view="final" class="active">完成</button><button data-view="structure">輪郭</button><button data-view="form">色面</button><button data-view="detail">Detail</button></div>
  <div class="row"><button id="processBtn">128pxへ再構築</button><button id="exportBtn" class="secondary">PNGを書き出す</button></div>
  <div class="status" id="status"><span class="badge">ローカル処理</span><span class="badge">単一HTML</span><span class="badge">iPhone対応</span><br>画像を読み込んでください。</div>
</section>

<section class="card controlsCard controls">
  <div class="group"><h2>1. 入力</h2><label>画像<input id="fileInput" type="file" accept="image/*"></label><div class="two"><label>配置<select id="fitMode"><option value="contain">全体を収める</option><option value="cover">画面いっぱい</option></select></label><label>背景<select id="bgMode"><option value="keep">保持</option><option value="corners">四隅から除去</option><option value="alpha">透過のみ使用</option></select></label></div><label>余白 <span class="value" id="paddingVal">8%</span><input id="padding" type="range" min="0" max="24" value="8"></label></div>

  <div class="group"><h2>2. 構造</h2><label>輪郭保持 <span class="value" id="structureVal">78</span><input id="structure" type="range" min="0" max="100" value="78"></label><label>輪郭シャープ <span class="value" id="sharpVal">64</span><input id="sharp" type="range" min="0" max="100" value="64"></label><div class="two"><label>最小線幅<select id="minWidth"><option value="1">1px</option><option value="2" selected>2px</option><option value="3">3px</option></select></label><label>孤立ドット<select id="cleanup"><option value="0">残す</option><option value="1" selected>弱く除去</option><option value="2">強く除去</option></select></label></div></div>

  <div class="group"><h2>3. 色面</h2><div class="two"><label>色数<select id="colors"><option>16</option><option>24</option><option selected>32</option><option>40</option><option>48</option></select></label><label>減色方式<select id="quantMode"><option value="median">Median Cut</option><option value="luma">明度優先</option></select></label></div><label>色面の単純化 <span class="value" id="formVal">58</span><input id="form" type="range" min="0" max="100" value="58"></label><label>彩度保持 <span class="value" id="satVal">72</span><input id="sat" type="range" min="0" max="100" value="72"></label></div>

  <div class="group"><h2>4. Detail</h2><label>細部保持 <span class="value" id="detailVal">42</span><input id="detail" type="range" min="0" max="100" value="42"></label><label>ハイライト抑制 <span class="value" id="highlightVal">55</span><input id="highlight" type="range" min="0" max="100" value="55"></label><div class="note">素体のGold Master作成では、Detailを35〜50、色数24〜32、最小線幅2pxを推奨します。</div></div>

  <div class="group"><h2>プリセット</h2><div class="three"><button class="secondary preset" data-preset="body">素体128</button><button class="secondary preset" data-preset="character">完成キャラ</button><button class="secondary preset" data-preset="hard">強いドット</button></div></div>
</section>
</main>
<script>
'use strict';
const $=id=>document.getElementById(id);
const srcCanvas=$('srcCanvas'),srcCtx=srcCanvas.getContext('2d',{willReadFrequently:true});
const outCanvas=$('outCanvas'),outCtx=outCanvas.getContext('2d',{willReadFrequently:true});
srcCtx.imageSmoothingEnabled=true;outCtx.imageSmoothingEnabled=false;
let sourceImage=null,currentView='final',results={};

const ranges=['padding','structure','sharp','form','sat','detail','highlight'];
for(const id of ranges){const el=$(id),v=$(id+'Val');const sync=()=>v.textContent=id==='padding'?el.value+'%':el.value;el.addEventListener('input',sync);sync();}
$('fileInput').addEventListener('change',e=>{const f=e.target.files?.[0];if(!f)return;const img=new Image();img.onload=()=>{sourceImage=img;$('srcInfo').textContent=`${img.naturalWidth}×${img.naturalHeight}`;drawSourcePreview();setStatus('画像を読み込みました。再構築を実行してください。','ok');URL.revokeObjectURL(img.src)};img.onerror=()=>setStatus('画像を読み込めませんでした。','warn');img.src=URL.createObjectURL(f)});
$('fitMode').addEventListener('change',()=>{drawSourcePreview();if(sourceImage)processImage()});$('padding').addEventListener('change',()=>{drawSourcePreview();if(sourceImage)processImage()});
$('processBtn').addEventListener('click',processImage);$('exportBtn').addEventListener('click',exportPNG);
for(const el of document.querySelectorAll('select,input[type=range]')){if(el.id!=='padding'&&el.id!=='fitMode')el.addEventListener('change',()=>sourceImage&&processImage());}
for(const b of document.querySelectorAll('#viewTabs button'))b.onclick=()=>{document.querySelectorAll('#viewTabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentView=b.dataset.view;showView()};
for(const b of document.querySelectorAll('.preset'))b.onclick=()=>applyPreset(b.dataset.preset);

function setStatus(msg,cls=''){ $('status').innerHTML=`<span class="badge">ローカル処理</span><span class="badge">128×128</span><br><span class="${cls}">${msg}</span>`; }
function drawSourcePreview(){srcCtx.clearRect(0,0,512,512);if(!sourceImage)return;const p=+$('padding').value/100,box=512*(1-p*2);const s=$('fitMode').value==='cover'?Math.max(box/sourceImage.width,box/sourceImage.height):Math.min(box/sourceImage.width,box/sourceImage.height);const w=sourceImage.width*s,h=sourceImage.height*s;srcCtx.drawImage(sourceImage,(512-w)/2,(512-h)/2,w,h)}
function rasterize(){const tmp=document.createElement('canvas');tmp.width=128;tmp.height=128;const t=tmp.getContext('2d',{willReadFrequently:true});t.imageSmoothingEnabled=true;const p=+$('padding').value/100,box=128*(1-p*2);const s=$('fitMode').value==='cover'?Math.max(box/sourceImage.width,box/sourceImage.height):Math.min(box/sourceImage.width,box/sourceImage.height);const w=sourceImage.width*s,h=sourceImage.height*s;t.clearRect(0,0,128,128);t.drawImage(sourceImage,(128-w)/2,(128-h)/2,w,h);return t.getImageData(0,0,128,128)}
function processImage(){if(!sourceImage){setStatus('先に画像を読み込んでください。','warn');return}setStatus('再構築中…');requestAnimationFrame(()=>{let img=rasterize();if($('bgMode').value==='corners')img=removeCornerBackground(img);let base=copyImage(img);base=bilateralLite(base,Math.round(1+(+$('form').value/100)*2),18+(+$('form').value)*0.7);let structure=buildStructure(base,+$('structure').value,+$('sharp').value);let form=quantizeImage(base,+$('colors').value,$('quantMode').value,+$('sat').value);let detail=extractDetail(base,+$('detail').value,+$('highlight').value);let finalImg=combineLayers(form,structure,detail);finalImg=enforceMinWidth(finalImg,+$('minWidth').value);finalImg=cleanupPixels(finalImg,+$('cleanup').value);results={final:finalImg,structure,form,detail};showView();setStatus('再構築が完了しました。128px実寸と拡大表示で確認してください。','ok')})}
function copyImage(img){return new ImageData(new Uint8ClampedArray(img.data),img.width,img.height)}
function idx(x,y,w=128){return (y*w+x)*4}
function luminance(d,i){return .2126*d[i]+.7152*d[i+1]+.0722*d[i+2]}
function removeCornerBackground(img){const d=img.data,w=img.width,h=img.height;const samples=[[1,1],[w-2,1],[1,h-2],[w-2,h-2]].map(([x,y])=>{let i=idx(x,y,w);return[d[i],d[i+1],d[i+2]]});const bg=samples.reduce((a,c)=>a.map((v,k)=>v+c[k]),[0,0,0]).map(v=>v/4);for(let y=0;y<h;y++)for(let x=0;x<w;x++){let i=idx(x,y,w);if(d[i+3]<8)continue;let dist=Math.hypot(d[i]-bg[0],d[i+1]-bg[1],d[i+2]-bg[2]);if(dist<24)d[i+3]=0;else if(dist<52)d[i+3]=Math.round(d[i+3]*(dist-24)/28)}return img}
function bilateralLite(img,radius,range){const s=img.data,o=new Uint8ClampedArray(s.length),w=img.width,h=img.height;for(let y=0;y<h;y++)for(let x=0;x<w;x++){let i=idx(x,y,w);if(s[i+3]===0){o[i+3]=0;continue}let rr=0,gg=0,bb=0,aa=0,ws=0;for(let yy=Math.max(0,y-radius);yy<=Math.min(h-1,y+radius);yy++)for(let xx=Math.max(0,x-radius);xx<=Math.min(w-1,x+radius);xx++){let j=idx(xx,yy,w);if(s[j+3]===0)continue;let cd=Math.abs(s[j]-s[i])+Math.abs(s[j+1]-s[i+1])+Math.abs(s[j+2]-s[i+2]);let wt=Math.max(.03,1-cd/(range*3));rr+=s[j]*wt;gg+=s[j+1]*wt;bb+=s[j+2]*wt;aa+=s[j+3]*wt;ws+=wt}o[i]=rr/ws;o[i+1]=gg/ws;o[i+2]=bb/ws;o[i+3]=aa/ws}return new ImageData(o,w,h)}
function buildStructure(img,strength,sharp){const d=img.data,w=img.width,h=img.height,o=new Uint8ClampedArray(d.length),thr=18+(100-strength)*.48;for(let y=0;y<h;y++)for(let x=0;x<w;x++){let i=idx(x,y,w);if(d[i+3]===0){o[i+3]=0;continue}let l=luminance(d,i),max=0;for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){let xx=x+dx,yy=y+dy;if(xx<0||yy<0||xx>=w||yy>=h){max=255;continue}let j=idx(xx,yy,w);if(d[j+3]===0){max=255;continue}max=Math.max(max,Math.abs(l-luminance(d,j)))}let e=max>thr?Math.min(255,max*(1+sharp/90)):0;let c=Math.max(18,Math.min(110,l*.38));o[i]=o[i+1]=o[i+2]=c;o[i+3]=e}return new ImageData(o,w,h)}
function quantizeImage(img,count,mode,satKeep){const d=img.data,w=img.width,h=img.height,p=[];for(let i=0;i<d.length;i+=4)if(d[i+3]>8)p.push([d[i],d[i+1],d[i+2],d[i+3]]);if(!p.length)return copyImage(img);let boxes=[p];while(boxes.length<count){let bi=-1,br=-1;for(let i=0;i<boxes.length;i++){const b=boxes[i];if(b.length<2)continue;let mins=[255,255,255],maxs=[0,0,0];for(const c of b)for(let k=0;k<3;k++){mins[k]=Math.min(mins[k],c[k]);maxs[k]=Math.max(maxs[k],c[k])}let r=Math.max(maxs[0]-mins[0],maxs[1]-mins[1],maxs[2]-mins[2]);if(r>br){br=r;bi=i}}if(bi<0)break;let b=boxes.splice(bi,1)[0],ch=0;if(mode==='luma'){b.sort((a,z)=>(.2126*a[0]+.7152*a[1]+.0722*a[2])-(.2126*z[0]+.7152*z[1]+.0722*z[2]))}else{let ranges=[0,1,2].map(k=>Math.max(...b.map(c=>c[k]))-Math.min(...b.map(c=>c[k])));ch=ranges.indexOf(Math.max(...ranges));b.sort((a,z)=>a[ch]-z[ch])}let m=b.length>>1;boxes.push(b.slice(0,m),b.slice(m))}
const palette=boxes.map(b=>{let s=[0,0,0];for(const c of b){s[0]+=c[0];s[1]+=c[1];s[2]+=c[2]}return s.map(v=>Math.round(v/b.length))});const o=new Uint8ClampedArray(d.length),sat=satKeep/100;for(let i=0;i<d.length;i+=4){if(d[i+3]===0){o[i+3]=0;continue}let best=palette[0],bd=1e9;for(const c of palette){let dr=d[i]-c[0],dg=d[i+1]-c[1],db=d[i+2]-c[2],dd=dr*dr+dg*dg+db*db*.9;if(dd<bd){bd=dd;best=c}}let gray=.2126*best[0]+.7152*best[1]+.0722*best[2];o[i]=gray+(best[0]-gray)*sat;o[i+1]=gray+(best[1]-gray)*sat;o[i+2]=gray+(best[2]-gray)*sat;o[i+3]=d[i+3]}return new ImageData(o,w,h)}
function extractDetail(img,amount,highlightSuppress){const d=img.data,w=img.width,h=img.height,o=new Uint8ClampedArray(d.length),gain=amount/100,hi=1-highlightSuppress/130;for(let y=0;y<h;y++)for(let x=0;x<w;x++){let i=idx(x,y,w);if(d[i+3]===0)continue;let sum=[0,0,0],n=0;for(let yy=Math.max(0,y-1);yy<=Math.min(h-1,y+1);yy++)for(let xx=Math.max(0,x-1);xx<=Math.min(w-1,x+1);xx++){let j=idx(xx,yy,w);if(d[j+3]>0){sum[0]+=d[j];sum[1]+=d[j+1];sum[2]+=d[j+2];n++}}for(let k=0;k<3;k++){let delta=(d[i+k]-sum[k]/n)*gain;if(delta>0)delta*=hi;o[i+k]=Math.max(0,Math.min(255,128+delta*2))}o[i+3]=Math.min(210,Math.abs(luminance(o,i)-128)*3)}return new ImageData(o,w,h)}
function combineLayers(form,structure,detail){const f=form.data,s=structure.data,d=detail.data,o=new Uint8ClampedArray(f.length);for(let i=0;i<f.length;i+=4){if(f[i+3]===0){o[i+3]=0;continue}let edge=s[i+3]/255,det=d[i+3]/255;for(let k=0;k<3;k++){let v=f[i+k];if(edge>.1)v=v*(1-edge*.72)+s[i+k]*(edge*.72);let delta=(d[i+k]-128)*det*.35;v+=delta;o[i+k]=Math.max(0,Math.min(255,v))}o[i+3]=f[i+3]}return new ImageData(o,128,128)}
function enforceMinWidth(img,minW){if(minW<=1)return img;const d=img.data,w=img.width,h=img.height,o=new Uint8ClampedArray(d);for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){let i=idx(x,y,w);if(d[i+3]>0)continue;let l=idx(x-1,y,w),r=idx(x+1,y,w),u=idx(x,y-1,w),dn=idx(x,y+1,w);if((d[l+3]>150&&d[r+3]>150)||(d[u+3]>150&&d[dn+3]>150)){let src=d[l+3]>150?l:u;o.set(d.slice(src,src+4),i)}}return new ImageData(o,w,h)}
function cleanupPixels(img,level){if(!level)return img;let d=new Uint8ClampedArray(img.data),w=img.width,h=img.height;for(let pass=0;pass<level;pass++){let o=new Uint8ClampedArray(d);for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){let i=idx(x,y,w);if(d[i+3]===0)continue;let same=0,neighbors=[];for(let yy=-1;yy<=1;yy++)for(let xx=-1;xx<=1;xx++){if(!xx&&!yy)continue;let j=idx(x+xx,y+yy,w);if(d[j+3]>0){neighbors.push(j);let dist=Math.abs(d[j]-d[i])+Math.abs(d[j+1]-d[i+1])+Math.abs(d[j+2]-d[i+2]);if(dist<42)same++}}if(same===0&&neighbors.length){let best=neighbors[0];o[i]=d[best];o[i+1]=d[best+1];o[i+2]=d[best+2]}}d=o}return new ImageData(d,w,h)}
function showView(){let img=results[currentView];if(!img)return;outCtx.putImageData(img,0,0);$('viewLabel').textContent={final:'完成',structure:'輪郭',form:'色面',detail:'Detail'}[currentView]}
function exportPNG(){if(!results.final){setStatus('先に再構築を実行してください。','warn');return}const tmp=document.createElement('canvas');tmp.width=128;tmp.height=128;tmp.getContext('2d').putImageData(results.final,0,0);const a=document.createElement('a');a.download='pixel_reconstruction_128.png';a.href=tmp.toDataURL('image/png');a.click()}
function applyPreset(name){const p={body:{structure:86,sharp:70,form:72,sat:65,detail:36,highlight:68,colors:24,minWidth:2,cleanup:2},character:{structure:78,sharp:64,form:58,sat:78,detail:48,highlight:50,colors:32,minWidth:1,cleanup:1},hard:{structure:92,sharp:82,form:80,sat:70,detail:28,highlight:75,colors:16,minWidth:2,cleanup:2}}[name];for(const [k,v] of Object.entries(p)){$(k).value=v;$(k).dispatchEvent(new Event('input'))}if(sourceImage)processImage()}
</script>
</body>
</html>

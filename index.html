<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Non-AI Character Analyzer v1.0</title><style>
:root{--bg:#f3f6fa;--card:#fff;--line:#cfd8e3;--txt:#111827;--mut:#64748b}body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.wrap{max-width:1180px;margin:auto;padding:18px}h1{font-size:28px;margin:0 0 8px}.lead{color:var(--mut);line-height:1.6}.bar{background:#0f172a;color:#e5e7eb;border-radius:18px;padding:14px;margin:14px 0;display:grid;gap:10px}input,select,button{font-size:16px}button{border:0;border-radius:12px;background:#2563eb;color:white;padding:10px 14px;font-weight:700}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;overflow:auto}.card h2{font-size:18px;margin:0 0 10px}canvas{max-width:100%;background:white;border-radius:8px}.log{white-space:pre-wrap;font:13px ui-monospace,SFMono-Regular,Menlo,monospace;max-height:260px;overflow:auto}.ok{color:#059669}.warn{color:#dc2626}.score{font-size:28px;font-weight:900}.small{font-size:13px;color:var(--mut)}@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}.wrap{padding:12px}h1{font-size:24px}}@media(max-width:560px){.grid{grid-template-columns:1fr}}
</style></head><body><div class="wrap"><h1>Non-AI Character Analyzer v1.0</h1><div class="lead">v1.0は「全体Region先行」をやめ、人物マスクから <b>Head / Torso / Arms / Legs Workspace</b> を先に作り、その中だけを色分割・候補分類します。対象は白背景・単色背景・薄グラデーション・透過PNGです。</div><div class="bar"><div><input id="file" type="file" accept="image/*"> <button id="sampleBtn">サンプル解析</button> <button id="saveBtn">まとめPNG保存</button></div><div class="small">内部処理はCanvasのみ。外部API・AI・学習モデルなし。</div></div><div class="grid">
<div class="card"><h2>0. 元画像</h2><canvas id="c0"></canvas></div>
<div class="card"><h2>1. 背景除去RGBA</h2><canvas id="c1"></canvas></div>
<div class="card"><h2>2. 人物マスク</h2><canvas id="c2"></canvas></div>
<div class="card"><h2>3. 横幅プロファイル</h2><canvas id="c3"></canvas></div>
<div class="card"><h2>4. Workspace分割</h2><canvas id="c4"></canvas></div>
<div class="card"><h2>5. Workspace内Region</h2><canvas id="c5"></canvas></div>
<div class="card"><h2>6. 候補分類</h2><canvas id="c6"></canvas></div>
<div class="card"><h2>7. 品質スコア</h2><div id="score" class="score">-</div><div id="qlog" class="log"></div></div>
<div class="card"><h2>8. 候補ログ</h2><div id="rlog" class="log"></div></div>
</div></div><script>
const $=id=>document.getElementById(id); const cvs=[...Array(7)].map((_,i)=>$('c'+i)); let last=null;
const PALETTE=['#ff3b30','#ff9500','#ffcc00','#34c759','#00c7be','#007aff','#af52de','#ff2d55','#8e8e93','#111827'];
function fitSize(w,h,max=430){let s=Math.min(max/w,max/h,1);return [Math.round(w*s),Math.round(h*s)]}
function drawTo(c,img,w,h){c.width=w;c.height=h;let x=c.getContext('2d');x.clearRect(0,0,w,h);x.drawImage(img,0,0,w,h);}
function getImgData(c){return c.getContext('2d').getImageData(0,0,c.width,c.height)}
function put(c,img){c.width=img.width;c.height=img.height;c.getContext('2d').putImageData(img,0,0)}
function rgbAt(d,i){return [d[i],d[i+1],d[i+2],d[i+3]]}
function dist(a,b){let dr=a[0]-b[0],dg=a[1]-b[1],db=a[2]-b[2];return Math.sqrt(dr*dr+dg*dg+db*db)}
function sat(r,g,b){let mx=Math.max(r,g,b),mn=Math.min(r,g,b);return mx? (mx-mn)/mx:0}
function avg(arr){return arr.reduce((a,b)=>a+b,0)/(arr.length||1)}
function bgStats(img){let w=img.width,h=img.height,d=img.data, samples=[];for(let y=0;y<h;y++){for(let x of [0,1,2,w-3,w-2,w-1]){let i=(y*w+x)*4;if(d[i+3]>10)samples.push([d[i],d[i+1],d[i+2]])}}for(let x=0;x<w;x++){for(let y of [0,1,2,h-3,h-2,h-1]){let i=(y*w+x)*4;if(d[i+3]>10)samples.push([d[i],d[i+1],d[i+2]])}}let mean=[avg(samples.map(p=>p[0])),avg(samples.map(p=>p[1])),avg(samples.map(p=>p[2]))];let v=avg(samples.map(p=>dist(p,mean)));let alphaCount=0;for(let i=3;i<d.length;i+=4) if(d[i]<240) alphaCount++;return {mean,variance:v,transparent:alphaCount>d.length/4/40};}
function makeMask(img,st){let w=img.width,h=img.height,d=img.data,mask=new Uint8Array(w*h),soft=new Uint8Array(w*h);let bg=st.mean;for(let y=0;y<h;y++){for(let x=0;x<w;x++){let i=(y*w+x)*4,p=[d[i],d[i+1],d[i+2]],a=d[i+3];let s=sat(p[0],p[1],p[2]);let dd=dist(p,bg);let fg=0;if(st.transparent){fg=a>35?255:0}else{fg=(dd>26 || (s>0.16 && dd>16))?255:0;} // 白/薄グラデ想定
// 下部の低彩度横長影を弱める
if(y>h*0.78 && s<0.12 && dd<70) fg=0;
mask[y*w+x]=fg?1:0;soft[y*w+x]=Math.max(0,Math.min(255,Math.round((dd-12)*4)));
}}return {mask,soft};}
function comp(mask,w,h){let seen=new Uint8Array(w*h),res=[];let qx=[],qy=[];for(let y=0;y<h;y++)for(let x=0;x<w;x++){let idx=y*w+x;if(!mask[idx]||seen[idx])continue;let minx=x,maxx=x,miny=y,maxy=y,area=0,cx=0,cy=0;qx=[x];qy=[y];seen[idx]=1;for(let qi=0;qi<qx.length;qi++){let px=qx[qi],py=qy[qi],pidx=py*w+px;area++;cx+=px;cy+=py;if(px<minx)minx=px;if(px>maxx)maxx=px;if(py<miny)miny=py;if(py>maxy)maxy=py;for(let [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){let nx=px+dx,ny=py+dy;if(nx<0||ny<0||nx>=w||ny>=h)continue;let ni=ny*w+nx;if(mask[ni]&&!seen[ni]){seen[ni]=1;qx.push(nx);qy.push(ny)}}}res.push({area,minx,maxx,miny,maxy,cx:cx/area,cy:cy/area,w:maxx-minx+1,h:maxy-miny+1});}return res.sort((a,b)=>b.area-a.area)}
function keepMain(mask,w,h){let cs=comp(mask,w,h);if(!cs.length)return mask;let center=w/2;let best=cs[0],bestScore=-1;for(let c of cs){let bottomWide=(c.cy>h*.82 && c.w>w*.45);let edge=(c.minx<3||c.maxx>w-4);let sc=c.area*(1-Math.min(0.9,Math.abs(c.cx-center)/(w/2)));if(bottomWide)sc*=0.05;if(edge&&c.area<cs[0].area*.3)sc*=0.2;if(sc>bestScore){bestScore=sc;best=c}}let out=new Uint8Array(w*h);for(let y=best.miny;y<=best.maxy;y++)for(let x=best.minx;x<=best.maxx;x++){let i=y*w+x;if(mask[i])out[i]=1} // include only pixels in bbox first
// remove other components; then close tiny holes crudely by neighborhood majority
let main=new Uint8Array(w*h);let target=comp(out,w,h)[0]||best;for(let y=target.miny;y<=target.maxy;y++)for(let x=target.minx;x<=target.maxx;x++){let i=y*w+x;if(mask[i])main[i]=1}
return majority(main,w,h,1);
}
function majority(mask,w,h,iter){let cur=mask;for(let k=0;k<iter;k++){let n=new Uint8Array(w*h);for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){let c=0;for(let yy=-1;yy<=1;yy++)for(let xx=-1;xx<=1;xx++)c+=cur[(y+yy)*w+x+xx];n[y*w+x]=(c>=4)?1:0;}cur=n}return cur;}
function maskImage(mask,w,h){let im=new ImageData(w,h);for(let i=0;i<w*h;i++){let v=mask[i]?0:255;im.data[i*4]=v;im.data[i*4+1]=v;im.data[i*4+2]=v;im.data[i*4+3]=255;}return im}
function rgbaCut(img,mask){let im=new ImageData(img.width,img.height),d=img.data,o=im.data;for(let i=0;i<mask.length;i++){o[i*4]=d[i*4];o[i*4+1]=d[i*4+1];o[i*4+2]=d[i*4+2];o[i*4+3]=mask[i]?255:0;}return im}
function bbox(mask,w,h){let minx=w,miny=h,maxx=0,maxy=0,a=0;for(let y=0;y<h;y++)for(let x=0;x<w;x++){if(mask[y*w+x]){a++;if(x<minx)minx=x;if(x>maxx)maxx=x;if(y<miny)miny=y;if(y>maxy)maxy=y}}return {minx,miny,maxx,maxy,w:maxx-minx+1,h:maxy-miny+1,area:a}}
function profile(mask,w,h,bb){let p=[];for(let y=bb.miny;y<=bb.maxy;y++){let c=0;for(let x=bb.minx;x<=bb.maxx;x++)c+=mask[y*w+x];p.push(c)}return p}
function workspaces(mask,w,h){let bb=bbox(mask,w,h),p=profile(mask,w,h,bb),H=bb.h;let sm=p.map((_,i)=>avg(p.slice(Math.max(0,i-3),Math.min(p.length,i+4))));let top=bb.miny,bottom=bb.maxy;let maxHeadI=0,maxv=0;for(let i=0;i<Math.floor(H*.33);i++){if(sm[i]>maxv){maxv=sm[i];maxHeadI=i}}let neckI=Math.floor(H*.21);let best=1e9;for(let i=maxHeadI+8;i<Math.floor(H*.38);i++){if(sm[i]<best && sm[i]>2){best=sm[i];neckI=i}}let headBottom=top+neckI;let torsoBottom=top+Math.floor(H*.58);let legTop=torsoBottom-8;let cx=(bb.minx+bb.maxx)/2;let shoulderY=headBottom+Math.floor(H*.05);let torso={x:bb.minx,y:headBottom,w:bb.w,h:torsoBottom-headBottom};return {
bb, head:{x:bb.minx,y:top,w:bb.w,h:Math.max(20,headBottom-top)}, torso,
legs:{x:bb.minx,y:legTop,w:bb.w,h:bottom-legTop+1},
armL:{x:bb.minx,y:headBottom,w:Math.floor(bb.w*.42),h:Math.floor(H*.55)},armR:{x:Math.floor(cx+bb.w*.08),y:headBottom,w:Math.floor(bb.w*.42),h:Math.floor(H*.55)},profile:sm,headBottom,torsoBottom};}
function drawPanelBase(c,img){c.width=img.width;c.height=img.height;let ctx=c.getContext('2d');ctx.putImageData(img,0,0);return ctx}
function rect(ctx,r,col,label){ctx.strokeStyle=col;ctx.lineWidth=2;ctx.strokeRect(r.x,r.y,r.w,r.h);ctx.fillStyle=col;ctx.font='11px sans-serif';ctx.fillText(label,r.x+3,r.y+12)}
function drawProfile(c,mask,w,h,ws){c.width=w;c.height=h;let ctx=c.getContext('2d');ctx.fillStyle='#111827';ctx.fillRect(0,0,w,h);let bb=ws.bb;ctx.strokeStyle='#64748b';ctx.strokeRect(bb.minx,bb.miny,bb.w,bb.h);let max=Math.max(...ws.profile,1);ctx.strokeStyle='#facc15';ctx.beginPath();ws.profile.forEach((v,i)=>{let y=bb.miny+i,x=bb.minx+v/max*bb.w;if(i==0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});ctx.stroke();ctx.strokeStyle='#ef4444';ctx.beginPath();ctx.moveTo(bb.minx,ws.headBottom);ctx.lineTo(bb.maxx,ws.headBottom);ctx.stroke();ctx.strokeStyle='#3b82f6';ctx.beginPath();ctx.moveTo(bb.minx,ws.torsoBottom);ctx.lineTo(bb.maxx,ws.torsoBottom);ctx.stroke();ctx.fillStyle='white';ctx.font='12px sans-serif';ctx.fillText('yellow: width profile',8,18);ctx.fillText('red: head/torso',8,34);ctx.fillText('blue: torso/legs',8,50)}
function inRect(x,y,r){return x>=r.x&&y>=r.y&&x<r.x+r.w&&y<r.y+r.h}
function colorKey(r,g,b){let R=Math.round(r/48)*48,G=Math.round(g/48)*48,B=Math.round(b/48)*48;return `${R},${G},${B}`}
function regionInWorkspace(img,mask,ws){let w=img.width,h=img.height,d=img.data,regs=[];let boxes=[['HEAD',ws.head],['TORSO',ws.torso],['ARM_L',ws.armL],['ARM_R',ws.armR],['LEGS',ws.legs]];let id=1;for(let [zone,r] of boxes){let buckets={};for(let y=Math.max(0,r.y);y<Math.min(h,r.y+r.h);y++)for(let x=Math.max(0,r.x);x<Math.min(w,r.x+r.w);x++){let idx=y*w+x;if(!mask[idx])continue;let i=idx*4,k=colorKey(d[i],d[i+1],d[i+2]);(buckets[k]||(buckets[k]=[])).push(idx)}for(let k in buckets){let m=new Uint8Array(w*h);for(let idx of buckets[k])m[idx]=1;for(let c of comp(m,w,h)){if(c.area<45)continue;let [rr,gg,bb]=k.split(',').map(Number);regs.push({...c,id:id++,zone,color:[rr,gg,bb],hex:'#'+[rr,gg,bb].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('')});}}}return regs.sort((a,b)=>b.area-a.area).slice(0,80)}
function classify(reg,ws,img){let [r,g,b]=reg.color, s=sat(r,g,b), dark=(r+g+b)/3<95, green=g>r*1.08&&g>b*.75, pale=s<.18&&(r+g+b)/3>120, skin=(r>150&&g>100&&b>80&&r>g&&g>=b*.7);let cx=reg.cx,cy=reg.cy,reason=[],type='未分類候補',conf=15;
if(reg.zone==='HEAD'){if(skin && reg.cx>ws.bb.minx+ws.bb.w*.25&&reg.cx<ws.bb.maxx-ws.bb.w*.25){type='顔候補';conf=72;reason.push('skin + head center')}else if((pale||dark||s>.08)&&reg.area>120){type='髪候補';conf=68;reason.push('head zone + non skin / large')}if(skin && (reg.cx<ws.bb.minx+ws.bb.w*.25||reg.cx>ws.bb.maxx-ws.bb.w*.75)){type='耳候補';conf=60;reason.push('skin + head side')}if(s>.35&&reg.area<600){type='装飾候補';conf=58;reason.push('high saturation + small head part')}}
if(reg.zone==='TORSO'){if(green||dark){type='胴衣装候補';conf=74;reason.push((green?'green':'dark')+' + torso')}else if(skin){type='肌/胸元候補';conf=60;reason.push('skin + torso')}else if(pale){type='薄布候補';conf=55;reason.push('pale + torso')}}
if(reg.zone==='ARM_L'||reg.zone==='ARM_R'){if(pale){type='袖/布候補';conf=70;reason.push('pale + arm side')}else if(skin){type='腕/手候補';conf=62;reason.push('skin + arm zone')}else if(dark||green){type='腕衣装候補';conf=52;reason.push('cloth color + arm zone')}}
if(reg.zone==='LEGS'){if(green||dark){type='脚衣装候補';conf=76;reason.push('dark/green + legs')}if(cy>ws.bb.miny+ws.bb.h*.82 && reg.area<1800){type='靴候補';conf=62;reason.push('lower foot area')}}
return {...reg,type,conf,reason:reason.join(' / ')||'rule not matched'} }
function drawRegions(c,img,regs,ws,classified=false){let ctx=drawPanelBase(c,img);rect(ctx,ws.head,'#ef4444','HEAD');rect(ctx,ws.torso,'#f59e0b','TORSO');rect(ctx,ws.legs,'#3b82f6','LEGS');rect(ctx,ws.armL,'#10b981','ARM L');rect(ctx,ws.armR,'#10b981','ARM R');ctx.font='10px sans-serif';regs.slice(0,45).forEach((r,i)=>{let col=classified?(r.type.includes('髪')?'#ff2d95':r.type.includes('衣装')?'#14b8a6':r.type.includes('袖')||r.type.includes('薄布')?'#67e8f9':r.type.includes('脚')||r.type.includes('靴')?'#fb923c':'#94a3b8'):PALETTE[i%PALETTE.length];ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.strokeRect(r.minx,r.miny,r.w,r.h);ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(r.minx,r.miny,classified?70:24,12);ctx.fillStyle='white';ctx.fillText(classified?`${r.type.replace('候補','')} ${r.conf}`:`${r.zone[0]}${r.id}`,r.minx+2,r.miny+10);});}
function scoreAndLog(st,mask,ws,regs,cl){let bb=ws.bb,w=mask.w||0;let score=80,log=[];function ok(t){log.push('OK   '+t)}function warn(t,p=5){score-=p;log.push('WARN '+t)} if(st.transparent)ok('透過PNGとして解析。'); else if(st.variance<28)ok('単純/薄グラデーション背景として解析。'); else warn('背景が複雑寄り。白背景・透過推奨。',12); let areaRatio=bb.area/(last.w*last.h); if(areaRatio>.12&&areaRatio<.75)ok('前景面積は許容範囲。'); else warn('前景面積が想定外。背景除去調整が必要。',10); if(regs.length<55)ok('Region数は制御範囲。'); else warn('Regionが多い。髪/布/模様が分裂。',8); if(ws.head.h>last.h*.08&&ws.head.h<last.h*.35)ok('HEAD Workspaceは推定範囲内。'); else warn('HEAD推定が不安定。',8); if(cl.filter(x=>x.conf>=60).length>=5)ok('高信頼候補が複数あります。'); else warn('高信頼候補が少ない。ルール不足。',8); score=Math.max(0,Math.min(100,Math.round(score)));return {score,log};}
function process(img){let [w,h]=fitSize(img.naturalWidth,img.naturalHeight,430);last={w,h};drawTo(cvs[0],img,w,h);let id=getImgData(cvs[0]);let st=bgStats(id);let {mask}=makeMask(id,st);mask=keepMain(mask,w,h);put(cvs[1],rgbaCut(id,mask));put(cvs[2],maskImage(mask,w,h));let ws=workspaces(mask,w,h);drawProfile(cvs[3],mask,w,h,ws);let ctx=drawPanelBase(cvs[4],id);rect(ctx,ws.head,'#ef4444','HEAD');rect(ctx,ws.torso,'#f59e0b','TORSO');rect(ctx,ws.legs,'#3b82f6','LEGS');rect(ctx,ws.armL,'#10b981','ARM L');rect(ctx,ws.armR,'#10b981','ARM R');let regs=regionInWorkspace(id,mask,ws);drawRegions(cvs[5],id,regs,ws,false);let cl=regs.map(r=>classify(r,ws,id)).sort((a,b)=>b.conf-a.conf||b.area-a.area);drawRegions(cvs[6],id,cl,ws,true);let qs=scoreAndLog(st,mask,ws,regs,cl);$('score').textContent='Score '+qs.score;$('score').style.color=qs.score>=70?'#059669':qs.score>=55?'#d97706':'#dc2626';$('qlog').textContent=qs.log.join('\n');$('rlog').textContent=cl.slice(0,35).map((r,i)=>`${String(i+1).padStart(2,'0')} ${r.type} conf=${r.conf} zone=${r.zone} area=${r.area} bbox=${r.w}x${r.h} color=${r.hex} reason=${r.reason}`).join('\n');}
function load(src){let img=new Image();img.onload=()=>process(img);img.src=src}
$('sampleBtn').onclick=()=>load('sample.png');$('file').onchange=e=>{let f=e.target.files[0];if(f)load(URL.createObjectURL(f))};$('saveBtn').onclick=()=>{let W=900,H=1200,out=document.createElement('canvas');out.width=W;out.height=H;let x=out.getContext('2d');x.fillStyle='#f3f6fa';x.fillRect(0,0,W,H);x.fillStyle='#111827';x.font='bold 28px sans-serif';x.fillText('Non-AI Character Analyzer v1.0 Summary',24,42);let pos=[[24,70],[318,70],[612,70],[24,390],[318,390],[612,390],[24,710]];cvs.forEach((c,i)=>{let [px,py]=pos[i];x.fillStyle='white';x.fillRect(px,py,260,290);x.drawImage(c,px+15,py+35,230,230);x.fillStyle='#111827';x.font='bold 16px sans-serif';x.fillText(['Original','RGBA Cutout','Mask','Profile','Workspace','Regions','Candidates'][i],px+15,py+24)});x.fillStyle='white';x.fillRect(318,710,558,430);x.fillStyle='#111827';x.font='bold 24px sans-serif';x.fillText($('score').textContent,340,750);x.font='13px monospace';let lines=($('qlog').textContent+'\n\n'+$('rlog').textContent).split('\n').slice(0,28);lines.forEach((l,i)=>x.fillText(l,340,780+i*14));let a=document.createElement('a');a.download='non_ai_analysis_v1_0_summary.png';a.href=out.toDataURL();a.click();};
load('sample.png');
</script></body></html>

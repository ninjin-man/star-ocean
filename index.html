<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sprite Studio — True Pixel Converter</title>
<style>
:root{--bg:#0c1118;--panel:#151c27;--panel2:#0f1620;--line:#2b3748;--text:#f6f8fc;--muted:#a2afc1;--accent:#72a7ff;--good:#5bd394;--warn:#ffc16c}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}button,input,select{font:inherit}header{position:sticky;top:0;z-index:9;padding:12px 14px;background:#0c1118ef;backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}h1{font-size:18px;margin:0 0 3px}header p{font-size:12px;line-height:1.45;color:var(--muted);margin:0}main{max-width:1120px;margin:auto;padding:12px;display:grid;gap:12px}.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px}.preview{display:grid;gap:10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.pane{overflow:hidden;background:var(--panel2);border:1px solid var(--line);border-radius:12px}.title{padding:8px 10px;border-bottom:1px solid var(--line);font-size:12px;color:var(--muted);display:flex;justify-content:space-between}.wrap{position:relative;display:grid;place-items:center;aspect-ratio:1;background:linear-gradient(45deg,#151c26 25%,#202a38 25%,#202a38 50%,#151c26 50%,#151c26 75%,#202a38 75%);background-size:18px 18px;overflow:hidden;touch-action:none}canvas{width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges}.controls{display:grid;gap:13px}.group{display:grid;gap:8px}.group h2{font-size:14px;margin:0}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}label{font-size:12px;color:var(--muted);display:grid;gap:5px}.val{color:var(--text);float:right}select,input[type=file],button{width:100%;min-height:44px;border-radius:10px;border:1px solid var(--line);background:#0e1520;color:var(--text);padding:9px}button{background:#316fe8;border-color:#568aef;font-weight:700}.secondary{background:#202a38}.active{background:#315eaf!important;border-color:#7ba6ff!important}.status{font-size:12px;line-height:1.65;color:var(--muted)}.badge{display:inline-block;background:#233149;color:#d7e2f6;border-radius:999px;padding:3px 7px;margin:2px 3px 2px 0}.note{background:#101925;border-left:3px solid var(--accent);padding:9px;border-radius:8px;font-size:12px;color:#c9d4e2;line-height:1.6}.good{color:var(--good)}.warn{color:var(--warn)}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.tabs button{font-size:12px;min-height:38px;padding:6px;background:#202a38}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.cropHint{font-size:11px;color:var(--muted);text-align:center}
@media(min-width:840px){main{grid-template-columns:1.2fr .8fr}.preview{position:sticky;top:76px;align-self:start}}
</style>
</head>
<body>
<header><h1>True Pixel Converter</h1><p>AIの「ドット絵風」を、128×128の実ゲーム用ドット絵へ再構築します。</p></header>
<main>
<section class="card preview">
  <div class="grid">
    <div class="pane"><div class="title"><span>入力・切り抜き</span><span id="srcInfo">未読込</span></div><div class="wrap" id="srcWrap"><canvas id="src" width="512" height="512"></canvas></div></div>
    <div class="pane"><div class="title"><span id="outLabel">完成</span><span>128×128</span></div><div class="wrap"><canvas id="out" width="128" height="128"></canvas></div></div>
  </div>
  <div class="cropHint">入力側を指でドラッグして位置調整。ピンチ操作の代わりに下の拡大率を使用します。</div>
  <div class="tabs" id="tabs"><button data-view="final" class="active">完成</button><button data-view="silhouette">輪郭</button><button data-view="flat">色面</button><button data-view="detail">Detail</button></div>
  <div class="actions"><button id="run">ドット絵へ変換</button><button id="save" class="secondary">PNG保存</button></div>
  <div class="status" id="status"><span class="badge">単一HTML</span><span class="badge">ローカル処理</span><span class="badge">iPhone対応</span><br>画像を読み込んでください。</div>
</section>
<section class="card controls">
  <div class="group"><h2>1. 画像と切り抜き</h2><label>画像<input id="file" type="file" accept="image/*"></label><div class="two"><label>拡大率 <span class="val" id="zoomVal">100%</span><input id="zoom" type="range" min="30" max="260" value="100"></label><label>回転<select id="rotate"><option value="0">0°</option><option value="90">90°</option><option value="180">180°</option><option value="270">270°</option></select></label></div><div class="three"><button class="secondary cropPreset" data-crop="front">左・正面</button><button class="secondary cropPreset" data-crop="side">中央・側面</button><button class="secondary cropPreset" data-crop="back">右・背面</button></div><label>背景<select id="bg"><option value="auto" selected>自動除去</option><option value="light">白系を除去</option><option value="dark">黒系を除去</option><option value="keep">保持</option></select></label></div>

  <div class="group"><h2>2. ピクセル設計</h2><div class="two"><label>内部設計解像度<select id="designRes"><option value="48">48px（強い省略）</option><option value="64" selected>64px（推奨）</option><option value="80">80px（細部多め）</option><option value="96">96px（忠実）</option><option value="128">128px（最小変換）</option></select></label><label>出力<select id="outputSize"><option value="128" selected>128×128</option><option value="64">64×64</option><option value="32">32×32</option></select></label></div><label>輪郭優先 <span class="val" id="edgeVal">84</span><input id="edge" type="range" min="0" max="100" value="84"></label><label>面の単純化 <span class="val" id="simplifyVal">68</span><input id="simplify" type="range" min="0" max="100" value="68"></label></div>

  <div class="group"><h2>3. パレット</h2><div class="two"><label>最大色数<select id="colors"><option>12</option><option>16</option><option selected>24</option><option>32</option><option>40</option><option>48</option></select></label><label>輪郭色<select id="outline"><option value="source" selected>元画像から</option><option value="brown">濃茶</option><option value="none">追加しない</option></select></label></div><label>彩度保持 <span class="val" id="satVal">78</span><input id="sat" type="range" min="0" max="120" value="78"></label><label>影の段階 <span class="val" id="shadeVal">4</span><input id="shade" type="range" min="2" max="7" value="4"></label></div>

  <div class="group"><h2>4. 職人補正</h2><label>孤立ドット除去 <span class="val" id="cleanupVal">2</span><input id="cleanup" type="range" min="0" max="4" value="2"></label><label>輪郭リズム <span class="val" id="rhythmVal">64</span><input id="rhythm" type="range" min="0" max="100" value="64"></label><label>Detail再注入 <span class="val" id="detailVal">34</span><input id="detailAmt" type="range" min="0" max="100" value="34"></label><div class="note">高解像度を直接128pxに落とさず、いったん64px前後で形を整理してから128pxへ整数倍拡大します。これが「ドット風」から「ドット絵」へ変える中心処理です。</div></div>

  <div class="group"><h2>プリセット</h2><div class="three"><button class="secondary preset" data-preset="body">素体</button><button class="secondary preset" data-preset="character">完成キャラ</button><button class="secondary preset" data-preset="hard">SFC強め</button></div></div>
</section>
</main>
<script>
'use strict';
const $=id=>document.getElementById(id), src=$('src'), sctx=src.getContext('2d',{willReadFrequently:true}), out=$('out'), octx=out.getContext('2d',{willReadFrequently:true});
sctx.imageSmoothingEnabled=true;octx.imageSmoothingEnabled=false;
let img=null, view='final', results={}, panX=0, panY=0, dragging=false, lastX=0,lastY=0;
const rangeMap={zoom:'zoomVal',edge:'edgeVal',simplify:'simplifyVal',sat:'satVal',shade:'shadeVal',cleanup:'cleanupVal',rhythm:'rhythmVal',detailAmt:'detailVal'};
for(const [id,v] of Object.entries(rangeMap)){const e=$(id),t=$(v);const sync=()=>t.textContent=id==='zoom'?e.value+'%':e.value;e.oninput=()=>{sync();if(id==='zoom')drawSource()};sync()}
$('file').onchange=e=>{const f=e.target.files?.[0];if(!f)return;const im=new Image();im.onload=()=>{img=im;panX=panY=0;$('srcInfo').textContent=`${im.naturalWidth}×${im.naturalHeight}`;drawSource();status('画像を読み込みました。切り抜きを調整して変換してください。','good');URL.revokeObjectURL(im.src)};im.src=URL.createObjectURL(f)};
$('srcWrap').addEventListener('pointerdown',e=>{if(!img)return;dragging=true;lastX=e.clientX;lastY=e.clientY;e.currentTarget.setPointerCapture(e.pointerId)});$('srcWrap').addEventListener('pointermove',e=>{if(!dragging)return;const r=src.getBoundingClientRect();panX+=(e.clientX-lastX)*512/r.width;panY+=(e.clientY-lastY)*512/r.height;lastX=e.clientX;lastY=e.clientY;drawSource()});$('srcWrap').addEventListener('pointerup',()=>dragging=false);$('srcWrap').addEventListener('pointercancel',()=>dragging=false);
$('rotate').onchange=drawSource;$('run').onclick=process;$('save').onclick=savePNG;
for(const b of document.querySelectorAll('.cropPreset'))b.onclick=()=>setCrop(b.dataset.crop);
for(const b of document.querySelectorAll('.preset'))b.onclick=()=>preset(b.dataset.preset);
for(const b of document.querySelectorAll('#tabs button'))b.onclick=()=>{document.querySelectorAll('#tabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');view=b.dataset.view;show()};
for(const e of document.querySelectorAll('select,input[type=range]'))if(!['zoom','rotate'].includes(e.id))e.onchange=()=>img&&process();
function status(m,c=''){$('status').innerHTML=`<span class="badge">ローカル処理</span><span class="badge">真のピクセル出力</span><br><span class="${c}">${m}</span>`}
function transformParams(size=512){const rot=+$('rotate').value*Math.PI/180,z=+$('zoom').value/100;const iw=(rot%Math.PI===0?img.width:img.height),ih=(rot%Math.PI===0?img.height:img.width);const scale=Math.min(size/iw,size/ih)*z;return{rot,scale}}
function drawInto(ctx,size){ctx.clearRect(0,0,size,size);if(!img)return;const {rot,scale}=transformParams(size);ctx.save();ctx.translate(size/2+panX*size/512,size/2+panY*size/512);ctx.rotate(rot);ctx.drawImage(img,-img.width*scale/2,-img.height*scale/2,img.width*scale,img.height*scale);ctx.restore()}
function drawSource(){drawInto(sctx,512)}
function setCrop(type){if(!img)return;const z=type==='side'?150:145;$('zoom').value=z;$('zoom').dispatchEvent(new Event('input'));panY=10;panX=type==='front'?150:type==='side'?0:-150;drawSource()}
function process(){if(!img){status('先に画像を読み込んでください。','warn');return}status('再構築中…');requestAnimationFrame(()=>{const design=+$('designRes').value,output=+$('outputSize').value;const hi=document.createElement('canvas');hi.width=hi.height=512;const hc=hi.getContext('2d',{willReadFrequently:true});drawInto(hc,512);let a=hc.getImageData(0,0,512,512);a=removeBG(a,$('bg').value);a=resizeArea(a,design,design);a=flattenAlpha(a);let silhouette=makeSilhouette(a,+$('edge').value);let flat=regionSmooth(a,+$('simplify').value);flat=shadeCompress(flat,+$('shade').value);flat=quantize(flat,+$('colors').value,+$('sat').value);let detail=detailLayer(a,+$('detailAmt').value);let final=merge(flat,silhouette,detail,$('outline').value,+$('edge').value);final=cleanup(final,+$('cleanup').value);final=contourRhythm(final,+$('rhythm').value);if(output!==design)final=nearestResize(final,output,output);results={final,silhouette:nearestResize(silhouette,output,output),flat:nearestResize(flat,output,output),detail:nearestResize(detail,output,output)};out.width=out.height=output;show();status(`完了：${design}pxで再設計 → ${output}×${output}px出力。`,'good')})}
function idx(x,y,w){return(y*w+x)*4}function lum(d,i){return .2126*d[i]+.7152*d[i+1]+.0722*d[i+2]}
function removeBG(im,mode){if(mode==='keep')return im;const d=im.data,w=im.width,h=im.height;let bg;if(mode==='light')bg=[255,255,255];else if(mode==='dark')bg=[0,0,0];else{const pts=[[2,2],[w-3,2],[2,h-3],[w-3,h-3]];bg=[0,0,0];for(const [x,y] of pts){let i=idx(x,y,w);bg[0]+=d[i]/4;bg[1]+=d[i+1]/4;bg[2]+=d[i+2]/4}}for(let i=0;i<d.length;i+=4){const dist=Math.hypot(d[i]-bg[0],d[i+1]-bg[1],d[i+2]-bg[2]);if(dist<22)d[i+3]=0;else if(dist<60)d[i+3]=Math.round(d[i+3]*(dist-22)/38)}return im}
function resizeArea(im,nw,nh){const w=im.width,h=im.height,sd=im.data,od=new Uint8ClampedArray(nw*nh*4);for(let y=0;y<nh;y++)for(let x=0;x<nw;x++){const x0=x*w/nw,x1=(x+1)*w/nw,y0=y*h/nh,y1=(y+1)*h/nh;let r=0,g=0,b=0,a=0,ws=0;for(let yy=Math.floor(y0);yy<Math.ceil(y1);yy++)for(let xx=Math.floor(x0);xx<Math.ceil(x1);xx++){if(xx<0||yy<0||xx>=w||yy>=h)continue;const wx=Math.max(0,Math.min(x1,xx+1)-Math.max(x0,xx)),wy=Math.max(0,Math.min(y1,yy+1)-Math.max(y0,yy)),wt=wx*wy,j=idx(xx,yy,w);r+=sd[j]*wt;g+=sd[j+1]*wt;b+=sd[j+2]*wt;a+=sd[j+3]*wt;ws+=wt}let i=idx(x,y,nw);od[i]=r/ws;od[i+1]=g/ws;od[i+2]=b/ws;od[i+3]=a/ws}return new ImageData(od,nw,nh)}
function nearestResize(im,nw,nh){const od=new Uint8ClampedArray(nw*nh*4),d=im.data;for(let y=0;y<nh;y++)for(let x=0;x<nw;x++){let sx=Math.min(im.width-1,Math.floor(x*im.width/nw)),sy=Math.min(im.height-1,Math.floor(y*im.height/nh)),s=idx(sx,sy,im.width),i=idx(x,y,nw);od.set(d.slice(s,s+4),i)}return new ImageData(od,nw,nh)}
function flattenAlpha(im){const d=im.data;for(let i=0;i<d.length;i+=4)d[i+3]=d[i+3]>110?255:0;return im}
function makeSilhouette(im,str){const d=im.data,w=im.width,h=im.height,o=new Uint8ClampedArray(d.length),thr=16+(100-str)*.55;for(let y=0;y<h;y++)for(let x=0;x<w;x++){let i=idx(x,y,w);if(!d[i+3])continue;let edge=false,L=lum(d,i);for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){let xx=x+dx,yy=y+dy;if(xx<0||yy<0||xx>=w||yy>=h){edge=true;break}let j=idx(xx,yy,w);if(!d[j+3]||Math.abs(L-lum(d,j))>thr){edge=true;break}}o[i]=o[i+1]=o[i+2]=Math.max(18,Math.min(95,L*.35));o[i+3]=edge?255:0}return new ImageData(o,w,h)}
function regionSmooth(im,amt){const d=im.data,w=im.width,h=im.height,passes=Math.round(amt/28),o=new Uint8ClampedArray(d);let cur=o;for(let p=0;p<passes;p++){let next=new Uint8ClampedArray(cur);for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){let i=idx(x,y,w);if(!cur[i+3])continue;let rs=[],gs=[],bs=[];for(let yy=-1;yy<=1;yy++)for(let xx=-1;xx<=1;xx++){let j=idx(x+xx,y+yy,w);if(cur[j+3]){rs.push(cur[j]);gs.push(cur[j+1]);bs.push(cur[j+2])}}rs.sort((a,b)=>a-b);gs.sort((a,b)=>a-b);bs.sort((a,b)=>a-b);next[i]=rs[rs.length>>1];next[i+1]=gs[gs.length>>1];next[i+2]=bs[bs.length>>1]}cur=next}return new ImageData(cur,w,h)}
function shadeCompress(im,steps){const d=im.data;for(let i=0;i<d.length;i+=4){if(!d[i+3])continue;let L=lum(d,i),q=Math.round(L/255*(steps-1))/(steps-1)*255,f=L? q/L:1;d[i]=Math.min(255,d[i]*f);d[i+1]=Math.min(255,d[i+1]*f);d[i+2]=Math.min(255,d[i+2]*f)}return im}
function quantize(im,count,sat){const d=im.data,p=[];for(let i=0;i<d.length;i+=4)if(d[i+3])p.push([d[i],d[i+1],d[i+2]]);if(!p.length)return im;let boxes=[p];while(boxes.length<count){let bi=-1,range=-1,ch=0;for(let b=0;b<boxes.length;b++){if(boxes[b].length<2)continue;for(let k=0;k<3;k++){let vals=boxes[b].map(c=>c[k]),r=Math.max(...vals)-Math.min(...vals);if(r>range){range=r;bi=b;ch=k}}}if(bi<0)break;let box=boxes.splice(bi,1)[0].sort((a,b)=>a[ch]-b[ch]),m=box.length>>1;boxes.push(box.slice(0,m),box.slice(m))}let pal=boxes.map(b=>[0,1,2].map(k=>Math.round(b.reduce((s,c)=>s+c[k],0)/b.length)));let out=new Uint8ClampedArray(d.length),s=sat/100;for(let i=0;i<d.length;i+=4){if(!d[i+3])continue;let best=pal[0],bd=1e12;for(const c of pal){let dr=d[i]-c[0],dg=d[i+1]-c[1],db=d[i+2]-c[2],dd=dr*dr+dg*dg+db*db;if(dd<bd){bd=dd;best=c}}let g=.2126*best[0]+.7152*best[1]+.0722*best[2];out[i]=g+(best[0]-g)*s;out[i+1]=g+(best[1]-g)*s;out[i+2]=g+(best[2]-g)*s;out[i+3]=255}return new ImageData(out,im.width,im.height)}
function detailLayer(im,amt){const d=im.data,w=im.width,h=im.height,o=new Uint8ClampedArray(d.length),g=amt/100;for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){let i=idx(x,y,w);if(!d[i+3])continue;for(let k=0;k<3;k++){let avg=0,n=0;for(let yy=-1;yy<=1;yy++)for(let xx=-1;xx<=1;xx++){let j=idx(x+xx,y+yy,w);if(d[j+3]){avg+=d[j+k];n++}}let delta=(d[i+k]-avg/n)*g;o[i+k]=128+delta*2}o[i+3]=Math.min(180,Math.abs(lum(o,i)-128)*4)}return new ImageData(o,w,h)}
function merge(flat,sil,det,outlineMode,edgeAmt){let f=flat.data,s=sil.data,d=det.data,o=new Uint8ClampedArray(f.length);for(let i=0;i<f.length;i+=4){if(!f[i+3])continue;let e=s[i+3]/255*(edgeAmt/100),dd=d[i+3]/255;for(let k=0;k<3;k++){let v=f[i+k]+(d[i+k]-128)*dd*.28;if(e>0&&outlineMode!=='none'){let c=outlineMode==='brown'?[54,31,26][k]:s[i+k];v=v*(1-e*.9)+c*(e*.9)}o[i+k]=Math.max(0,Math.min(255,v))}o[i+3]=255}return new ImageData(o,flat.width,flat.height)}
function cleanup(im,level){let d=new Uint8ClampedArray(im.data),w=im.width,h=im.height;for(let p=0;p<level;p++){let n=new Uint8ClampedArray(d);for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){let i=idx(x,y,w);if(!d[i+3])continue;let near=[];for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){let j=idx(x+dx,y+dy,w);if(d[j+3])near.push(j)}if(near.length<2){n[i+3]=0;continue}let same=near.filter(j=>Math.abs(d[j]-d[i])+Math.abs(d[j+1]-d[i+1])+Math.abs(d[j+2]-d[i+2])<45);if(!same.length){let j=near[0];n[i]=d[j];n[i+1]=d[j+1];n[i+2]=d[j+2]}}d=n}return new ImageData(d,w,h)}
function contourRhythm(im,amt){if(amt<10)return im;const d=new Uint8ClampedArray(im.data),w=im.width,h=im.height,o=new Uint8ClampedArray(d);for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){let i=idx(x,y,w);if(!d[i+3])continue;let a=d[idx(x-1,y,w)+3],b=d[idx(x+1,y,w)+3],c=d[idx(x,y-1,w)+3],e=d[idx(x,y+1,w)+3];if((!a&&!c&&b&&e)||(!b&&!c&&a&&e)||(!a&&!e&&b&&c)||(!b&&!e&&a&&c)){if(((x+y)%3)===0&&amt>55)o[i+3]=0}}return new ImageData(o,w,h)}
function show(){const im=results[view];if(!im)return;octx.putImageData(im,0,0);$('outLabel').textContent={final:'完成',silhouette:'輪郭',flat:'色面',detail:'Detail'}[view]}
function savePNG(){if(!results.final){status('先に変換してください。','warn');return}const c=document.createElement('canvas');c.width=results.final.width;c.height=results.final.height;c.getContext('2d').putImageData(results.final,0,0);const a=document.createElement('a');a.download=`sprite_true_pixel_${c.width}.png`;a.href=c.toDataURL('image/png');a.click()}
function preset(n){const p={body:{designRes:64,colors:16,edge:90,simplify:78,sat:68,shade:4,cleanup:2,rhythm:70,detailAmt:22,outline:'brown'},character:{designRes:80,colors:32,edge:80,simplify:55,sat:92,shade:5,cleanup:1,rhythm:48,detailAmt:46,outline:'source'},hard:{designRes:48,colors:12,edge:95,simplify:88,sat:74,shade:3,cleanup:3,rhythm:82,detailAmt:12,outline:'brown'}}[n];for(const[k,v]of Object.entries(p)){const e=$(k);e.value=v;e.dispatchEvent(new Event('input'))}if(img)process()}
</script>
</body></html>

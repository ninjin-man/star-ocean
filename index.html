<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Non-AI Character Analyzer v0.2</title><style>
:root{--bg:#0e121a;--panel:#151b27;--line:#2b3446;--ink:#edf3ff;--mut:#9aa8bd;--ok:#73e69a}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif}header{padding:14px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#0e121af0;z-index:3}h1{font-size:21px;margin:0 0 5px}.sub{color:var(--mut);font-size:13px;line-height:1.5}main{padding:12px;max-width:1120px;margin:auto}.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:12px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.btn{border:1px solid var(--line);border-radius:11px;background:#202838;color:var(--ink);font-weight:700;padding:10px 12px;min-height:42px}.btn.primary{background:#113853;border-color:#24658e}.btn.good{background:#15381f;border-color:#2f7e45}.btn:disabled{opacity:.45}input[type=file]{display:none}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}@media(min-width:920px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}.panel{background:#0b0f17;border:1px solid var(--line);border-radius:14px;padding:9px}.panel h2{font-size:15px;margin:0 0 8px}.wrap{background:#fff;border-radius:10px;overflow:hidden;min-height:170px;display:flex;align-items:center;justify-content:center}canvas{max-width:100%;height:auto;display:block}.control{display:grid;grid-template-columns:110px 1fr 42px;gap:8px;align-items:center;color:var(--mut);font-size:13px;margin:6px 0}.control input{width:100%}.log{font:12px ui-monospace,Menlo,Consolas,monospace;white-space:pre-wrap;line-height:1.45;color:#dbe6ff;background:#0b0f17;border:1px solid var(--line);border-radius:12px;padding:10px;max-height:360px;overflow:auto}.note{color:var(--mut);font-size:13px;line-height:1.5}.progress{color:var(--ok);font-weight:700}
</style></head><body><header><h1>Non-AI Character Analyzer v0.2</h1><div class="sub">AIなし・外部APIなし。Canvasだけで、前景、簡易スケルトン、頭胴脚、色クラスタ、Region ID、候補分類を表示します。</div></header><main>
<section class="card"><div class="row"><label class="btn primary">画像を選ぶ<input id="file" type="file" accept="image/*"></label><button id="sample" class="btn">サンプル読込</button><button id="run" class="btn good" disabled>解析実行</button><button id="save" class="btn" disabled>まとめPNG保存</button><span id="status" class="progress">待機中</span></div></section>
<section class="card"><div class="control"><span>背景差分</span><input id="thr" type="range" min="8" max="85" value="24"><b id="thrV">24</b></div><div class="control"><span>最小Region</span><input id="minA" type="range" min="20" max="900" value="90"><b id="minAV">90</b></div><div class="control"><span>色数</span><input id="k" type="range" min="4" max="10" value="7"><b id="kV">7</b></div><div class="note">iPhone対策として内部解析サイズを最大420px幅に制限しています。重いスケルトン細線化ではなく、縦横走査の簡易骨格を使います。</div></section>
<section class="grid"><div class="panel"><h2>0. 元画像</h2><div class="wrap"><canvas id="orig"></canvas></div></div><div class="panel"><h2>1. 前景シルエット</h2><div class="wrap"><canvas id="mask"></canvas></div></div><div class="panel"><h2>2. 簡易スケルトン</h2><div class="wrap"><canvas id="skel"></canvas></div></div><div class="panel"><h2>3. 頭・胴・脚</h2><div class="wrap"><canvas id="zones"></canvas></div></div><div class="panel"><h2>4. 色クラスタ</h2><div class="wrap"><canvas id="cluster"></canvas></div></div><div class="panel"><h2>5. Region ID</h2><div class="wrap"><canvas id="regions"></canvas></div></div><div class="panel"><h2>6. 候補分類</h2><div class="wrap"><canvas id="classed"></canvas></div></div><div class="panel"><h2>7. まとめ</h2><div class="wrap"><canvas id="summary"></canvas></div></div><div class="panel"><h2>8. ログ</h2><div id="log" class="log">画像を読み込んでください。</div></div></section>
</main><script>
const $=id=>document.getElementById(id); ['thr','minA','k'].forEach(id=>$(id).oninput=()=>$(id+'V').textContent=$(id).value);
const names=['orig','mask','skel','zones','cluster','regions','classed','summary']; const C=Object.fromEntries(names.map(n=>[n,$(n)])); let img=null, data=null, last=null;
$('file').onchange=e=>{const f=e.target.files[0]; if(f) load(URL.createObjectURL(f))}; $('sample').onclick=()=>load('sample.png'); $('run').onclick=()=>run(); $('save').onclick=()=>{let a=document.createElement('a');a.href=C.summary.toDataURL('image/png');a.download='non_ai_analysis_summary_v0_2.png';a.click()};
function setStatus(t){$('status').textContent=t} function log(t){$('log').textContent=t}
function load(src){let im=new Image(); im.onload=()=>{img=im; setup(); $('run').disabled=false; setStatus('読込完了'); log('画像読込完了。解析実行を押してください。')}; im.src=src}
function setup(){let maxW=420, s=Math.min(1,maxW/img.width,620/img.height), w=Math.round(img.width*s), h=Math.round(img.height*s); for(let c of Object.values(C)){c.width=w;c.height=h} let ctx=C.orig.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);data=ctx.getImageData(0,0,w,h)}
async function pause(){await new Promise(r=>setTimeout(r,25))}
async function run(){try{setup(); $('save').disabled=true; setStatus('解析中 1/6'); await pause(); const w=data.width,h=data.height,bg=bgColor(data); let m=maskFromBg(data,bg,+$('thr').value); m=cleanMask(m,w,h); let comp=largest(m,w,h); m=comp.mask; drawMask(m,comp.bbox); setStatus('解析中 2/6'); await pause(); let skeleton=simpleSkeleton(m,w,h,comp.bbox); drawSkeleton(m,skeleton); setStatus('解析中 3/6'); await pause(); let z=zonesOf(comp.bbox); drawZones(z); setStatus('解析中 4/6'); await pause(); let km=kmeans(data,m,w,h,+$('k').value); drawCluster(km,m,w,h); setStatus('解析中 5/6'); await pause(); let regs=regions(km.labels,m,w,h,+$('minA').value,km.centers,comp.bbox); classify(regs,comp.bbox,z); drawRegions(regs); drawClassed(regs); setStatus('解析中 6/6'); await pause(); makeSummary(regs,comp.bbox,z,km.centers); last={bbox:comp.bbox,zones:z,palette:km.centers,regions:regs}; $('save').disabled=false; setStatus('完了'); log(resultText(last));}catch(e){setStatus('エラー'); log('エラー: '+e.message+'\n'+e.stack)}}
function bgColor(imgd){const w=imgd.width,h=imgd.height,d=imgd.data,pts=[[1,1],[w-2,1],[1,h-2],[w-2,h-2],[w/2|0,1],[w/2|0,h-2]];let r=0,g=0,b=0;for(let [x,y] of pts){let i=(y*w+x)*4;r+=d[i];g+=d[i+1];b+=d[i+2]}return [r/pts.length|0,g/pts.length|0,b/pts.length|0]}
function cd(a,b){let dr=a[0]-b[0],dg=a[1]-b[1],db=a[2]-b[2];return Math.sqrt(dr*dr+dg*dg+db*db)}
function maskFromBg(imgd,bg,t){let d=imgd.data,m=new Uint8Array(imgd.width*imgd.height);for(let p=0,i=0;p<m.length;p++,i+=4){if(cd([d[i],d[i+1],d[i+2]],bg)>t&&d[i+3]>20)m[p]=1}return m}
function cleanMask(m,w,h){let out=new Uint8Array(m); for(let pass=0;pass<2;pass++){let n=new Uint8Array(out); for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){let c=0;for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++)c+=out[(y+dy)*w+x+dx]; n[y*w+x]=c>=4?1:0} out=n} return out}
function largest(m,w,h){let seen=new Uint8Array(w*h),best=[];for(let p=0;p<w*h;p++){if(!m[p]||seen[p])continue;let q=[p],arr=[],head=0;seen[p]=1;while(head<q.length){let idx=q[head++];arr.push(idx);let x=idx%w,y=idx/w|0;for(let nb of [idx-1,idx+1,idx-w,idx+w]){let nx=nb%w,ny=nb/w|0;if(nb>=0&&nb<w*h&&Math.abs(nx-x)+Math.abs(ny-y)==1&&m[nb]&&!seen[nb]){seen[nb]=1;q.push(nb)}}} if(arr.length>best.length)best=arr}let out=new Uint8Array(w*h),minX=w,minY=h,maxX=0,maxY=0;for(let idx of best){out[idx]=1;let x=idx%w,y=idx/w|0; if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y}return {mask:out,bbox:{x:minX,y:minY,w:maxX-minX+1,h:maxY-minY+1,area:best.length}}}
function simpleSkeleton(m,w,h,b){let pts=[]; for(let y=b.y;y<b.y+b.h;y+=6){let xs=[];for(let x=b.x;x<b.x+b.w;x++)if(m[y*w+x])xs.push(x); if(xs.length>4)pts.push({x:(xs[0]+xs[xs.length-1])/2,y})} let branches=[]; for(let x=b.x;x<b.x+b.w;x+=8){let ys=[];for(let y=b.y;y<b.y+b.h;y++)if(m[y*w+x])ys.push(y); if(ys.length>b.h*.18)branches.push({x,y1:ys[0],y2:ys[ys.length-1]})}return {mid:pts,branches}}
function zonesOf(b){return {head:{x:b.x,y:b.y,w:b.w,h:Math.round(b.h*.23)},torso:{x:b.x,y:b.y+Math.round(b.h*.18),w:b.w,h:Math.round(b.h*.42)},legs:{x:b.x,y:b.y+Math.round(b.h*.55),w:b.w,h:Math.round(b.h*.45)}}}
function kmeans(imgd,m,w,h,K){let d=imgd.data,pix=[],pos=[];for(let p=0;p<w*h;p+=2)if(m[p]){let i=p*4;pix.push([d[i],d[i+1],d[i+2]]);pos.push(p)} let centers=[];for(let k=0;k<K;k++)centers.push(pix[Math.floor((pix.length-1)*k/(K-1||1))].slice());let assign=new Int16Array(pix.length);for(let it=0;it<8;it++){let sums=Array.from({length:K},()=>[0,0,0,0]);for(let i=0;i<pix.length;i++){let bi=0,bd=1e9;for(let k=0;k<K;k++){let dd=cd(pix[i],centers[k]);if(dd<bd){bd=dd;bi=k}}assign[i]=bi;let s=sums[bi],p=pix[i];s[0]+=p[0];s[1]+=p[1];s[2]+=p[2];s[3]++}for(let k=0;k<K;k++)if(sums[k][3])centers[k]=[sums[k][0]/sums[k][3]|0,sums[k][1]/sums[k][3]|0,sums[k][2]/sums[k][3]|0]}let labels=new Int16Array(w*h).fill(-1);for(let i=0;i<pos.length;i++)labels[pos[i]]=assign[i];return {centers,labels}}
function regions(labels,m,w,h,minA,centers,b){let seen=new Uint8Array(w*h),regs=[],id=1;for(let p=0;p<w*h;p++){let lab=labels[p];if(!m[p]||lab<0||seen[p])continue;let q=[p],arr=[],head=0,minX=w,minY=h,maxX=0,maxY=0,sx=0,sy=0;seen[p]=1;while(head<q.length){let idx=q[head++],x=idx%w,y=idx/w|0;arr.push(idx);sx+=x;sy+=y;if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;for(let nb of [idx-1,idx+1,idx-w,idx+w]){let nx=nb%w,ny=nb/w|0;if(nb>=0&&nb<w*h&&Math.abs(nx-x)+Math.abs(ny-y)==1&&labels[nb]===lab&&!seen[nb]){seen[nb]=1;q.push(nb)}}} if(arr.length>=minA)regs.push({id:id++,lab,color:centers[lab],area:arr.length,bbox:{x:minX,y:minY,w:maxX-minX+1,h:maxY-minY+1},cx:sx/arr.length,cy:sy/arr.length,primary:'未分類候補'})}regs.sort((a,b)=>b.area-a.area);regs.forEach((r,i)=>r.id=i+1);return regs.slice(0,60)}
function classify(regs,b,z){let mid=b.x+b.w/2;for(let r of regs){let [R,G,B]=r.color,light=(R+G+B)/3,sat=(Math.max(R,G,B)-Math.min(R,G,B))/(Math.max(R,G,B)||1),inHead=r.cy<z.head.y+z.head.h*1.25,inTorso=r.cy>z.torso.y&&r.cy<z.torso.y+z.torso.h,inLeg=r.cy>z.legs.y,side=Math.abs(r.cx-mid)/(b.w/2);let skin=R>G&&G>B&&R>145&&G>85,green=G>=R&&G>=B&&G>45&&B<130,pale=G>=R&&G>=B&&light>125,hair=(sat<.28&&r.cy<b.y+b.h*.45)||(sat<.36&&r.bbox.h>b.h*.22&&r.cy<b.y+b.h*.55),gold=R>125&&G>90&&B<105&&sat>.25; if(gold)r.primary='装飾候補'; else if(skin&&inHead)r.primary=side>.42?'耳候補':'顔候補'; else if(skin)r.primary='肌/腕候補'; else if(hair)r.primary='髪候補'; else if(green&&inLeg)r.primary='脚服候補'; else if(green&&inTorso)r.primary='胴服候補'; else if(pale&&side>.25)r.primary='袖/布候補'; else if(r.cy>b.y+b.h*.82)r.primary='靴候補';}}
function ctx(id){let x=C[id].getContext('2d');x.clearRect(0,0,C[id].width,C[id].height);return x}function drawMask(m,b){let c=C.mask,ct=ctx('mask'),im=ct.createImageData(c.width,c.height);for(let p=0;p<m.length;p++){let i=p*4,v=m[p]?0:255;im.data[i]=im.data[i+1]=im.data[i+2]=v;im.data[i+3]=255}ct.putImageData(im,0,0);box(ct,b,'red','foreground')}
function drawSkeleton(m,s){let ct=ctx('skel'),w=C.skel.width,h=C.skel.height;ct.fillStyle='#05070b';ct.fillRect(0,0,w,h);ct.strokeStyle='#78ffe6';ct.lineWidth=1;for(let p=0;p<m.length;p++){if(!m[p])continue;let x=p%w,y=p/w|0;if(!m[p-1]||!m[p+1]||!m[p-w]||!m[p+w])ct.fillRect(x,y,1,1)}ct.strokeStyle='#f8d22a';ct.lineWidth=2;ct.beginPath();s.mid.forEach((p,i)=>i?ct.lineTo(p.x,p.y):ct.moveTo(p.x,p.y));ct.stroke();ct.fillStyle='#ff355e';s.mid.forEach((p,i)=>{if(i%5==0){ct.beginPath();ct.arc(p.x,p.y,3,0,7);ct.fill()}})}
function drawZones(z){let ct=ctx('zones');ct.drawImage(C.orig,0,0);box(ct,z.head,'#ff4d6d','HEAD');box(ct,z.torso,'#ffd166','TORSO');box(ct,z.legs,'#4dabf7','LEGS')}
function drawCluster(km,m,w,h){let ct=ctx('cluster'),im=ct.createImageData(w,h);for(let p=0;p<m.length;p++){let i=p*4;if(m[p]&&km.labels[p]>=0){let c=km.centers[km.labels[p]];im.data[i]=c[0];im.data[i+1]=c[1];im.data[i+2]=c[2]}else{im.data[i]=im.data[i+1]=im.data[i+2]=245}im.data[i+3]=255}ct.putImageData(im,0,0)}
const cols=['#ff4db8','#ff9f80','#38d27d','#76e0c1','#ffd166','#ff7f50','#9aa4b2','#4dabf7'];function clsColor(s){if(s.includes('髪'))return cols[0];if(s.includes('顔')||s.includes('耳')||s.includes('肌'))return cols[1];if(s.includes('胴')||s.includes('脚'))return cols[2];if(s.includes('袖'))return cols[3];if(s.includes('装飾'))return cols[4];if(s.includes('靴'))return cols[5];return cols[6]}
function drawRegions(regs){let ct=ctx('regions');ct.drawImage(C.orig,0,0);ct.font='bold 13px sans-serif';ct.textAlign='center';ct.textBaseline='middle';for(let r of regs.slice(0,35)){box(ct,r.bbox,cols[r.id%cols.length]);ct.fillStyle='rgba(0,0,0,.68)';ct.beginPath();ct.arc(r.cx,r.cy,10,0,7);ct.fill();ct.fillStyle='#fff';ct.fillText(String(r.id).padStart(2,'0'),r.cx,r.cy)}}
function drawClassed(regs){let ct=ctx('classed');ct.drawImage(C.orig,0,0);ct.font='bold 11px sans-serif';for(let r of regs.slice(0,35)){let c=clsColor(r.primary);box(ct,r.bbox,c);ct.fillStyle=c;ct.fillRect(r.bbox.x,r.bbox.y,68,14);ct.fillStyle='#081018';ct.fillText(r.primary.replace('候補',''),r.bbox.x+3,r.bbox.y+11)}}
function makeSummary(regs,b,z,pal){let c=C.summary;c.width=900;c.height=1180;let ct=ctx('summary');ct.fillStyle='#f7f9fc';ct.fillRect(0,0,c.width,c.height);ct.fillStyle='#10151f';ct.font='bold 24px sans-serif';ct.fillText('Non-AI解析まとめ v0.2',24,34);let arr=[['元画像',C.orig],['シルエット',C.mask],['簡易スケルトン',C.skel],['頭胴脚',C.zones],['色クラスタ',C.cluster],['Region ID',C.regions],['候補分類',C.classed]];let x=24,y=58;for(let i=0;i<arr.length;i++){let w=260,h=330;if(i==3){x=24;y=420}panel(ct,x,y,w,h,arr[i][0]);fit(ct,arr[i][1],x+10,y+36,w-20,h-46);x+=276}panel(ct,24,780,852,360,'Region一覧');ct.font='13px monospace';let yy=820;for(let r of regs.slice(0,20)){ct.fillStyle=clsColor(r.primary);ct.fillRect(45,yy-10,10,10);ct.fillStyle='#111';ct.fillText(`${String(r.id).padStart(2,'0')} ${r.primary} area=${r.area} bbox=${r.bbox.w}x${r.bbox.h} center=(${Math.round(r.cx)},${Math.round(r.cy)}) color=${hex(r.color)}`,62,yy);yy+=16}}
function panel(ct,x,y,w,h,t){ct.fillStyle='#fff';ct.strokeStyle='#cbd5e1';ct.lineWidth=1;ct.beginPath();ct.roundRect(x,y,w,h,10);ct.fill();ct.stroke();ct.fillStyle='#111827';ct.font='bold 16px sans-serif';ct.fillText(t,x+12,y+24)}function fit(ct,c,x,y,w,h){let s=Math.min(w/c.width,h/c.height);ct.drawImage(c,x+(w-c.width*s)/2,y+(h-c.height*s)/2,c.width*s,c.height*s)}function box(ct,b,color,label){ct.save();ct.strokeStyle=color;ct.lineWidth=2;ct.strokeRect(b.x,b.y,b.w,b.h);if(label){ct.fillStyle=color;ct.font='bold 12px sans-serif';ct.fillText(label,b.x+4,b.y+13)}ct.restore()}function hex(c){return '#'+c.map(v=>Math.round(v).toString(16).padStart(2,'0')).join('').toUpperCase()}function resultText(d){return `前景bbox: x=${d.bbox.x}, y=${d.bbox.y}, w=${d.bbox.w}, h=${d.bbox.h}\n色: ${d.palette.map(hex).join(', ')}\nRegion数: ${d.regions.length}\n\n上位Region\n`+d.regions.slice(0,20).map(r=>`${String(r.id).padStart(2,'0')} ${r.primary} area=${r.area} bbox=${r.bbox.w}x${r.bbox.h} center=(${Math.round(r.cx)},${Math.round(r.cy)}) ${hex(r.color)}`).join('\n')}
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r)}}
</script></body></html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SFC Star Ocean Combat Engine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: #111; color: #fff;
      font-family: 'Courier New', Courier, monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin: 0; padding: 5px; min-height: 100vh;
      user-select: none; -webkit-user-select: none;
    }

    /* ゲームコンテナ */
    #game-container { position: relative; width: 100%; max-width: 800px;
                      box-shadow: 0 0 24px rgba(0,0,0,0.9); }

    canvas {
      background: linear-gradient(to bottom, #1a2a3a 0%, #0d1520 70%, #223344 100%);
      border: 4px solid #334466; display: block; width: 100%; height: auto;
    }

    /* ログ表示 */
    #log {
      position: absolute; top: 10px; left: 10px;
      font-size: 11px; color: #88aaee; pointer-events: none;
      background: rgba(0,0,0,0.55); padding: 2px 6px;
    }

    /* ローディング表示 */
    #loadingMsg {
      position: absolute; inset: 0;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,10,0.8); font-size: 18px; color: #88aaee;
    }

    /* ─── SFCコントローラー風 UI ─── */
    .sfc-pad {
      width: 100%; background: #cbd3d6;
      border: 4px solid #334466; border-top: none;
      border-radius: 0 0 16px 16px;
      padding: 12px; display: flex; flex-direction: column; gap: 8px;
      box-shadow: inset 0 5px 10px rgba(0,0,0,0.25);
    }

    /* ステータス表示 */
    .status-box {
      font-size: 13px; color: #111; font-weight: bold;
      background: #aab4b8; border: 2px inset #fff;
      padding: 6px; text-align: center; border-radius: 5px;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.45);
    }

    /* 説明テキスト */
    .legend {
      font-size: 10px; color: #333; text-align: center; line-height: 1.5;
    }

    /* Lショルダー / Rショルダー */
    .shoulder-row { display: flex; gap: 8px; }
    .shoulder-btn {
      flex: 1; background: linear-gradient(to bottom, #5a6878, #34404c);
      color: #fff; border: 2px solid #222a33; border-radius: 8px;
      padding: 8px 4px; font-size: 11px; font-weight: bold;
      box-shadow: 0 3px 0 #111; text-shadow: 1px 1px 1px #000;
      font-family: inherit; cursor: pointer;
    }
    .shoulder-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #111; }

    /* コア操作行 */
    .controller-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 8px;
    }

    /* 十字キー（左右のみ） */
    .d-pad { display: flex; gap: 6px; background: #9aa4a8; padding: 8px; border-radius: 50%; }
    .d-btn {
      background: #222; color: #fff; border: none;
      width: 52px; height: 46px; font-size: 18px; font-weight: bold;
      cursor: pointer; box-shadow: 0 4px 0 #000; border-radius: 5px;
      font-family: inherit;
    }
    .d-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; }

    /* システムボタン（RESET） */
    .sys-btn {
      background: #7a8488; color: #222; border: 2px solid #5a6468;
      border-radius: 10px; padding: 5px 12px; font-size: 10px;
      font-weight: bold; box-shadow: 0 2px 0 #444; font-family: inherit;
      cursor: pointer;
    }
    .sys-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #444; }

    /* SFC 4色アクションボタン（ひし形配置） */
    .action-pad { position: relative; width: 120px; height: 120px;
                  background: #9aa4a8; border-radius: 50%; flex-shrink: 0; }
    .sfc-btn {
      position: absolute; width: 38px; height: 38px; border-radius: 50%;
      border: none; font-weight: bold; font-size: 14px; color: #fff;
      cursor: pointer; text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
      box-shadow: 0 4px 0 rgba(0,0,0,0.4); font-family: inherit;
    }
    .sfc-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }
    /* 青=X (ミリー キュアオール), 緑=Y (アシッドレイン), 赤=A 攻撃, 黄=B 攻撃 */
    .btn-x { background: #3b5998; top: 5px;    left: 41px; }
    .btn-y { background: #00a86b; top: 41px;   left: 5px;  }
    .btn-a { background: #d62246; top: 41px;   right: 5px; }
    .btn-b { background: #f5b041; bottom: 5px; left: 41px; }
  </style>
</head>
<body>

<div id="game-container">
  <div id="log">LOADING...</div>
  <div id="loadingMsg">スプライト読込中...</div>

  <canvas id="battleCanvas" width="800" height="400"></canvas>

  <div class="sfc-pad">
    <div class="status-box" id="partyStatus">起動中...</div>
    <div class="legend">
      A/B: 攻撃(コンボ) ｜ L: 近距離奥義 ｜ R: 遠距離奥義 ｜ X: ミリー回復 ｜ Y: ミリー弱体魔法
    </div>

    <!-- L/R ショルダーボタン -->
    <div class="shoulder-row">
      <button class="shoulder-btn" onclick="triggerHissatsuShort()">L<br>近距離奥義</button>
      <button class="shoulder-btn" onclick="triggerHissatsuLong()">R<br>遠距離奥義</button>
    </div>

    <!-- メインコントローラー -->
    <div class="controller-row">
      <!-- 十字キー -->
      <div class="d-pad">
        <button class="d-btn"
          onmousedown="startManualMove(-4)" onmouseup="stopManualMove()" onmouseleave="stopManualMove()"
          ontouchstart="startManualMove(-4)" ontouchend="stopManualMove()">◀</button>
        <button class="d-btn"
          onmousedown="startManualMove(4)"  onmouseup="stopManualMove()" onmouseleave="stopManualMove()"
          ontouchstart="startManualMove(4)" ontouchend="stopManualMove()">▶</button>
      </div>

      <!-- RESET -->
      <button class="sys-btn" onclick="resetBattle()">RESET</button>

      <!-- SFC 4色ボタン -->
      <div class="action-pad">
        <button class="sfc-btn btn-x" onclick="castMillieCureAll()">X</button>
        <button class="sfc-btn btn-y" onclick="castMillieAcidRain()">Y</button>
        <button class="sfc-btn btn-a" onclick="triggerPlayerAttack()">A</button>
        <button class="sfc-btn btn-b" onclick="triggerPlayerAttack()">B</button>
      </div>
    </div>
  </div>
</div>

<!-- ロード順序が重要: config → effects → character → engine → game -->
<script src="config.js"></script>
<script src="effects.js"></script>
<script src="character.js"></script>
<script src="engine.js"></script>
<script src="game.js"></script>

</body>
</html>

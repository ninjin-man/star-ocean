<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Sprite Studio v1.30 Production Pixel Editor</title>
<style>
:root{--bg:#0b111a;--panel:#111a25;--panel2:#172230;--line:#304052;--text:#e9eef5;--muted:#91a0b2;--accent:#2f8cff;--ok:#22c55e;--gold:#d8a62e;--danger:#ef4444}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#091018,#0c1420);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}button,input,select{font:inherit}button{border:1px solid var(--line);background:#1b2838;color:var(--text);border-radius:8px;padding:9px 11px;font-weight:700}button.active,button.primary{background:#145fae;border-color:#4da3ff}button.good{background:#176c39;border-color:#34d26c}button.danger{background:#61252c;border-color:#e45865}button:disabled{opacity:.42}.app{padding:10px;max-width:1800px;margin:auto}.topbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}.title{font-size:18px;font-weight:900;margin-right:auto}.version{font-size:12px;color:var(--gold)}.layout{display:grid;grid-template-columns:330px minmax(480px,1fr) 350px;gap:10px}.panel{background:rgba(17,26,37,.98);border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:0 4px 18px #0005}.panel h2{font-size:14px;margin:0;padding:10px 12px;background:#162231;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}.body{padding:10px}.stack{display:flex;flex-direction:column;gap:10px}.row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}.row>*{min-width:0}.grow{flex:1}.mini{font-size:11px;color:var(--muted)}.sourceBox{height:285px;background:#0a1018;border:1px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden}.sourceBox img{max-width:100%;max-height:100%;object-fit:contain}.thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.thumb{background:#0a1018;border:1px solid var(--line);border-radius:7px;padding:5px;text-align:center}.thumb canvas{width:100%;image-rendering:pixelated;aspect-ratio:1;background-image:linear-gradient(45deg,#182433 25%,transparent 25%),linear-gradient(-45deg,#182433 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#182433 75%),linear-gradient(-45deg,transparent 75%,#182433 75%);background-size:12px 12px;background-position:0 0,0 6px,6px -6px,-6px 0}.workspace{display:grid;grid-template-columns:92px 1fr;gap:10px}.tools{display:flex;flex-direction:column;gap:6px}.tools button{padding:8px 5px;font-size:12px}.canvasWrap{background:#090f16;border:1px solid var(--line);border-radius:8px;overflow:auto;display:flex;align-items:flex-start;justify-content:center;min-height:540px;padding:24px;touch-action:none}.canvasStack{position:relative;width:512px;height:512px;flex:none;background-color:#111a25;background-image:linear-gradient(45deg,#1c2a3a 25%,transparent 25%),linear-gradient(-45deg,#1c2a3a 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#1c2a3a 75%),linear-gradient(-45deg,transparent 75%,#1c2a3a 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0;box-shadow:0 0 0 1px #40536a}.canvasStack canvas{position:absolute;left:0;top:0;width:512px;height:512px;image-rendering:pixelated}.gridCanvas{pointer-events:none}.editorCanvas{touch-action:none}.palette{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}.swatch{aspect-ratio:1;border-radius:5px;border:2px solid #52647a;padding:0}.swatch.active{outline:2px solid white;outline-offset:1px}.layers{display:flex;flex-direction:column;gap:5px;max-height:330px;overflow:auto}.layer{display:grid;grid-template-columns:35px 1fr 36px 36px;gap:5px;align-items:center;background:#0d1621;border:1px solid #263648;border-radius:7px;padding:5px}.layer.active{border-color:#4da3ff;background:#102238}.layer button{padding:5px}.layerName{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.outputGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.outputGrid canvas{width:100%;image-rendering:pixelated;background:#091018;border:1px solid var(--line);border-radius:7px}.frames{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.frames canvas{width:100%;image-rendering:pixelated;background:#091018;border:1px solid var(--line);border-radius:5px}.workflow{grid-column:1/-1}.steps{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.step{background:#0c1520;border:1px solid var(--line);border-radius:8px;padding:7px;text-align:center;font-size:11px}.step.done{border-color:#2f9c5b}.status{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;white-space:pre-wrap;max-height:140px;overflow:auto;background:#07101a;padding:8px;border-radius:7px;border:1px solid #243548}.hidden{display:none}.sep{height:1px;background:var(--line);margin:4px 0}.label{font-size:12px;color:#b8c4d1}.range{width:100%}
@media(max-width:1100px){.layout{grid-template-columns:1fr}.workspace{grid-template-columns:72px 1fr}.canvasWrap{min-height:420px}.canvasStack,.canvasStack canvas{width:448px;height:448px}.steps{grid-template-columns:repeat(4,1fr)}}
@media(max-width:600px){.app{padding:6px}.topbar button{flex:1}.sourceBox{height:220px}.workspace{grid-template-columns:1fr}.tools{display:grid;grid-template-columns:repeat(4,1fr)}.canvasWrap{padding:10px;min-height:340px;justify-content:flex-start}.canvasStack,.canvasStack canvas{width:384px;height:384px}.palette{grid-template-columns:repeat(8,1fr)}.steps{grid-template-columns:repeat(2,1fr)}.layout{gap:7px}.panel h2{position:sticky;top:0;z-index:2}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title">Sprite Studio <span class="version">v1.30 Production Editor</span></div>
    <button id="newProject">新規</button><button id="saveProject">プロジェクト保存</button><label><button id="loadProjectBtn">プロジェクト読込</button><input id="loadProject" class="hidden" type="file" accept="application/json"></label><button id="helpBtn">ヘルプ</button>
  </div>
  <div class="layout">
    <div class="stack">
      <section class="panel"><h2>1. 画像入力 <span id="sourceInfo" class="mini">未読込</span></h2><div class="body stack">
        <label><button class="primary" id="chooseImageBtn">画像を読み込む</button><input id="imageInput" class="hidden" type="file" accept="image/*"></label>
        <div class="sourceBox"><img id="sourceImage" alt="入力画像"></div>
        <div class="row"><button id="autoCut" class="good grow">背景と人物を解析</button><button id="resetCut">解析リセット</button></div>
        <div class="row"><label class="label grow">背景許容値 <input id="bgTolerance" class="range" type="range" min="8" max="90" value="42"></label><span id="bgToleranceValue" class="mini">42</span></div>
        <div class="thumbs"><div class="thumb"><canvas id="maskPreview" width="128" height="128"></canvas><div class="mini">マスク</div></div><div class="thumb"><canvas id="cutPreview" width="128" height="128"></canvas><div class="mini">切抜き</div></div><div class="thumb"><canvas id="palettePreview" width="128" height="128"></canvas><div class="mini">色解析</div></div></div>
      </div></section>
      <section class="panel"><h2>2. 自動初稿</h2><div class="body stack">
        <div class="row"><button id="buildDraft" class="primary grow">64×64初稿を作成</button></div>
        <div class="row"><label class="label">色数 <select id="colorCount"><option>16</option><option selected>24</option><option>32</option></select></label><label class="label">頭身 <select id="bodyRatio"><option>2.0</option><option selected>2.5</option><option>3.0</option></select></label></div>
        <div class="row"><label class="label grow">輪郭強度 <input id="outlineStrength" class="range" type="range" min="0" max="100" value="52"></label></div>
        <button id="applyElfTemplate">エルフ正面テンプレートを適用</button>
      </div></section>
      <section class="panel"><h2>3. 基本設定</h2><div class="body stack">
        <div class="row"><span class="label">表示倍率</span><button class="zoomBtn" data-zoom="6">6×</button><button class="zoomBtn active" data-zoom="8">8×</button><button class="zoomBtn" data-zoom="10">10×</button></div>
        <div class="row"><label class="label">ブラシ <select id="brushSize"><option value="1">1px</option><option value="2">2px</option><option value="3">3px</option><option value="4">4px</option></select></label><label class="label">グリッド <input id="gridToggle" type="checkbox" checked></label></div>
        <div id="palette" class="palette"></div>
        <div class="row"><input id="colorPicker" type="color" value="#f0d8ce"><button id="addColor">色追加</button><button id="extractPalette">再抽出</button></div>
      </div></section>
    </div>

    <section class="panel"><h2>4. ピクセルエディタ（64×64マスター）<span id="cursorInfo" class="mini">x: -, y: -</span></h2><div class="body workspace">
      <div class="tools">
        <button class="tool active" data-tool="pen">✎ ペン</button><button class="tool" data-tool="eraser">消しゴム</button><button class="tool" data-tool="fill">塗りつぶし</button><button class="tool" data-tool="picker">スポイト</button><button class="tool" data-tool="line">直線</button><button class="tool" data-tool="rect">矩形</button><button id="undo">元に戻す</button><button id="redo">やり直す</button><button id="mirror">左右反転</button><button id="clearLayer" class="danger">レイヤー消去</button>
      </div>
      <div class="canvasWrap" id="canvasWrap"><div class="canvasStack" id="canvasStack"><canvas id="compositeCanvas" width="64" height="64"></canvas><canvas id="editorCanvas" class="editorCanvas" width="64" height="64"></canvas><canvas id="gridCanvas" class="gridCanvas" width="64" height="64"></canvas></div></div>
    </div></section>

    <div class="stack">
      <section class="panel"><h2>5. 部位レイヤー <button id="addLayer">＋</button></h2><div class="body"><div id="layers" class="layers"></div></div></section>
      <section class="panel"><h2>6. 部位テンプレート</h2><div class="body stack">
        <div class="row"><button class="templateBtn" data-template="hairLong">長髪</button><button class="templateBtn" data-template="elfEars">長耳</button><button class="templateBtn" data-template="wideSleeves">大袖</button></div>
        <div class="row"><button class="templateBtn" data-template="torsoSlim">細身胴</button><button class="templateBtn" data-template="boots">ブーツ</button><button class="templateBtn" data-template="gold">金装飾</button></div>
        <div class="mini">テンプレートは選択レイヤーへ描画します。元画像の色はパレットから適用されます。</div>
      </div></section>
      <section class="panel"><h2>7. 出力・アニメ</h2><div class="body stack">
        <div class="outputGrid"><div><canvas id="out32" width="32" height="32"></canvas><div class="mini">32</div></div><div><canvas id="out64" width="64" height="64"></canvas><div class="mini">64</div></div><div><canvas id="out128" width="128" height="128"></canvas><div class="mini">128</div></div></div>
        <button id="refreshOutputs" class="primary">出力更新</button>
        <div class="frames" id="frames"></div>
        <div class="row"><button id="generateFrames">歩行4フレーム生成</button><button id="exportSheet">スプライトシート</button></div>
        <div class="row"><button id="export32">32 PNG</button><button id="export64">64 PNG</button><button id="export128">128 PNG</button></div>
      </div></section>
      <section class="panel"><h2>状態</h2><div class="body"><div id="status" class="status">準備完了</div></div></section>
    </div>

    <section class="panel workflow"><h2>制作ワークフロー</h2><div class="body"><div class="steps"><div class="step" data-step="input">1 画像入力</div><div class="step" data-step="cut">2 背景解析</div><div class="step" data-step="draft">3 初稿</div><div class="step" data-step="parts">4 部位調整</div><div class="step" data-step="pixel">5 ドット編集</div><div class="step" data-step="animation">6 アニメ</div><div class="step" data-step="export">7 出力</div></div></div></section>
  </div>
</div>
<script src="js/sprite_studio_v1300.js"></script>
</body></html>

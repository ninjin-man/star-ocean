<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sprite Studio - Body Gold Master MVP</title>
<style>
:root{color-scheme:dark;--bg:#101216;--panel:#191d24;--line:#303744;--text:#f2f4f8;--muted:#aab2c0;--ok:#7bd88f;--warn:#ffd166;--bad:#ff7b7b;--accent:#8ab4ff}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
header{position:sticky;top:0;z-index:4;padding:14px 16px;background:rgba(16,18,22,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}
h1{font-size:18px;margin:0}header p{font-size:12px;color:var(--muted);margin:5px 0 0}.wrap{max-width:860px;margin:auto;padding:14px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}.panel h2{font-size:15px;margin:0 0 10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:680px){.grid{grid-template-columns:1fr}}
.drop{display:block;border:1px dashed #596273;border-radius:12px;padding:16px;text-align:center;background:#13171d;cursor:pointer}.drop input{display:none}.drop strong{display:block}.drop span{display:block;font-size:12px;color:var(--muted);margin-top:5px}
.controls{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.control{padding:10px;background:#13171d;border-radius:10px}.control label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:7px}.control input[type=range]{width:100%}.control select{width:100%;padding:8px;background:#0f1217;color:var(--text);border:1px solid var(--line);border-radius:8px}
button{width:100%;border:0;border-radius:10px;padding:12px 14px;font-size:15px;font-weight:700;background:var(--accent);color:#081225;margin-top:10px}button.secondary{background:#262d38;color:var(--text);border:1px solid var(--line)}button:disabled{opacity:.45}
.canvasBox{background:#0b0d11;border-radius:10px;overflow:hidden;display:grid;place-items:center;min-height:250px;background-image:linear-gradient(45deg,#171a20 25%,transparent 25%),linear-gradient(-45deg,#171a20 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#171a20 75%),linear-gradient(-45deg,transparent 75%,#171a20 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0}
canvas{max-width:100%;height:auto;image-rendering:pixelated}.caption{text-align:center;color:var(--muted);font-size:12px;margin-top:7px}.status{display:flex;gap:8px;align-items:center;padding:10px;border-radius:10px;background:#12161c}.dot{width:10px;height:10px;border-radius:50%;background:var(--warn)}.status.ok .dot{background:var(--ok)}.status.bad .dot{background:var(--bad)}.status div:last-child{font-size:13px}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.metric{background:#12161c;border-radius:9px;padding:9px}.metric b{display:block;font-size:16px}.metric span{font-size:11px;color:var(--muted)}.log{white-space:pre-wrap;font:12px ui-monospace,SFMono-Regular,Menlo,monospace;background:#0d1015;border-radius:10px;padding:10px;max-height:220px;overflow:auto;color:#cbd2dd}
.small{font-size:12px;color:var(--muted);line-height:1.6}.badge{display:inline-block;padding:3px 7px;border-radius:999px;background:#28303b;color:#cfd7e4;font-size:11px;margin:2px}
</style>
</head>
<body>
<header><h1>Sprite Studio — Body Gold Master MVP</h1><p>AI非搭載・ローカル完結。AI生成素体を128×128の実ドット絵へ決定論的に変換します。</p></header>
<main class="wrap">
<section class="panel">
<h2>1. AI出力を読み込む</h2>
<label class="drop"><input id="bodyInput" type="file" accept="image/png,image/webp,image/jpeg"><strong>素体画像を選択</strong><span>必須：PNG / WebP / JPEG。透過PNG推奨。</span></label>
<div style="height:8px"></div>
<label class="drop"><input id="metaInput" type="file" accept="application/json,.json"><strong>AIメタデータを追加</strong><span>任意：anchors / palette / canvas / silhouette情報を含むJSON。</span></label>
<p class="small">Sprite Studio内部ではAI解析を行いません。画像と明示的メタデータだけを読み込み、同じ入力・同じ設定なら必ず同じ結果を返します。</p>
</section>

<section class="panel">
<h2>2. 変換設定</h2>
<div class="controls">
<div class="control"><label><span>透過しきい値</span><output id="alphaOut">24</output></label><input id="alphaThreshold" type="range" min="0" max="160" value="24"></div>
<div class="control"><label><span>色統合強度</span><output id="mergeOut">18</output></label><input id="mergeThreshold" type="range" min="0" max="48" value="18"></div>
<div class="control"><label><span>孤立点除去</span><output id="islandOut">1</output></label><input id="islandPasses" type="range" min="0" max="3" value="1"></div>
<div class="control"><label><span>輪郭整理</span><output id="contourOut">1</output></label><input id="contourPasses" type="range" min="0" max="3" value="1"></div>
<div class="control"><label><span>最大色数</span><output id="colorsOut">48</output></label><input id="maxColors" type="range" min="8" max="64" value="48"></div>
<div class="control"><label><span>縮小方式</span></label><select id="sampling"><option value="nearest">Nearest（推奨）</option><option value="majority">領域代表色</option></select></div>
</div>
<button id="runBtn" disabled>素体をGold Master化</button>
</section>

<section class="panel"><h2>3. 入力品質</h2><div id="qualityStatus" class="status"><span class="dot"></span><div>画像を選択してください。</div></div><div id="metrics" class="metrics" style="margin-top:10px"></div></section>

<section class="grid">
<div class="panel"><h2>入力</h2><div class="canvasBox"><canvas id="sourceCanvas" width="128" height="128"></canvas></div><div class="caption" id="sourceCaption">未読込</div></div>
<div class="panel"><h2>Gold Master候補</h2><div class="canvasBox"><canvas id="outputCanvas" width="128" height="128"></canvas></div><div class="caption" id="outputCaption">128×128 / 未生成</div></div>
</section>

<section class="panel"><h2>4. 検査結果</h2><div id="badges"></div><div id="log" class="log">未実行</div><button id="pngBtn" class="secondary" disabled>Gold Master PNGを書き出す</button><button id="reportBtn" class="secondary" disabled>検査レポートJSONを書き出す</button></section>
</main>
<script>
'use strict';
const $=id=>document.getElementById(id);
const state={image:null,meta:null,report:null};
const src=$('sourceCanvas'),out=$('outputCanvas'),sctx=src.getContext('2d',{willReadFrequently:true}),octx=out.getContext('2d',{willReadFrequently:true});
sctx.imageSmoothingEnabled=false;octx.imageSmoothingEnabled=false;
for(const [id,outId] of [['alphaThreshold','alphaOut'],['mergeThreshold','mergeOut'],['islandPasses','islandOut'],['contourPasses','contourOut'],['maxColors','colorsOut']]) $(id).addEventListener('input',e=>$(outId).textContent=e.target.value);

function readImage(file){return new Promise((resolve,reject)=>{const u=URL.createObjectURL(file),im=new Image();im.onload=()=>{URL.revokeObjectURL(u);resolve(im)};im.onerror=()=>{URL.revokeObjectURL(u);reject(new Error('画像を読み込めません'))};im.src=u})}
$('bodyInput').addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;try{state.image=await readImage(f);drawContain(state.image,sctx,128,128);$('sourceCaption').textContent=`${state.image.naturalWidth}×${state.image.naturalHeight} / ${f.name}`;state.report=inspectInput(state.image);renderQuality(state.report);$('runBtn').disabled=false}catch(err){alert(err.message)}});
$('metaInput').addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;try{state.meta=JSON.parse(await f.text());renderBadges(['metadata loaded'])}catch{state.meta=null;alert('JSON形式が正しくありません')}});

function drawContain(im,ctx,w,h){ctx.clearRect(0,0,w,h);const scale=Math.min(w/im.naturalWidth,h/im.naturalHeight),dw=Math.max(1,Math.round(im.naturalWidth*scale)),dh=Math.max(1,Math.round(im.naturalHeight*scale)),dx=Math.floor((w-dw)/2),dy=Math.floor((h-dh)/2);ctx.imageSmoothingEnabled=false;ctx.drawImage(im,dx,dy,dw,dh)}
function inspectInput(im){const c=document.createElement('canvas');c.width=im.naturalWidth;c.height=im.naturalHeight;const x=c.getContext('2d',{willReadFrequently:true});x.drawImage(im,0,0);const d=x.getImageData(0,0,c.width,c.height).data;let visible=0,semi=0,minX=c.width,minY=c.height,maxX=-1,maxY=-1;const colors=new Set();for(let y=0;y<c.height;y++)for(let xx=0;xx<c.width;xx++){const i=(y*c.width+xx)*4,a=d[i+3];if(a>8){visible++;if(a<247)semi++;minX=Math.min(minX,xx);maxX=Math.max(maxX,xx);minY=Math.min(minY,y);maxY=Math.max(maxY,y);if(colors.size<20000)colors.add(`${d[i]>>3},${d[i+1]>>3},${d[i+2]>>3}`)}}const total=c.width*c.height,bw=maxX>=0?maxX-minX+1:0,bh=maxY>=0?maxY-minY+1:0,occ=visible/total,centerX=maxX>=0?(minX+maxX+1)/2/c.width:.5,centerY=maxY>=0?(minY+maxY+1)/2/c.height:.5;let grade='ok',notes=[];if(!visible){grade='bad';notes.push('前景がありません')}if(occ<.12||occ>.92){grade='bad';notes.push('キャラクター占有率が規格外')}if(Math.abs(centerX-.5)>.13){grade=grade==='bad'?'bad':'warn';notes.push('左右中心がずれています')}if(Math.abs(centerY-.5)>.15){grade=grade==='bad'?'bad':'warn';notes.push('上下中心がずれています')}if(semi/Math.max(1,visible)>.25){grade=grade==='bad'?'bad':'warn';notes.push('半透明ピクセルが多い')}return{width:c.width,height:c.height,visible,occupancy:occ,semiRatio:semi/Math.max(1,visible),colorBuckets:colors.size,bounds:{x:minX,y:minY,w:bw,h:bh},center:{x:centerX,y:centerY},grade,notes}}
function renderQuality(r){$('qualityStatus').className='status '+(r.grade==='ok'?'ok':r.grade==='bad'?'bad':'');$('qualityStatus').lastElementChild.textContent=r.grade==='ok'?'処理可能です。':r.grade==='warn'?'自動補正して処理できます。':'入力条件を満たしていません。';const m=[['入力',`${r.width}×${r.height}`],['占有率',`${(r.occupancy*100).toFixed(1)}%`],['半透明',`${(r.semiRatio*100).toFixed(1)}%`],['概算色群',r.colorBuckets]];$('metrics').innerHTML=m.map(v=>`<div class="metric"><b>${v[1]}</b><span>${v[0]}</span></div>`).join('');renderBadges(r.notes.length?r.notes:['基本条件OK'])}
function renderBadges(list){$('badges').innerHTML=list.map(x=>`<span class="badge">${escapeHtml(String(x))}</span>`).join('')}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

$('runBtn').addEventListener('click',()=>{if(!state.image)return;const cfg={alpha:+$('alphaThreshold').value,merge:+$('mergeThreshold').value,islands:+$('islandPasses').value,contour:+$('contourPasses').value,maxColors:+$('maxColors').value,sampling:$('sampling').value};const result=compileBody(state.image,cfg,state.meta);octx.putImageData(result.image,0,0);state.report={...state.report,settings:cfg,output:result.stats,metadataAccepted:!!state.meta,generatedAt:new Date().toISOString()};$('outputCaption').textContent=`128×128 / ${result.stats.colors}色 / alpha=${result.stats.semiPixels===0?'binary':'mixed'}`;$('log').textContent=result.log.join('\n');renderBadges(result.badges);$('pngBtn').disabled=false;$('reportBtn').disabled=false});

function compileBody(im,cfg,meta){const work=document.createElement('canvas');work.width=128;work.height=128;const x=work.getContext('2d',{willReadFrequently:true});x.imageSmoothingEnabled=false;let source=getTrimmedImage(im,cfg.alpha);if(cfg.sampling==='majority')drawMajority(source,x,128,128);else drawFitted(source,x,128,128,meta);let data=x.getImageData(0,0,128,128);binaryAlpha(data,cfg.alpha);unpremultiplyEdges(data);for(let i=0;i<cfg.islands;i++)data=removeIslands(data,128,128);for(let i=0;i<cfg.contour;i++)data=cleanContour(data,128,128);let palette=buildPalette(data,cfg.maxColors,cfg.merge,meta);applyPalette(data,palette);binaryAlpha(data,cfg.alpha);const stats=countStats(data,palette);const log=[`[1] canvas normalize: 128x128`,`[2] alpha normalize: threshold ${cfg.alpha}`,`[3] isolated pixel passes: ${cfg.islands}`,`[4] contour cleanup passes: ${cfg.contour}`,`[5] palette compile: ${stats.colors}/${cfg.maxColors} colors`,`[6] semi-transparent pixels: ${stats.semiPixels}`,`[7] occupied pixels: ${stats.opaquePixels}`];const badges=[stats.semiPixels===0?'AA/半透明なし':'半透明残存',stats.colors<=cfg.maxColors?'色数合格':'色数超過',stats.opaquePixels>250?'前景あり':'前景不足'];return{image:data,stats,log,badges}}
function getTrimmedImage(im,alpha){const c=document.createElement('canvas');c.width=im.naturalWidth;c.height=im.naturalHeight;const x=c.getContext('2d',{willReadFrequently:true});x.drawImage(im,0,0);const d=x.getImageData(0,0,c.width,c.height).data;let minX=c.width,minY=c.height,maxX=-1,maxY=-1;for(let y=0;y<c.height;y++)for(let xx=0;xx<c.width;xx++){if(d[(y*c.width+xx)*4+3]>alpha){minX=Math.min(minX,xx);maxX=Math.max(maxX,xx);minY=Math.min(minY,y);maxY=Math.max(maxY,y)}}if(maxX<0)return{canvas:c,x:0,y:0,w:c.width,h:c.height};const pad=Math.max(1,Math.round(Math.max(maxX-minX,maxY-minY)*.025));minX=Math.max(0,minX-pad);minY=Math.max(0,minY-pad);maxX=Math.min(c.width-1,maxX+pad);maxY=Math.min(c.height-1,maxY+pad);return{canvas:c,x:minX,y:minY,w:maxX-minX+1,h:maxY-minY+1}}
function drawFitted(s,ctx,w,h,meta){ctx.clearRect(0,0,w,h);const target=meta&&meta.bodyBounds?meta.bodyBounds:{x:10,y:4,w:108,h:120};const scale=Math.min(target.w/s.w,target.h/s.h),dw=Math.max(1,Math.round(s.w*scale)),dh=Math.max(1,Math.round(s.h*scale));const dx=Math.round(target.x+(target.w-dw)/2),dy=Math.round(target.y+(target.h-dh)/2);ctx.drawImage(s.canvas,s.x,s.y,s.w,s.h,dx,dy,dw,dh)}
function drawMajority(s,ctx,w,h){drawFitted(s,ctx,w,h,null);const d=ctx.getImageData(0,0,w,h);for(let y=0;y<h;y++)for(let x=0;x<w;x++){const i=(y*w+x)*4;if(d.data[i+3]===0)continue;for(let c=0;c<3;c++)d.data[i+c]=Math.round(d.data[i+c]/8)*8}ctx.putImageData(d,0,0)}
function binaryAlpha(img,t){const d=img.data;for(let i=0;i<d.length;i+=4){if(d[i+3]<=t){d[i]=d[i+1]=d[i+2]=d[i+3]=0}else d[i+3]=255}}
function unpremultiplyEdges(img){const d=img.data;for(let i=0;i<d.length;i+=4){if(d[i+3]===0){d[i]=d[i+1]=d[i+2]=0}}}
function removeIslands(img,w,h){const src=img.data,out=new ImageData(new Uint8ClampedArray(src),w,h);for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){const i=(y*w+x)*4;if(src[i+3]===0)continue;let n=0;for(let yy=-1;yy<=1;yy++)for(let xx=-1;xx<=1;xx++)if(xx||yy)n+=src[((y+yy)*w+x+xx)*4+3]>0?1:0;if(n<=1){out.data[i]=out.data[i+1]=out.data[i+2]=out.data[i+3]=0}}return out}
function cleanContour(img,w,h){const s=img.data,o=new ImageData(new Uint8ClampedArray(s),w,h);for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){const i=(y*w+x)*4,a=s[i+3]>0;let ortho=0,diag=0;for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]])ortho+=s[((y+dy)*w+x+dx)*4+3]>0?1:0;for(const [dx,dy] of [[1,1],[-1,1],[1,-1],[-1,-1]])diag+=s[((y+dy)*w+x+dx)*4+3]>0?1:0;if(a&&ortho===0&&diag<=1)o.data[i+3]=0;else if(!a&&ortho>=3){const cols=[];for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){const j=((y+dy)*w+x+dx)*4;if(s[j+3])cols.push([s[j],s[j+1],s[j+2]])}if(cols.length){for(let c=0;c<3;c++)o.data[i+c]=Math.round(cols.reduce((q,v)=>q+v[c],0)/cols.length);o.data[i+3]=255}}}return o}
function buildPalette(img,maxColors,merge,meta){if(meta&&Array.isArray(meta.palette)&&meta.palette.length){return meta.palette.slice(0,maxColors).map(hexToRgb).filter(Boolean)}const d=img.data,map=new Map();for(let i=0;i<d.length;i+=4){if(!d[i+3])continue;const q=[Math.round(d[i]/8)*8,Math.round(d[i+1]/8)*8,Math.round(d[i+2]/8)*8],k=q.join(',');map.set(k,(map.get(k)||0)+1)}let colors=[...map].map(([k,n])=>({rgb:k.split(',').map(Number),n})).sort((a,b)=>b.n-a.n);const chosen=[];for(const c of colors){let near=-1,best=Infinity;for(let i=0;i<chosen.length;i++){const dist=colorDist(c.rgb,chosen[i]);if(dist<best){best=dist;near=i}}if(best<=merge){continue}chosen.push(c.rgb);if(chosen.length>=maxColors)break}if(!chosen.length)chosen.push([0,0,0]);return chosen}
function applyPalette(img,pal){const d=img.data;for(let i=0;i<d.length;i+=4){if(!d[i+3])continue;let bi=0,bd=Infinity;for(let p=0;p<pal.length;p++){const dist=colorDist([d[i],d[i+1],d[i+2]],pal[p]);if(dist<bd){bd=dist;bi=p}}d[i]=pal[bi][0];d[i+1]=pal[bi][1];d[i+2]=pal[bi][2]}}
function colorDist(a,b){const dr=a[0]-b[0],dg=a[1]-b[1],db=a[2]-b[2];return dr*dr*0.3+dg*dg*0.59+db*db*0.11}
function hexToRgb(h){if(Array.isArray(h)&&h.length>=3)return h.slice(0,3).map(Number);if(typeof h!=='string')return null;const m=h.trim().match(/^#?([0-9a-f]{6})$/i);return m?[parseInt(m[1].slice(0,2),16),parseInt(m[1].slice(2,4),16),parseInt(m[1].slice(4,6),16)]:null}
function countStats(img,pal){let opaque=0,semi=0;for(let i=3;i<img.data.length;i+=4){if(img.data[i])opaque++;if(img.data[i]>0&&img.data[i]<255)semi++}return{colors:pal.length,opaquePixels:opaque,semiPixels:semi,width:128,height:128}}

function downloadCanvas(canvas,name){canvas.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)},'image/png')}
function downloadText(text,name,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
$('pngBtn').addEventListener('click',()=>downloadCanvas(out,'body_gold_master_128.png'));
$('reportBtn').addEventListener('click',()=>downloadText(JSON.stringify(state.report,null,2),'body_gold_master_report.json','application/json'));
</script>
</body>
</html>
